function buildAgentDeck(agentId) {
  const items = [];
  if (agentId === 'receptionist') {
    OTHER_DATA.groups.forEach(group => {
      group.items.forEach(q => {
        items.push({ type:'question', item: q, group,
          intro: `Someone asked about ${group.topic.toLowerCase()}.`,
          note: q.aiNote });
      });
    });
    IMPORTANT_DATA.sensitive.forEach(item => {
      items.push({ type:'sensitive', item,
        intro: 'This one needs you. I held back.',
        summary: item.summary });
    });
  } else if (agentId === 'qualifier') {
    IMPORTANT_DATA.services.forEach(item => {
      const draftMsg = item.conversation ? item.conversation.find(m => m.from === 'ai-draft') : null;
      items.push({ type:'lead', item,
        intro: 'Potential lead. Here is the context.',
        draft: draftMsg ? draftMsg.text : (item.draft || ''),
        reason: draftMsg ? draftMsg.reason : (item.reason || ''),
        suggest: 'I suggest this reply:' });
    });
    IMPORTANT_DATA.collabs.forEach(item => {
      const draftMsg = item.conversation ? item.conversation.find(m => m.from === 'ai-draft') : null;
      items.push({ type:'collab', item,
        intro: 'Partnership inquiry. Take a look.',
        draft: draftMsg ? draftMsg.text : (item.draft || ''),
        reason: draftMsg ? draftMsg.reason : (item.reason || ''),
        suggest: 'I suggest this reply:' });
    });
  } else if (agentId === 'engager') {
    ENGAGEMENT_DATA.posts.forEach(post => {
      items.push({ type:'comments', post,
        intro: `Comments on "${post.title}" are rolling in!`,
        suggest: 'I can send warm, personal replies to each one.' });
    });
  }
  // chief returns empty — uses dashboard
  return items;
}

/* ─── Shared: Option Card ─── */
function OptCard({ title, desc, emoji, selected, onClick, small }) {
  return (
    <div onClick={onClick}
      style={{ padding: small ? '14px 18px' : '18px 20px', background:T.cardBg, borderRadius:14,
        border: selected ? `2px solid ${T.ink}` : `1px solid ${T.lightGray}`,
        cursor:'pointer', transition:'all .15s ease', display:'flex', alignItems:'flex-start', gap:14 }}>
      {emoji && <span style={{ fontSize:24, flexShrink:0, marginTop:small?0:2 }}>{emoji}</span>}
      <div>
        <div style={{ fontSize: small ? 14 : 15, fontWeight:600, color:T.ink }}>{title}</div>
        {desc && <div style={{ fontSize:13, color:T.gray, marginTop:3, lineHeight:1.4 }}>{desc}</div>}
      </div>
    </div>
  );
}

/* Staggered fade-in messages (replaces TypeWriter — 2s instead of 25s) */
function ChattyMessages({ messages, onAllDone }) {
  const [visibleCount, setVisibleCount] = useState(0);

  useEffect(() => {
    messages.forEach((_, i) => {
      setTimeout(() => {
        setVisibleCount(i + 1);
        if (i === messages.length - 1 && onAllDone) {
          setTimeout(onAllDone, 400);
        }
      }, 300 + i * 500);
    });
  }, [messages.length]);

  return (
    <div>
      {messages.map((msg, i) => (
        <div key={i} style={{ marginBottom: 10, opacity: i < visibleCount ? 1 : 0, transform: i < visibleCount ? 'translateY(0)' : 'translateY(12px)', transition: 'all .35s ease-out' }}>
          {i === 0 && (
            <div style={{ fontSize: 11, color: T.gray, marginBottom: 5, fontWeight: 500, letterSpacing: '0.05em', textTransform: 'uppercase' }}>
              · Chatty
            </div>
          )}
          <div style={{ background: T.warmGray, borderRadius: 14, borderTopLeftRadius: i === 0 ? 14 : 4, padding: '13px 17px', maxWidth: '88%', display: 'inline-block' }}>
            <div style={{ fontSize: 15, color: T.ink, lineHeight: 1.55 }}>{msg}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* Progress bar with step label */
function ProgressBar({ step, total, label }) {
  return (
    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
      <div style={{ height: 3, background: T.lightGray }}>
        <div style={{ height: '100%', background: T.ink, width: `${(step / total) * 100}%`, transition: 'width .4s ease' }} />
      </div>
      {label && (
        <div style={{ padding: '8px 28px 0', fontSize: 10, color: T.gray, fontWeight: 500, letterSpacing: '0.03em' }}>
          Step {step} of {total} · {label}
        </div>
      )}
    </div>
  );
}

/* ─── Chat Detail (full-screen overlay) ─── */
function ChatDetail({ item, label, labelColor, onClose, isSensitive, onSent }) {
  const [mode, setMode] = useState('thread'); // thread, editing, custom, sent
  const [editVal, setEditVal] = useState('');
  const [customVal, setCustomVal] = useState('');
  const [showToast, setShowToast] = useState(false);
  const [toastMsg, setToastMsg] = useState('');
  const [labelMenu, setLabelMenu] = useState(false);
  const [labelReason, setLabelReason] = useState(false);
  const [labelHidden, setLabelHidden] = useState(false);
  const [activeTone, setActiveTone] = useState(null);
  const [feedbackMsg, setFeedbackMsg] = useState(null); // index of AI msg being reviewed
  const [feedbackStep, setFeedbackStep] = useState(null); // 'reason', 'correction', 'done'
  const [selectedReason, setSelectedReason] = useState('');
  const [draftSent, setDraftSent] = useState(false);
  const scrollRef = useRef(null);

  const conversation = item.conversation || [{ from:'them', text:item.msg, time:item.time || '2h ago' }];
  const draftMsg = conversation.find(m => m.from === 'ai-draft');
  const originalDraft = draftMsg ? draftMsg.text : (item.draft || '');

  useEffect(() => { if(draftMsg) setEditVal(draftMsg.text); }, []);
  useEffect(() => { if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [mode, feedbackStep, draftSent]);

  // Close label menu on outside click
  useEffect(() => {
    if (!labelMenu && !labelReason) return;
    const close = () => { setLabelMenu(false); setLabelReason(false); };
    const timer = setTimeout(() => document.addEventListener('click', close, { once: true }), 100);
    return () => { clearTimeout(timer); document.removeEventListener('click', close); };
  }, [labelMenu, labelReason]);

  const triggerToast = (msg) => { setToastMsg(msg); setShowToast(true); setTimeout(() => setShowToast(false), 2500); };

  const handleSendDraft = () => {
    setDraftSent(true);
    if (mode === 'editing' && activeTone) triggerToast('Got it — ' + activeTone.toLowerCase() + ' tone for similar messages.');
    else if (mode === 'editing') triggerToast("Noted — I'll adjust my style based on your edit.");
    setMode('thread');
    if (onSent) onSent(item.user);
  };

  const handleSendCustom = () => {
    if (!customVal.trim()) return;
    setDraftSent(true);
    setMode('thread');
    triggerToast("Got it — I'll adjust for next time");
    if (onSent) onSent(item.user);
  };

  const feedbackReasons = ['Too pushy', 'Off-brand tone', 'Wrong info', "Shouldn't have replied", 'Other'];
  const pickReason = (reason) => {
    setSelectedReason(reason);
    setFeedbackStep('correction');
  };
  const handleCorrectionGood = () => {
    setFeedbackStep('done');
    setTimeout(() => { setFeedbackMsg(null); setFeedbackStep(null); }, 1500);
  };

  const getBubbleStyle = (msg) => {
    if (msg.from === 'them') return { maxWidth:'80%', padding:'12px 16px', borderRadius:16, borderTopLeftRadius:4, background:'#fff', border:`1px solid ${T.lightGray}`, color:T.ink };
    if (msg.from === 'ai') return { maxWidth:'80%', padding:'12px 16px', borderRadius:16, borderTopRightRadius:4, background:'#F0EFED', color:T.ink };
    if (msg.from === 'ai-draft') return { maxWidth:'80%', padding:'12px 16px', borderRadius:16, borderTopRightRadius:4, background:'#fff', border:`2px dashed ${T.lightGray}`, color:T.ink };
    if (msg.from === 'you') return { maxWidth:'80%', padding:'12px 16px', borderRadius:16, borderTopRightRadius:4, background:T.ink, color:'#fff' };
    return {};
  };

  return (
    <div className="fade-up" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={(e) => { e.stopPropagation(); onClose(); }} style={{ cursor:'pointer', fontSize:20, color:T.ink, fontWeight:300, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink }}>{item.user}</div>
            <div style={{ fontSize:11, color:T.gray }}>{item.source}</div>
          </div>
        </div>
        {!labelHidden && (
          <div style={{ position:'relative' }} onClick={(e) => { e.stopPropagation(); setLabelMenu(!labelMenu); setLabelReason(false); }}>
            <div style={{ fontSize:10, fontWeight:600, color:labelColor, background:labelColor+'18', padding:'6px 14px', borderRadius:10, textTransform:'uppercase', letterSpacing:'0.04em', cursor:'pointer', userSelect:'none' }}>{label}</div>
            {labelMenu && !labelReason && (
              <div className="fade-in" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', right:0, top:'100%', marginTop:6, background:'#fff', borderRadius:10, border:`1px solid ${T.lightGray}`, boxShadow:'0 4px 16px rgba(0,0,0,0.1)', zIndex:20, minWidth:160, overflow:'hidden' }}>
                <div onClick={(e) => { e.stopPropagation(); setLabelReason(true); }} style={{ padding:'12px 16px', fontSize:13, color:'#dc2626', cursor:'pointer', borderBottom:`1px solid ${T.lightGray}`, fontWeight:500 }}>Not a {label.toLowerCase()}</div>
                <div onClick={(e) => { e.stopPropagation(); setLabelMenu(false); }} style={{ padding:'12px 16px', fontSize:13, color:T.gray, cursor:'pointer' }}>Cancel</div>
              </div>
            )}
            {labelReason && (
              <div className="fade-in" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', right:0, top:'100%', marginTop:6, background:'#fff', borderRadius:10, border:`1px solid ${T.lightGray}`, boxShadow:'0 4px 16px rgba(0,0,0,0.1)', zIndex:20, minWidth:200, overflow:'hidden' }}>
                <div style={{ padding:'10px 16px', fontSize:11, color:T.gray, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.04em', borderBottom:`1px solid ${T.lightGray}` }}>Why is it not a {label.toLowerCase()}?</div>
                {['Just browsing','Wrong category','Spam or bot','Other'].map(reason => (
                  <div key={reason} onClick={(e) => { e.stopPropagation(); setLabelHidden(true); setLabelMenu(false); setLabelReason(false); }} style={{ padding:'12px 16px', fontSize:13, color:T.ink, cursor:'pointer', borderBottom:`1px solid ${T.lightGray}` }}>{reason}</div>
                ))}
              </div>
            )}
          </div>
        )}
        {labelHidden && <span className="fade-in" style={{ fontSize:10, color:'#16a34a', fontWeight:500 }}>Label removed</span>}
      </div>

      {/* Sensitive note */}
      {isSensitive && (
        <div style={{ padding:'10px 20px', background:'#fef3c7', borderBottom:`1px solid #fde68a`, fontSize:12, color:'#92400e', lineHeight:1.4 }}>
          I detected this might be sensitive — I didn't reply. Here's a summary to help you.
        </div>
      )}

      {/* Conversation thread */}
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'20px 20px 12px' }}>
        {/* Sensitive summary */}
        {isSensitive && item.summary && (
          <div style={{ background:T.warmGray, borderRadius:12, padding:'14px 16px', marginBottom:16 }}>
            <div style={{ fontSize:10, fontWeight:600, color:T.gray, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Summary</div>
            <div style={{ fontSize:13, color:T.ink, lineHeight:1.55 }}>{item.summary}</div>
          </div>
        )}

        {/* Post context */}
        {item.postContext && (
          <div style={{ padding:'10px 14px', background:T.warmGray, borderRadius:10, marginBottom:12, fontSize:12, color:T.gray, lineHeight:1.4 }}>
            <span style={{ fontWeight:500, color:T.ink }}>Started from a post</span> — {item.postContext}
          </div>
        )}

        {/* Messages */}
        {conversation.map((m, i) => {
          if (m.from === 'ai-draft' && draftSent) {
            // Show as sent message
            return (
              <div key={i} style={{ marginBottom:12, display:'flex', justifyContent:'flex-end' }}>
                <div style={{ ...getBubbleStyle({ from:'you' }) }}>
                  <div style={{ fontSize:14, lineHeight:1.5 }}>{mode === 'editing' ? editVal : m.text}</div>
                  <div style={{ fontSize:10, color:'rgba(255,255,255,0.5)', marginTop:4, textAlign:'right' }}>Just now</div>
                </div>
              </div>
            );
          }

          if (m.from === 'ai-draft' && !draftSent) {
            // Show as draft with actions
            return (
              <div key={i} className="fade-up">
                <div style={{ fontSize:10, color:T.gray, marginBottom:4, textAlign:'right', fontWeight:500 }}>Chatty · Draft</div>
                <div style={{ marginBottom:6, display:'flex', justifyContent:'flex-end' }}>
                  <div style={{ ...getBubbleStyle(m) }}>
                    {mode === 'editing' ? (
                      <textarea value={editVal} onChange={e => setEditVal(e.target.value)}
                        style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:0, border:'none', resize:'none', height:80, fontFamily:'Inter', background:'transparent', outline:'none' }} />
                    ) : (
                      <div style={{ fontSize:14, lineHeight:1.5 }}>{m.text}</div>
                    )}
                    {m.reason && mode !== 'editing' && (
                      <div style={{ fontSize:11, color:T.gray, marginTop:8, paddingTop:8, borderTop:`1px solid ${T.lightGray}`, lineHeight:1.4 }}>{m.reason}</div>
                    )}
                  </div>
                </div>
                {/* Tone chips when editing */}
                {mode === 'editing' && (
                  <div style={{ display:'flex', gap:6, justifyContent:'flex-end', marginBottom:8, flexWrap:'wrap' }}>
                    {['Friendly','Formal','Shorter','Direct'].map(tone => (
                      <span key={tone} onClick={() => {
                        setActiveTone(tone);
                        const base = originalDraft;
                        if (tone === 'Shorter') setEditVal(base.split(/(?<=[.!?])\s+/).slice(0, 2).join(' '));
                        else if (tone === 'Friendly') setEditVal('Hey! ' + base.charAt(0).toLowerCase() + base.slice(1));
                        else if (tone === 'Formal') setEditVal('Thank you for reaching out. ' + base.replace(/!/g, '.'));
                        else if (tone === 'Direct') setEditVal(base.split(/(?<=[.!?])\s+/).filter(s => s.length > 20).join(' '));
                      }} style={{ fontSize:11, padding:'5px 12px', borderRadius:20, border: activeTone === tone ? `1.5px solid ${T.ink}` : `1px solid ${T.lightGray}`, cursor:'pointer', color: activeTone === tone ? '#fff' : T.ink, fontWeight:500, background: activeTone === tone ? T.ink : '#fff' }}>{tone}</span>
                    ))}
                  </div>
                )}
                {/* Action buttons */}
                <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
                  <button onClick={handleSendDraft} style={{ padding:'10px 24px', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:13, fontWeight:600, cursor:'pointer' }}>
                    {mode === 'editing' ? 'Send edited' : 'Send'}
                  </button>
                  {mode !== 'editing' ? (
                    <button onClick={() => setMode('editing')} style={{ padding:'10px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.ink }}>Edit</button>
                  ) : (
                    <button onClick={() => { setMode('thread'); setEditVal(originalDraft); setActiveTone(null); }} style={{ padding:'10px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>Cancel</button>
                  )}
                  <button onClick={() => { setMode('custom'); setCustomVal(''); }} style={{ padding:'10px 0', background:'transparent', border:'none', fontSize:12, fontWeight:500, cursor:'pointer', color:'#bbb' }}>Write my own</button>
                </div>
              </div>
            );
          }

          // Regular messages (them, ai, you)
          const isAI = m.from === 'ai';
          const isRight = m.from === 'ai' || m.from === 'you';
          return (
            <div key={i}>
              {isAI && <div style={{ fontSize:10, color:T.gray, marginBottom:4, textAlign:'right', fontWeight:500 }}>Chatty</div>}
              <div style={{ marginBottom: isAI && feedbackMsg === i ? 4 : 12, display:'flex', justifyContent: isRight ? 'flex-end' : 'flex-start' }}>
                <div style={{ ...getBubbleStyle(m) }}>
                  <div style={{ fontSize:14, lineHeight:1.5 }}>{m.text}</div>
                  <div style={{ fontSize:10, color: m.from === 'you' ? 'rgba(255,255,255,0.5)' : '#ccc', marginTop:4, textAlign:'right' }}>{m.time}</div>
                </div>
              </div>
              {/* AI message feedback icons */}
              {isAI && feedbackMsg !== i && feedbackStep !== 'done' && (
                <div style={{ display:'flex', justifyContent:'flex-end', gap:6, marginBottom:12, marginTop:-4 }}>
                  <span style={{ fontSize:14, cursor:'pointer', opacity:0.3 }}>👍</span>
                  <span onClick={() => { setFeedbackMsg(i); setFeedbackStep('reason'); }} style={{ fontSize:14, cursor:'pointer', opacity:0.3 }}>👎</span>
                </div>
              )}
              {/* Feedback flow */}
              {isAI && feedbackMsg === i && feedbackStep === 'reason' && (
                <div className="fade-up" style={{ marginBottom:12, display:'flex', justifyContent:'flex-end' }}>
                  <div style={{ maxWidth:'85%', padding:'12px 14px', background:T.warmGray, borderRadius:12 }}>
                    <div style={{ fontSize:12, color:T.ink, fontWeight:500, marginBottom:8 }}>What went wrong?</div>
                    <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                      {feedbackReasons.map(r => (
                        <div key={r} onClick={() => pickReason(r)} style={{ padding:'8px 12px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, cursor:'pointer', fontSize:12, color:T.ink }}>{r}</div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
              {isAI && feedbackMsg === i && feedbackStep === 'correction' && (
                <div className="fade-up" style={{ marginBottom:12, display:'flex', justifyContent:'flex-end' }}>
                  <div style={{ maxWidth:'85%', padding:'12px 14px', background:T.warmGray, borderRadius:12 }}>
                    <div style={{ fontSize:12, color:T.ink, marginBottom:8 }}>Got it — {selectedReason.toLowerCase()}. Next time I'll adjust my approach.</div>
                    <div style={{ display:'flex', gap:6 }}>
                      <button onClick={handleCorrectionGood} style={{ padding:'6px 14px', background:T.ink, color:'#fff', border:'none', borderRadius:14, fontSize:11, fontWeight:600, cursor:'pointer' }}>Good</button>
                      <button onClick={() => setFeedbackStep('reason')} style={{ padding:'6px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:14, fontSize:11, cursor:'pointer', color:T.gray }}>Still wrong</button>
                    </div>
                  </div>
                </div>
              )}
              {isAI && feedbackMsg === i && feedbackStep === 'done' && (
                <div className="fade-in" style={{ fontSize:11, color:'#16a34a', textAlign:'right', marginBottom:12 }}>Feedback saved</div>
              )}
            </div>
          );
        })}

        {/* Custom mode hint */}
        {mode === 'custom' && (
          <div className="fade-up" style={{ marginBottom:12, fontSize:12, color:T.gray, textAlign:'center', padding:'8px 0' }}>
            Draft dismissed — use the input below to write your own reply
          </div>
        )}

      </div>

      {/* ─── Sticky input bar at bottom ─── */}
      <div style={{ flexShrink:0, padding:'10px 20px 32px', borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <span style={{ fontSize:20, color:'#ccc', padding:'0 4px', flexShrink:0, cursor:'pointer' }}>+</span>
          <div style={{ flex:1, padding:'11px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
            <input value={customVal} onChange={e => setCustomVal(e.target.value)} placeholder="Write a message..." onKeyDown={e => e.key === 'Enter' && handleSendCustom()}
              style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter' }} />
          </div>
          <div onClick={handleSendCustom} style={{ width:38, height:38, borderRadius:19, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0, transition:'background .2s' }}>
            <span style={{ color:'#fff', fontSize:14 }}>↑</span>
          </div>
        </div>

      {/* Toast */}
      {showToast && (
        <div style={{ position:'absolute', bottom:100, left:'50%', transform:'translateX(-50%)', background:T.ink, color:'#fff', padding:'10px 20px', borderRadius:20, fontSize:13, fontWeight:500, animation:'fadeUp .3s ease-out', whiteSpace:'nowrap', zIndex:110 }}>
          {toastMsg}
        </div>
      )}
    </div>
  );
}

/* ─── Engagement Tab (mixed stacks + singles, load more) ─── */
function EngagementTab() {
  const [approvedItems, setApprovedItems] = useState({});
  const [editingItem, setEditingItem] = useState(null); // key of item being edited
  const [editVal, setEditVal] = useState('');
  const [visiblePerPost, setVisiblePerPost] = useState({}); // { postIdx: count }
  const [approvedStacks, setApprovedStacks] = useState({});
  const [approvedPosts, setApprovedPosts] = useState({});

  const INITIAL_VISIBLE = 5;
  const totalComments = ENGAGEMENT_DATA.posts.reduce((s, p) => s + p.comments.length, 0);

  const handleApprove = (key) => {
    setApprovedItems(a => ({ ...a, [key]: true }));
    if (editingItem === key) setEditingItem(null);
  };

  const handleEdit = (key, draft) => {
    setEditingItem(key);
    setEditVal(draft);
  };

  const handleSendEdit = (key) => {
    setApprovedItems(a => ({ ...a, [key]: true }));
    setEditingItem(null);
  };

  const handleApproveAllPost = (post, pi) => {
    const newApproved = { ...approvedItems };
    post.comments.forEach((c, ci) => { newApproved[`${pi}-${ci}`] = true; });
    setApprovedItems(newApproved);
    setApprovedPosts(a => ({ ...a, [pi]: true }));
  };

  const getVisible = (pi) => visiblePerPost[pi] || INITIAL_VISIBLE;

  // Group positive comments into stacks per post
  const groupComments = (comments, postIdx) => {
    const result = [];
    let positiveStack = [];

    comments.forEach((c, ci) => {
      if (c.emotion === 'positive') {
        positiveStack.push({ ...c, idx: ci });
      } else {
        if (positiveStack.length >= 2) {
          result.push({ type: 'stack', items: positiveStack, postIdx });
          positiveStack = [];
        } else if (positiveStack.length === 1) {
          result.push({ type: 'single', item: positiveStack[0], postIdx });
          positiveStack = [];
        }
        result.push({ type: 'single', item: { ...c, idx: ci }, postIdx });
      }
    });
    if (positiveStack.length >= 2) {
      result.push({ type: 'stack', items: positiveStack, postIdx });
    } else if (positiveStack.length === 1) {
      result.push({ type: 'single', item: positiveStack[0], postIdx });
    }
    return result;
  };

  const renderComment = (c, postIdx) => {
    const key = `${postIdx}-${c.idx}`;
    const isApproved = approvedItems[key];
    const isEditing = editingItem === key;

    if (isApproved) {
      return (
        <div key={key} className="fade-in" style={{ padding:'8px 14px', background:'#f0fdf4', borderRadius:8, border:'1px solid #dcfce7', marginBottom:5 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontSize:12, color:'#16a34a', fontWeight:500 }}>Sent to {c.user}</span>
            <span style={{ fontSize:11, color:'#86efac' }}>✓</span>
          </div>
        </div>
      );
    }

    return (
      <div key={key} style={{ padding:'12px 14px', background:'#fff', borderRadius:10, border:`1px solid ${T.lightGray}`, marginBottom:5 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
          <span style={{ fontSize:13, fontWeight:600, color:T.ink }}>{c.user}</span>
          <span style={{ fontSize:10, color:'#ccc' }}>{c.time}</span>
        </div>
        <div style={{ fontSize:12, color:T.gray, fontStyle:'italic', marginBottom:6 }}>"{c.comment}"</div>

        {isEditing ? (
          <div>
            <textarea value={editVal} onChange={e => setEditVal(e.target.value)}
              style={{ width:'100%', fontSize:13, color:T.ink, lineHeight:1.45, padding:'10px 12px', border:`1.5px solid ${T.ink}`, borderRadius:8, resize:'none', height:70, fontFamily:'Inter', background:'#fff', outline:'none' }} />
            <div style={{ display:'flex', gap:5, marginTop:6, marginBottom:8, flexWrap:'wrap' }}>
              {['Friendly','Formal','Shorter','Direct'].map(tone => (
                <span key={tone} onClick={() => { if(tone==='Shorter') setEditVal(v => v.split('.').slice(0,1).join('.')+'.'); }}
                  style={{ fontSize:10, padding:'4px 10px', borderRadius:16, border:`1px solid ${T.lightGray}`, cursor:'pointer', color:T.ink, fontWeight:500, background:'#fff' }}>{tone}</span>
              ))}
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={() => handleSendEdit(key)} style={{ padding:'6px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Send</button>
              <button onClick={() => setEditingItem(null)} style={{ padding:'6px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.gray }}>Cancel</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{ fontSize:12, color:T.ink, lineHeight:1.45, padding:'8px 10px', background:T.warmGray, borderRadius:8, marginBottom:8 }}>{c.draft}</div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={() => handleApprove(key)} style={{ padding:'6px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Approve</button>
              <button onClick={() => handleEdit(key, c.draft)} style={{ padding:'6px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.ink }}>Edit</button>
            </div>
          </>
        )}
      </div>
    );
  };

  return (
    <div>
      <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:16, padding:'0 4px' }}>
        Comments on your posts. Review my drafts and approve or edit.
      </div>

      {ENGAGEMENT_DATA.posts.map((post, pi) => {
        const grouped = groupComments(post.comments, pi);
        const visible = getVisible(pi);
        const allItems = [];
        grouped.forEach(g => { if (g.type === 'stack') g.items.forEach(i => allItems.push(i)); else allItems.push(g.item); });
        const hasMore = allItems.length > visible;
        const allApprovedForPost = approvedPosts[pi] || post.comments.every((c, ci) => approvedItems[`${pi}-${ci}`]);

        if (approvedPosts[pi]) {
          return (
            <div key={pi} style={{ marginBottom:24 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10, padding:'0 2px' }}>
                <img src={post.img} style={{ width:36, height:36, borderRadius:6, flexShrink:0 }} />
                <div>
                  <div style={{ fontSize:14, fontWeight:600, color:T.ink }}>{post.title}</div>
                  <div style={{ fontSize:11, color:T.gray }}>{post.comments.length} comments</div>
                </div>
              </div>
              <div className="fade-in" style={{ padding:'12px 16px', background:'#f0fdf4', borderRadius:10, border:'1px solid #dcfce7' }}>
                <span style={{ fontSize:13, color:'#16a34a', fontWeight:500 }}>{post.comments.length} replies sent ✓</span>
              </div>
            </div>
          );
        }

        return (
          <div key={pi} style={{ marginBottom:24 }}>
            {/* Post header */}
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10, padding:'0 2px' }}>
              <img src={post.img} style={{ width:36, height:36, borderRadius:6, flexShrink:0 }} />
              <div>
                <div style={{ fontSize:14, fontWeight:600, color:T.ink }}>{post.title}</div>
                <div style={{ fontSize:11, color:T.gray }}>{post.comments.length} comments</div>
              </div>
            </div>

            {/* Comments */}
            {grouped.map((group, gi) => {
              if (group.type === 'single') {
                // Check if within visible limit
                const flatIdx = allItems.indexOf(group.item);
                if (flatIdx >= visible) return null;
                return renderComment(group.item, pi);
              }

              // Stack
              const stackKey = `stack-${pi}-${gi}`;
              const isStackApproved = approvedStacks[stackKey];
              const stackVisible = group.items.filter(i => allItems.indexOf(i) < visible);
              if (stackVisible.length === 0) return null;

              if (isStackApproved) {
                return (
                  <div key={stackKey} className="fade-in" style={{ padding:'10px 14px', background:'#f0fdf4', borderRadius:10, border:'1px solid #dcfce7', marginBottom:8 }}>
                    <span style={{ fontSize:12, color:'#16a34a', fontWeight:500 }}>{group.items.length} similar replies sent ✓</span>
                  </div>
                );
              }

              // Check if all individual items are already approved
              const allApproved = group.items.every(i => approvedItems[`${pi}-${i.idx}`]);
              if (allApproved) return null;

              return (
                <div key={stackKey} style={{ marginBottom:20 }}>
                  {/* Stacked cards — back cards visible above front card */}
                  <div style={{ marginBottom:14 }}>
                    {/* Back cards — visible strips stacked above */}
                    {group.items.length > 2 && (
                      <div style={{ height:14, marginLeft:16, marginRight:16, background:'#e4e3e0', borderRadius:'12px 12px 0 0', border:'1.5px solid #d5d4d1', borderBottom:'none' }} />
                    )}
                    <div style={{ height:14, marginLeft:8, marginRight:8, background:'#edecE9', borderRadius:'12px 12px 0 0', border:'1.5px solid #dddcd9', borderBottom:'none' }} />
                    {/* Front card */}
                    <div style={{ padding:'14px 16px', background:'#fff', borderRadius:12, border:`1.5px solid ${T.lightGray}` }}>
                      <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.04em', color:T.ink, textTransform:'uppercase', marginBottom:6 }}>
                        Similar emotion <span style={{ fontWeight:400, color:T.gray }}>· {group.items.length}</span>
                      </div>
                      <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:10 }}>
                        I'll answer variations of "{group.items[0].comment.slice(0,40)}..."
                      </div>
                      <div style={{ display:'flex', gap:6 }}>
                        <button onClick={() => setApprovedStacks(a => ({...a, [stackKey]: true}))}
                          style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>
                          Approve {group.items.length}
                        </button>
                        <button onClick={() => {
                          // Expand: show individual items instead
                          const newGrouped = [...grouped];
                          newGrouped.splice(gi, 1, ...group.items.map(i => ({ type:'single', item:i, postIdx:pi })));
                          // Force re-render by expanding visible count
                          setVisiblePerPost(v => ({...v, [pi]: Math.max(getVisible(pi), allItems.length)}));
                        }}
                          style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.ink }}>
                          Review one by one
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}

            {/* Load more */}
            {hasMore && (
              <div style={{ textAlign:'center', paddingTop:4 }}>
                <button onClick={() => setVisiblePerPost(v => ({...v, [pi]: getVisible(pi) + 5}))}
                  style={{ padding:'7px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:20, fontSize:11, fontWeight:500, cursor:'pointer', color:T.gray }}>
                  Load more ({allItems.length - visible} remaining)
                </button>
              </div>
            )}

            {/* Post-level approve all */}
            {!allApprovedForPost && (
              <div onClick={() => handleApproveAllPost(post, pi)} style={{ margin:'8px 0 16px', padding:'12px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:13, fontWeight:600, cursor:'pointer', textAlign:'center' }}>
                Approve all {post.comments.length} replies
              </div>
            )}
          </div>
        );
      })}

      <div style={{ textAlign:'center', fontSize:11, color:'#ccc', padding:'8px 0' }}>
        {totalComments} comments across {ENGAGEMENT_DATA.posts.length} posts
      </div>
    </div>
  );
}

/* ─── Other Tab (Teach AI) ─── */
function OtherTab() {
  const [itemStates, setItemStates] = useState({});
  const getState = (key) => itemStates[key] || { mode: 'idle' };
  const setState = (key, state) => setItemStates(s => ({ ...s, [key]: state }));

  const renderItem = (item, key, knowledgeDesc) => {
    const st = getState(key);
    if (st.mode === 'skipped') return null;
    if (st.mode === 'saved' || st.mode === 'sent') return (
      <div key={key} className="fade-in" style={{ padding:'10px 16px', background:'#f0fdf4', borderRadius:10, border:'1px solid #bbf7d0', marginBottom:6, display:'flex', alignItems:'center', gap:8 }}>
        <span style={{ color:'#16a34a', fontSize:14 }}>&#10003;</span>
        <span style={{ fontSize:13, color:'#16a34a', fontWeight:500 }}>{item.user}</span>
        <span style={{ fontSize:12, color:'#86efac' }}>— {st.mode === 'saved' ? 'Replied + added to knowledge' : 'Replied'}</span>
      </div>
    );
    return (
      <div key={key} style={{ padding:'14px 16px', background:T.cardBg, borderRadius:10, border:`1px solid ${T.lightGray}`, marginBottom:6 }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
          <span style={{ fontSize:14, fontWeight:600, color:T.ink }}>{item.user}</span>
          <span style={{ fontSize:11, color:'#ccc' }}>{item.time}</span>
        </div>
        <div style={{ fontSize:13, color:T.ink, marginBottom:6 }}>"{item.msg}"</div>
        <div style={{ fontSize:12, color:T.gray, marginBottom:10, paddingLeft:10, borderLeft:`2px solid ${T.lightGray}`, lineHeight:1.4, fontStyle:'italic' }}>{item.aiNote}</div>

        {st.mode === 'idle' && (
          <div style={{ display:'flex', gap:6 }}>
            <button onClick={() => setState(key, { mode:'replying' })} style={{ padding:'8px 18px', background:T.ink, color:'#fff', border:'none', borderRadius:20, fontSize:12, fontWeight:500, cursor:'pointer' }}>Reply</button>
            <button onClick={() => setState(key, { mode:'skipped' })} style={{ padding:'8px 18px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:20, fontSize:12, fontWeight:500, cursor:'pointer', color:T.gray }}>Skip</button>
          </div>
        )}

        {st.mode === 'replying' && (
          <div className="fade-up">
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <input placeholder="Write your reply..." style={{ flex:1, padding:'10px 14px', border:`1px solid ${T.lightGray}`, borderRadius:20, fontSize:13, fontFamily:'Inter', outline:'none', color:T.ink, background:'#fff' }} />
              <button onClick={() => setState(key, { mode:'askKnowledge' })} style={{ padding:'8px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:20, fontSize:12, fontWeight:500, cursor:'pointer', flexShrink:0 }}>Send</button>
            </div>
          </div>
        )}

        {st.mode === 'askKnowledge' && (
          <div className="fade-up" style={{ background:T.warmGray, borderRadius:10, padding:'12px 14px' }}>
            <div style={{ fontSize:12, color:T.ink, lineHeight:1.5, marginBottom:10 }}>
              Do you want me to add this info on <strong>{knowledgeDesc}</strong> to my knowledge?
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={() => setState(key, { mode:'saved' })} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:12, fontWeight:500, cursor:'pointer' }}>Yes</button>
              <button onClick={() => setState(key, { mode:'sent' })} style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:12, cursor:'pointer', color:T.gray }}>No</button>
            </div>
          </div>
        )}

        {st.mode === 'skipped' && null}
      </div>
    );
  };

  return (
    <div>
      <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:16, padding:'0 4px' }}>
        I didn't have enough context to reply to these. Reply to teach me, or skip.
      </div>
      {OTHER_DATA.groups.map((group, gi) => (
        <div key={gi}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8, marginTop: gi > 0 ? 16 : 0 }}>
            <span style={{ fontSize:11, fontWeight:600, letterSpacing:'0.06em', color:T.ink, textTransform:'uppercase' }}>{group.topic}</span>
            <span style={{ fontSize:11, color:T.gray }}>· {group.items.length}</span>
          </div>
          {group.items.map((item, ii) => renderItem(item, `${gi}-${ii}`, group.knowledgeDesc))}
        </div>
      ))}
    </div>
  );
}

/* ─── In-Progress Detail (full-screen conversation with feedback) ─── */
function InProgressDetail({ item, onClose }) {
  const [feedbackMsg, setFeedbackMsg] = useState(null); // index of AI msg being reviewed
  const [feedbackStep, setFeedbackStep] = useState(null); // 'pick' | 'reason' | 'correction' | 'done'
  const [selectedReason, setSelectedReason] = useState(null);
  const [correctionText, setCorrectionText] = useState('');
  const [correctedDraft, setCorrectedDraft] = useState('');

  const reasons = [
    'Too pushy / salesy',
    'Didn\'t answer the question',
    'Wrong tone',
    'Shared incorrect info',
    'Too long',
  ];

  const handleWrong = (idx) => { setFeedbackMsg(idx); setFeedbackStep('reason'); };
  const handleGood = (idx) => { setFeedbackMsg(idx); setFeedbackStep('done'); };

  const pickReason = (r) => {
    setSelectedReason(r);
    setFeedbackStep('correction');
    // Generate a "corrected" version
    const orig = item.conversation[feedbackMsg].text;
    if (r === 'Too pushy / salesy') setCorrectedDraft(orig.replace(/!+/g, '.').replace(/Want me to/, 'I can'));
    else if (r === 'Too long') setCorrectedDraft(orig.split('.').slice(0,2).join('.') + '.');
    else setCorrectedDraft(orig.replace(/\?$/, '. Let me know if you have questions.'));
  };

  const handleCorrectionGood = () => setFeedbackStep('done');

  return (
    <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>

            </div>
          </div>
        </div>
        <span style={{ fontSize:10, fontWeight:600, color:T.accent, background:T.accent+'18', padding:'3px 10px', borderRadius:10, textTransform:'uppercase' }}>in progress</span>
      </div>

      {/* Conversation */}
      <div style={{ flex:1, overflowY:'auto', padding:'16px 20px' }}>
        {item.conversation.map((m, i) => (
          <div key={i} style={{ marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent: m.from === 'ai' ? 'flex-end' : 'flex-start' }}>
              <div style={{ maxWidth:'80%' }}>
                {m.from === 'ai' && <div style={{ fontSize:10, color:T.gray, marginBottom:3, textAlign:'right' }}>Chatty</div>}
                <div style={{ padding:'11px 15px', borderRadius:14, background: m.from === 'ai' ? T.warmGray : '#fff', border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 4 : 14, borderTopRightRadius: m.from === 'ai' ? 4 : 14 }}>
                  <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>{m.text}</div>
                </div>
                {/* Feedback buttons for AI messages */}
                {m.from === 'ai' && feedbackMsg === null && (
                  <div className="fade-in" style={{ display:'flex', gap:6, justifyContent:'flex-end', marginTop:6 }}>
                    <button onClick={() => handleGood(i)} style={{ padding:'5px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:14, fontSize:10, cursor:'pointer', color:T.gray }}>Good</button>

                  </div>
                )}
                {/* Feedback: done/good */}
                {m.from === 'ai' && feedbackMsg === i && feedbackStep === 'done' && (
                  <div className="fade-in" style={{ fontSize:11, color:'#16a34a', textAlign:'right', marginTop:4 }}>Feedback saved</div>
                )}
              </div>
            </div>
          </div>
        ))}

        {/* Feedback flow: reason selection */}
        {feedbackStep === 'reason' && (
          <div className="fade-up" style={{ padding:'14px 16px', background:T.warmGray, borderRadius:12, marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:8 }}>Chatty</div>

        {/* Feedback flow: correction proposal */}
        {feedbackStep === 'correction' && (
          <div className="fade-up" style={{ padding:'14px 16px', background:T.warmGray, borderRadius:12, marginBottom:12 }}>

/* ─── ChattyFocusMode (presents all tasks one at a time) ─── */
function ChattyFocusMode({ onOpenChat, answeredChats, setAnsweredChats, agent }) {
  const [history, setHistory] = useState([]); // array of { type:'chatty'|'user'|'card'|'actions'|'confirmation', content, ... }
  const [deckIdx, setDeckIdx] = useState(0);
  const [phase, setPhase] = useState('intro'); // intro, showing, actions, transitioning, done
  const [actionsVisible, setActionsVisible] = useState(false);
  const scrollRef = useRef(null);

  const agentLabel = agent ? `${agent.emoji} ${agent.name}` : 'Chatty';
  const agentColor = agent ? agent.color : T.gray;
  const agentPersonality = agent ? agent.personality : null;

  // Build deck
  const deck = React.useMemo(() => {
    if (agent) return buildAgentDeck(agent.id);
    return [];
  }, [agent]);

  const current = deck[deckIdx];
  const allDone = deckIdx >= deck.length;

  const scrollToBottom = () => {
    setTimeout(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 50);
  };

  // Present current task with staggered messages
  const presentTask = useCallback(() => {
    if (!current) { setPhase('done'); return; }
    setPhase('showing');
    setActionsVisible(false);

    // Stagger: intro message
    setTimeout(() => {
      setHistory(h => [...h, { type:'chatty', text: current.intro, id: `intro-${deckIdx}` }]);
      scrollToBottom();
    }, 400);

    // Stagger: card content
    setTimeout(() => {
      if (current.type === 'comments') {
        setHistory(h => [...h, { type:'commentCard', post: current.post, id: `card-${deckIdx}` }]);
      } else {
        setHistory(h => [...h, { type:'msgCard', user: current.item.user, msg: current.item.msg, id: `card-${deckIdx}` }]);
      }
      scrollToBottom();
    }, 1000);

    // Stagger: draft/suggestion or note
    setTimeout(() => {
      if (current.type === 'sensitive') {
        setHistory(h => [...h, { type:'summary', text: current.summary, id: `sum-${deckIdx}` }]);
      } else if (current.type === 'question') {
        setHistory(h => [...h, { type:'chatty', text: current.note, style:'italic', id: `note-${deckIdx}` }]);
      } else if (current.draft) {
        setHistory(h => [...h, { type:'chatty', text: current.suggest, id: `sug-${deckIdx}` }]);
        setTimeout(() => {
          setHistory(h => [...h, { type:'draft', text: current.draft, reason: current.reason, id: `draft-${deckIdx}` }]);
          scrollToBottom();
          // Show actions after draft
          setTimeout(() => { setActionsVisible(true); setPhase('actions'); scrollToBottom(); }, 500);
        }, 600);
        return; // early return, actions shown after draft
      } else if (current.type === 'comments') {
        setHistory(h => [...h, { type:'chatty', text: current.suggest, id: `sug-${deckIdx}` }]);
      }
      scrollToBottom();
      // Show actions
      setTimeout(() => { setActionsVisible(true); setPhase('actions'); scrollToBottom(); }, 600);
    }, 1600);
  }, [deckIdx, current]);

  // Start presenting on mount and when deckIdx changes
  useEffect(() => {
    if (deckIdx === 0 && history.length === 0) {
      // Opening greeting
      const greetingText = agentPersonality ? agentPersonality.greeting(deck.length) : `You have ${deck.length} items to review. Let's go through them.`;
      setHistory([{ type:'chatty', text: greetingText, id:'greeting' }]);
      setTimeout(() => presentTask(), 800);
    } else if (deckIdx > 0 && !allDone) {
      presentTask();
    } else if (allDone) {
      setTimeout(() => {
        const doneText = agentPersonality ? agentPersonality.done : "That's everything. You're all caught up.";
        setHistory(h => [...h, { type:'chatty', text: doneText, id:'done' }]);
        setPhase('done');
        scrollToBottom();
      }, 600);
    }
  }, [deckIdx]);

  const handleAction = (label, callback) => {
    // Add user choice to history
    setHistory(h => [...h, { type:'user', text: label, id: `action-${deckIdx}` }]);
    setActionsVisible(false);
    scrollToBottom();

    // Agent confirms
    const defaultConfirmations = {
      'Approve & Send': 'Sent! Moving on.',
      'Approve all': `All ${current?.post?.comments?.length || ''} replies sent. Nice.`,
      'Reply': 'Opening the conversation for you.',
      'Skip': 'Skipped. Next one.',
      'Skip all': 'Skipped. Moving on.',
      'Later': 'I\'ll keep it for later.',
    };
    const agentConfirm = agentPersonality && agentPersonality.confirm ? agentPersonality.confirm : {};
    const confirmText = agentConfirm[label] || defaultConfirmations[label] || 'Got it.';

    setTimeout(() => {
      setHistory(h => [...h, { type:'chatty', text: confirmText, id: `confirm-${deckIdx}` }]);
      scrollToBottom();
      if (callback) callback();
      // Advance after a pause
      setTimeout(() => setDeckIdx(i => i + 1), 800);
    }, 500);
  };

  // Render a history item
  const renderHistoryItem = (item, i) => {
    const isNew = i >= history.length - 3; // recent items get animation

    if (item.type === 'chatty') {
      return (
        <div key={item.id} className={isNew ? 'fade-up' : ''} style={{ marginBottom:10 }}>
          <div style={{ fontSize:11, color:agentColor, marginBottom:4, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase' }}>{agentLabel}</div>
          <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'12px 16px', maxWidth:'85%', display:'inline-block', borderLeft:`3px solid ${agentColor}` }}>

    if (item.type === 'user') {
      return (
        <div key={item.id} className={isNew ? 'fade-up' : ''} style={{ marginBottom:10, display:'flex', justifyContent:'flex-end' }}>
          <div style={{ background:T.ink, borderRadius:14, borderTopRightRadius:4, padding:'10px 16px', maxWidth:'70%', display:'inline-block' }}>
            <div style={{ fontSize:14, color:'#fff', fontWeight:500 }}>{item.text}</div>
          </div>
        </div>
      );
    }

    if (item.type === 'msgCard') {
      return (
        <div key={item.id} className={isNew ? 'fade-up' : ''} style={{ marginBottom:10, marginLeft:8 }}>
          <div style={{ padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:12, maxWidth:'90%' }}>

    if (item.type === 'commentCard') {
      return (
        <div key={item.id} className={isNew ? 'fade-up' : ''} style={{ marginBottom:10, marginLeft:8 }}>
          <div style={{ padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:12, maxWidth:'90%' }}>
            <div style={{ fontSize:13, fontWeight:600, color:T.ink, marginBottom:6 }}>{item.post.title}</div>
            {item.post.comments.slice(0,4).map((c, ci) => (
              <div key={ci} style={{ fontSize:12, color:T.gray, padding:'4px 0', borderTop: ci > 0 ? `1px solid ${T.lightGray}` : 'none' }}>
                <span style={{ fontWeight:600, color:T.ink }}>{c.user}</span> {c.comment}
              </div>
            ))}
            {item.post.comments.length > 4 && (
              <div style={{ fontSize:11, color:T.gray, marginTop:4 }}>+{item.post.comments.length - 4} more</div>
            )}
          </div>
        </div>
      );
    }

    if (item.type === 'draft') {
      return (
        <div key={item.id} className={isNew ? 'fade-up' : ''} style={{ marginBottom:10, marginLeft:8 }}>
          <div style={{ padding:'12px 16px', background:'#fff', border:`1.5px dashed ${T.lightGray}`, borderRadius:12, maxWidth:'90%' }}>
            <div style={{ fontSize:14, color:T.ink, lineHeight:1.55 }}>{item.text}</div>
            {item.reason && (
              <div style={{ fontSize:11, color:T.gray, marginTop:8, paddingTop:8, borderTop:`1px solid ${T.lightGray}`, lineHeight:1.4 }}>{item.reason}</div>
            )}
          </div>
        </div>
      );
    }

    if (item.type === 'summary') {
      return (
        <div key={item.id} className={isNew ? 'fade-up' : ''} style={{ marginBottom:10, marginLeft:8 }}>
          <div style={{ padding:'12px 16px', background:'#fef3c7', border:`1px solid #fde68a`, borderRadius:12, maxWidth:'90%' }}>
            <div style={{ fontSize:10, fontWeight:600, color:'#92400e', textTransform:'uppercase', letterSpacing:'0.04em', marginBottom:4 }}>Summary</div>
            <div style={{ fontSize:13, color:'#92400e', lineHeight:1.5 }}>{item.text}</div>
          </div>
        </div>
      );
    }

    return null;
  };

  // Action buttons for current item
  const renderActions = () => {
    if (!actionsVisible || !current || phase !== 'actions') return null;

    if (current.type === 'comments') {
      return (
        <div className="fade-up" style={{ padding:'12px 24px 32px', borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>
          <button onClick={() => handleAction('Approve all', () => {})} style={{ width:'100%', padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:15, fontWeight:600, cursor:'pointer', marginBottom:8 }}>
            Approve all {current.post.comments.length} replies
          </button>
          <div style={{ display:'flex', justifyContent:'center', gap:10 }}>
            <button style={{ padding:'10px 18px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:12, fontWeight:500, cursor:'pointer', color:T.ink }}>Review one by one</button>
            <button onClick={() => handleAction('Skip all')} style={{ padding:'10px 18px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:12, fontWeight:500, cursor:'pointer', color:T.gray }}>Skip all</button>
          </div>
        </div>
      );
    }

    if (current.type === 'sensitive') {
      return (
        <div className="fade-up" style={{ padding:'12px 24px 32px', borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>
          <button onClick={() => handleAction('Reply', () => { if(current.item) onOpenChat(current.item, current.item.flag, '#6B21A8', true); })}
            style={{ width:'100%', padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:15, fontWeight:600, cursor:'pointer', marginBottom:8 }}>
            Reply
          </button>
          <div style={{ display:'flex', justifyContent:'center', gap:10 }}>
            <button onClick={() => handleAction('Later')} style={{ padding:'10px 18px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:12, fontWeight:500, cursor:'pointer', color:T.gray }}>Later</button>
          </div>
        </div>
      );
    }

    if (current.type === 'question') {
      return (
        <div className="fade-up" style={{ padding:'12px 24px 32px', borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>
          <button onClick={() => handleAction('Reply', () => { if(current.item) onOpenChat({...current.item, draft:'', source:'DM'}, 'question', '#0369A1', false); })}
            style={{ width:'100%', padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:15, fontWeight:600, cursor:'pointer', marginBottom:8 }}>
            Reply
          </button>
          <div style={{ display:'flex', justifyContent:'center', gap:10 }}>
            <button onClick={() => handleAction('Skip')} style={{ padding:'10px 18px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:12, fontWeight:500, cursor:'pointer', color:T.gray }}>Skip</button>
          </div>
        </div>
      );
    }

    // Lead / Collab
    return (
      <div className="fade-up" style={{ padding:'12px 24px 32px', borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>
        <button onClick={() => handleAction('Approve & Send', () => { if(current.item) setAnsweredChats(prev => new Set([...prev, current.item.user])); })}
          style={{ width:'100%', padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:15, fontWeight:600, cursor:'pointer', marginBottom:8 }}>
          Approve & Send
        </button>
        <div style={{ display:'flex', justifyContent:'center', gap:10 }}>
          <button onClick={() => handleAction('Edit draft', () => { if(current.item) onOpenChat(current.item, current.type === 'collab' ? 'collab' : 'lead', current.type === 'collab' ? '#0369A1' : '#E85D04', false); })}

          <button style={{ padding:'10px 18px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:12, fontWeight:500, cursor:'pointer', color:T.ink }}>Reply myself</button>
          <button onClick={() => handleAction('Skip')} style={{ padding:'10px 18px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:12, fontWeight:500, cursor:'pointer', color:T.gray }}>Skip</button>
        </div>
      </div>
    );
  };

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Scrollable conversation */}
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'16px 24px 20px' }}>
        {history.map((item, i) => renderHistoryItem(item, i))}

        {phase === 'done' && (
          <div style={{ textAlign:'center', padding:'30px 0' }}>
            <div style={{ fontSize:36, marginBottom:12 }}>&#10024;</div>
            <div style={{ fontSize:13, color:T.gray }}>Go create something.</div>
          </div>
        )}
      </div>

      {/* Pinned actions */}
      {renderActions()}
    </div>
  );
}

/* ─── Agent Switcher (bottom picker) ─── */
function AgentSwitcher({ agents, activeAgent, onSwitch }) {
  const [open, setOpen] = useState(false);

  const deckCounts = React.useMemo(() => {
    const counts = {};
    agents.forEach(a => { counts[a.id] = buildAgentDeck(a.id).length; });
    return counts;
  }, [agents]);

  return (
    <>
      {/* Backdrop */}
      {open && (
        <div onClick={() => setOpen(false)} style={{ position:'absolute', inset:0, zIndex:70, background:'rgba(0,0,0,0.25)' }} />
      )}

      {/* Picker sheet */}
      {open && (
        <div className="slide-up" style={{ position:'absolute', bottom:0, left:0, right:0, zIndex:71, background:'#fff', borderRadius:'20px 20px 0 0', boxShadow:'0 -4px 24px rgba(0,0,0,0.12)', paddingBottom: 40 }}>
          <div style={{ padding:'16px 24px 8px' }}>
            <div style={{ width:36, height:4, borderRadius:2, background:T.lightGray, margin:'0 auto 16px' }} />
            <div style={{ fontSize:13, fontWeight:600, color:T.ink, marginBottom:16 }}>Switch agent</div>
          </div>
          {agents.map(a => {
            const isActive = activeAgent.id === a.id;
            const count = deckCounts[a.id] || 0;
            return (
              <div key={a.id} onClick={() => { onSwitch(a); setOpen(false); }}
                style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 24px', cursor:'pointer',
                  background: isActive ? a.color + '12' : 'transparent', transition:'background .15s' }}>
                <span style={{ fontSize:22, flexShrink:0 }}>{a.emoji}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:15, fontWeight:600, color: isActive ? a.color : T.ink }}>{a.name}</div>
                  <div style={{ fontSize:12, color:T.gray }}>{a.role}</div>
                </div>
                {a.id !== 'chief' && count > 0 && (
                  <span style={{ fontSize:11, fontWeight:600, color:a.color, background:a.color+'18', padding:'3px 10px', borderRadius:12 }}>{count}</span>
                )}
                {isActive && <span style={{ fontSize:14, color:a.color }}>&#10003;</span>}
              </div>
            );
          })}
        </div>
      )}

      {/* Trigger bar */}
      <div onClick={() => setOpen(!open)}
        style={{ position:'absolute', bottom:0, left:0, right:0, zIndex:60, background:'#fff', borderTop:`1px solid ${T.lightGray}`,
          padding:'12px 24px', paddingBottom: 28, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
        <span style={{ fontSize:18 }}>{activeAgent.emoji}</span>
        <span style={{ fontSize:14, fontWeight:600, color:activeAgent.color }}>{activeAgent.name}</span>
        <span style={{ fontSize:12, color:T.gray, transform: open ? 'rotate(180deg)' : 'none', transition:'transform .2s' }}>▲</span>
      </div>
    </>
  );
}

    other: OTHER_DATA.groups.reduce((s, g) => s + g.items.length, 0),
  };

  const listTabs = [
    { id:'dms', label:'DMs', count: counts.important + counts.other },
    { id:'comments', label:'Comments', count: counts.engagement },
    { id:'handled', label:'Handled', count: null },
  ];

  return (
    <div style={{ background:T.paper, height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>

      {/* Morning brief overlay */}
      {!morningDismissed && (
        <MorningBrief onDismiss={() => setMorningDismissed(true)} />
