      {/* Toggle always visible */}
      <div style={{ display:'flex', justifyContent:'center', padding:'52px 20px 0' }}>
        <div style={{ display:'flex', background:T.warmGray, borderRadius:20, padding:3 }}>
          {['focus','list'].map(m => (
            <div key={m} onClick={() => setViewMode(m)}
              style={{ padding:'8px 20px', borderRadius:17, fontSize:13, fontWeight: viewMode === m ? 600 : 400,
                color: viewMode === m ? '#fff' : T.gray, background: viewMode === m ? T.ink : 'transparent',
                cursor:'pointer', transition:'all .2s ease', textTransform:'capitalize' }}>
              {m === 'focus' ? 'Focus' : 'List'}
            </div>
          ))}
        </div>
      </div>

      {viewMode === 'focus' ? (
        <ChattyFocusMode onOpenChat={handleOpenChat} answeredChats={answeredChats} setAnsweredChats={setAnsweredChats} />
      ) : (
        <>
          {/* Pause toggle - only in list mode */}
          <div style={{ display:'flex', justifyContent:'flex-end', padding:'8px 20px 0' }}>
            <div onClick={() => setPauseConfirm(true)} style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer', padding:'4px 12px', borderRadius:20, background: aiPaused ? '#fef2f2' : '#f0fdf4', border:`1px solid ${aiPaused ? '#fecaca' : '#bbf7d0'}` }}>
              <div style={{ width:6, height:6, borderRadius:3, background: aiPaused ? '#dc2626' : '#16a34a' }} />
              <span style={{ fontSize:11, fontWeight:500, color: aiPaused ? '#dc2626' : '#16a34a' }}>{aiPaused ? 'Paused' : 'Active'}</span>
            </div>
          </div>
          <div style={{ padding:'0 20px' }}>
            <DailyReport collapsed={reportCollapsed} onToggle={() => setReportCollapsed(!reportCollapsed)} />
            {/* List mode tabs */}
            <div style={{ display:'flex', gap:0, borderBottom:`1px solid ${T.lightGray}`, marginBottom:16 }}>
              {listTabs.map(tab => (
                <div key={tab.id} onClick={() => setActiveTab(tab.id)}
                  style={{ flex:1, textAlign:'center', padding:'10px 0 10px', cursor:'pointer', position:'relative',
                    fontSize:12, fontWeight: activeTab === tab.id ? 600 : 400,
                    color: activeTab === tab.id ? T.ink : T.gray, transition:'all .2s' }}>
                  {tab.label}
                  {tab.count !== null && tab.count > 0 && (
                    <span style={{ fontSize:9, fontWeight:600, background: activeTab === tab.id ? T.ink : '#ddd', color: activeTab === tab.id ? '#fff' : T.gray,
                      padding:'1px 6px', borderRadius:10, marginLeft:4, verticalAlign:'top' }}>{tab.count}</span>
                  )}
                  {activeTab === tab.id && <div style={{ position:'absolute', bottom:-1, left:'20%', right:'20%', height:2, background:T.ink, borderRadius:1 }} />}
                </div>
              ))}
            </div>
          </div>

          {/* Scrollable content */}
          <div ref={scrollRef} onScroll={handleScroll}
            style={{ flex:1, overflowY:'auto', padding:'0 10px 100px 20px' }}>
            {activeTab === 'dms' && <DMsTab onOpenChat={handleOpenChat} answeredChats={answeredChats} />}
            {activeTab === 'comments' && <EngagementTab />}
            {activeTab === 'handled' && <HandledTab />}
          </div>
        </>
      )}

      {/* Pause confirmation modal */}
      {pauseConfirm && (
        <div style={{ position:'absolute', inset:0, zIndex:80, background:'rgba(0,0,0,0.3)', display:'flex', alignItems:'center', justifyContent:'center', padding:40 }}>
          <div style={{ background:'#fff', borderRadius:16, padding:'24px 20px', maxWidth:300, width:'100%' }}>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink, marginBottom:8 }}>{aiPaused ? 'Resume Chatty?' : 'Pause Chatty?'}</div>
            <div style={{ fontSize:13, color:T.gray, lineHeight:1.5, marginBottom:20 }}>
              {aiPaused ? "Chatty will start replying to new messages again." : "Chatty will stop replying until you resume. New messages will get drafts instead."}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={() => { setAiPaused(!aiPaused); setPauseConfirm(false); }} style={{ flex:1, padding:'12px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
                {aiPaused ? 'Resume' : 'Pause'}
              </button>
              <button onClick={() => setPauseConfirm(false)} style={{ padding:'12px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Chat Detail Overlay */}
      {openChat && (
        <ChatDetail
          item={openChat.item}
          label={openChat.label}
          labelColor={openChat.labelColor}
          isSensitive={openChat.isSensitive}
          onClose={() => setOpenChat(null)}
          onSent={(user) => setAnsweredChats(prev => new Set([...prev, user]))}
        />
      )}
    </div>
  );
}


/* ─── LEGACY: Focus Mode (kept for reference but unused in v2) ─── */
function FocusMode({ reviewIdx, setReviewIdx }) {
  const [phase, setPhase] = useState('greeting'); // greeting, reviewing, batch, takeover, done
  const [sentItems, setSentItems] = useState([]);
  const [batchMode, setBatchMode] = useState(true);
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState('');
  const [batchExpanded, setBatchExpanded] = useState(false);
  const scrollRef = useRef(null);

  const currentItem = REVIEWS[reviewIdx];
  const allDone = reviewIdx >= REVIEWS.length;

  const batchItems = currentItem && currentItem.batch && batchMode
    ? REVIEWS.filter(r => r.batch === currentItem.batch && REVIEWS.indexOf(r) >= reviewIdx)
    : [];
  const isBatch = batchItems.length >= 2 && batchMode;

  const startReviewing = () => setPhase('reviewing');

  const handleApprove = () => {
    setSentItems(s => [...s, currentItem]);
    setReviewIdx(i => i+1);
    setEditing(false);
    setPhase('reviewing');
  };
  const handleBatchApprove = () => {
    setSentItems(s => [...s, ...batchItems]);
    setReviewIdx(i => i + batchItems.length);
    setBatchMode(false);
    setPhase('reviewing');
  };
  const handleSkip = () => { setReviewIdx(i => i+1); setEditing(false); setPhase('reviewing'); };

  // Check if done after state changes
  useEffect(() => {
    if(phase === 'reviewing' && reviewIdx >= REVIEWS.length) setPhase('done');
  }, [reviewIdx, phase]);

  // Check if next item is a batch
  useEffect(() => {
    if(phase === 'reviewing' && isBatch) setPhase('batch');
  }, [reviewIdx, phase]);

  useEffect(() => {
    if(scrollRef.current) setTimeout(() => { scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 50);
  }, [phase, reviewIdx, sentItems.length, editing]);

  useEffect(() => { if(currentItem) setEditVal(currentItem.draft); }, [reviewIdx]);

  return (
    <div style={{ height:'calc(100% - 120px)', display:'flex', flexDirection:'column' }}>
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'0 24px 20px' }}>

        {/* ── Phase: Greeting (clean, one message) ── */}
        {phase === 'greeting' && (
          <div className="fade-up" style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', paddingTop:40 }}>
            <div style={{ fontSize:48, marginBottom:32 }}>💬</div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>Chatty</div>
              <div style={{ background:T.warmGray, borderRadius:16, borderTopLeftRadius:4, padding:'16px 20px', maxWidth:'90%' }}>
                <div style={{ fontSize:16, color:T.ink, lineHeight:1.5 }}>
                  Good morning ☀️
                </div>
                <div style={{ fontSize:14, color:T.ink, lineHeight:1.6, marginTop:10 }}>
                  Chatty drafted responses for 2 lead inquiries and 1 FAQ. Ready when you are.
                </div>
                <div style={{ fontSize:14, color:T.ink, marginTop:12, fontWeight:500 }}>
                  {REVIEWS.length} replies to review. Wanna take a look?
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── Phase: Reviewing (one task at a time, scrollable history) ── */}
        {(phase === 'reviewing' || phase === 'batch' || phase === 'takeover') && (
          <>
            {/* Sent items scroll history */}
            {sentItems.map((item) => (
              <SentBubble key={`sent-${item.id}`} item={item} />
            ))}

            {/* Current single task */}
            {phase === 'reviewing' && currentItem && !isBatch && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5, display:'flex', alignItems:'center', gap:5 }}>
                    💬 Chatty · {reviewIdx+1} of {REVIEWS.length}
                  </div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'14px 16px', maxWidth:'90%' }}>
                    <div style={{ fontSize:14, fontWeight:600, color:T.ink, marginBottom:4 }}>
                      {currentItem.user} <span style={{ fontWeight:400, color:T.gray }}>· {currentItem.source}</span>
                    </div>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>
                      {NARRATIONS[currentItem.id]}
                    </div>
                  </div>
                </div>

                {/* Their message */}
                <div style={{ marginLeft:16, marginBottom:10 }}>
                  <div style={{ padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:12, borderTopLeftRadius:4, maxWidth:'85%' }}>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5, fontStyle:'italic' }}>"{currentItem.msg}"</div>
                  </div>
                </div>

                {/* Draft intro + draft */}
                <div style={{ marginBottom:6 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Chatty</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'10px 16px', maxWidth:'55%', fontSize:13, color:T.ink }}>
                    I'd answer with this:
                  </div>
                </div>
                <div style={{ marginLeft:16, marginBottom:8 }}>
                  {!editing ? (
                    <div style={{ padding:'14px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:12, maxWidth:'90%' }}>
                      <div style={{ fontSize:14, color:T.ink, lineHeight:1.55 }}>{currentItem.draft}</div>
                    </div>
                  ) : (
                    <div style={{ maxWidth:'90%' }}>
                      <textarea value={editVal} onChange={e=>setEditVal(e.target.value)}
                        style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:'14px 16px', border:`2px solid ${T.accent}`, borderRadius:12, resize:'none', height:100, fontFamily:'Inter', background:'#fff', outline:'none' }} />
                      <div style={{ display:'flex', gap:6, marginTop:8, flexWrap:'wrap' }}>
                        {['Shorter','Warmer','Add a question','More direct'].map(c => (
                          <span key={c} style={{ fontSize:11, padding:'5px 12px', borderRadius:20, border:`1px solid ${T.lightGray}`, cursor:'pointer', color:T.ink, fontWeight:500, background:'#fff' }}>{c}</span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Batch */}
            {phase === 'batch' && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Chatty</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'14px 16px', maxWidth:'90%' }}>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>
                      These {batchItems.length} are very similar — all FAQ replies about your program. Want to approve them all?
                    </div>
                  </div>
                </div>
                <div style={{ marginLeft:16, marginBottom:8 }}>
                  {(batchExpanded ? batchItems : batchItems).map((item,i) => (
                    <div key={i} style={{ padding:'12px 14px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:10, marginBottom:6,
                      opacity: !batchExpanded && i > 0 ? 0.6 : 1 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:T.ink }}>{item.user} <span style={{ fontWeight:400, color:T.gray }}>· {item.type}</span></div>
                      <div style={{ fontSize:13, color:T.gray, fontStyle:'italic', marginTop:3 }}>"{item.msg.slice(0,50)}{item.msg.length>50?'...':''}"</div>
                      {batchExpanded && (
                        <div style={{ fontSize:12, color:T.ink, marginTop:8, paddingTop:8, borderTop:`1px solid ${T.lightGray}`, lineHeight:1.4 }}>
                          Draft: {item.draft}
                        </div>
                      )}
                    </div>
                  ))}
                  {!batchExpanded && (
                    <div onClick={() => setBatchExpanded(true)} style={{ fontSize:12, color:T.accent, cursor:'pointer', marginTop:4, fontWeight:500 }}>
                      Show drafts →
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Take over */}
            {phase === 'takeover' && currentItem && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Chatty</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'12px 16px', maxWidth:'65%', fontSize:14, color:T.ink }}>
                    All yours! Write your reply:
                  </div>
                </div>
                <div style={{ marginLeft:16, maxWidth:'90%' }}>
                  <textarea placeholder="Type your reply..."
                    style={{ width:'100%', padding:'14px 16px', borderRadius:12, border:`1px solid ${T.lightGray}`, fontSize:14, lineHeight:1.5, resize:'none', height:90, fontFamily:'Inter', background:'#fff', outline:'none', color:T.ink }} />
                </div>
              </div>
            )}
          </>
        )}

        {/* ── Phase: Done ── */}
        {phase === 'done' && (
          <>
            {sentItems.map((item) => (
              <SentBubble key={`sent-${item.id}`} item={item} />
            ))}
            <div className="fade-up" style={{ textAlign:'center', padding:'40px 20px' }}>
              <div style={{ fontSize:48, marginBottom:16 }}>✨</div>
              <h2 style={{ fontSize:22, fontWeight:700, color:T.ink, marginBottom:8 }}>All caught up</h2>
              <p style={{ fontSize:14, color:T.gray, lineHeight:1.5 }}>Chatty learned 2 new preferences from your edits.</p>
              <p style={{ fontSize:13, color:'#bbb', marginTop:20 }}>Go create something.</p>
            </div>
          </>
        )}
      </div>

      {/* ─── Pinned bottom bar ─── */}
      {phase === 'greeting' && (
        <div style={{ padding:'12px 24px 28px', display:'flex', gap:10 }}>
          <button style={{ flex:1, padding:'14px 0', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:14, fontWeight:500, cursor:'pointer', color:T.ink }}>
            Summary first
          </button>
          <button onClick={startReviewing} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            Start reviewing
          </button>
        </div>
      )}

      {phase === 'reviewing' && currentItem && !isBatch && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8, alignItems:'center' }}>
          <button onClick={handleApprove} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            {editing ? 'Send edited' : 'Approve'}
          </button>
          <button onClick={() => { setEditing(!editing); if(currentItem) setEditVal(currentItem.draft); }}
            style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.ink }}>
            {editing ? 'Cancel' : 'Edit'}
          </button>
          <button onClick={handleSkip} style={{ padding:'14px 16px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
            Skip
          </button>
          <button onClick={() => setPhase('takeover')} style={{ padding:'14px 0', background:'transparent', border:'none', fontSize:11, fontWeight:500, cursor:'pointer', color:'#bbb' }}>
            I'll take over
          </button>
        </div>
      )}

      {phase === 'batch' && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8 }}>
          <button onClick={handleBatchApprove} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            Approve all {batchItems.length}
          </button>
          <button onClick={() => { setBatchMode(false); setPhase('reviewing'); }} style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.ink }}>
            One by one
          </button>
        </div>
      )}

      {phase === 'takeover' && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8 }}>
          <button onClick={() => { setSentItems(s => [...s, currentItem]); setReviewIdx(i=>i+1); setPhase('reviewing'); }}
            style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            Send my reply
          </button>
          <button onClick={() => setPhase('reviewing')} style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
            Back
          </button>
        </div>
      )}
    </div>
  );
}

            <div><span style={{ fontSize:24, fontWeight:700, color:'#fff' }}>34</span><span style={{ fontSize:11, color:'#666', marginLeft:4 }}>DMs</span></div>
            <div><span style={{ fontSize:24, fontWeight:700, color:'#fff' }}>126</span><span style={{ fontSize:11, color:'#666', marginLeft:4 }}>comments</span></div>
            <div><span style={{ fontSize:24, fontWeight:700, color:'#fff' }}>4</span><span style={{ fontSize:11, color:'#666', marginLeft:4 }}>corrections</span></div>
          </div>
          {/* Mini bar */}
          <div style={{ height:4, background:'#2a2a2c', borderRadius:2, overflow:'hidden', marginBottom:10 }}>
            <div style={{ width:'85%', height:'100%', background:T.mint, borderRadius:2 }} />
          </div>
          <div style={{ fontSize:12, color:'#666' }}>2m avg response time</div>
        </div>

        {/* Approval rates */}
        <div style={{ background:T.darkSurface, borderRadius:16, padding:'20px', marginBottom:20, border:`1px solid ${T.darkBorder}` }}>
          <div style={{ fontSize:13, fontWeight:600, color:'#999', marginBottom:16, letterSpacing:'0.05em', textTransform:'uppercase' }}>Approval rates</div>
          {[
            { name:'FAQ replies', pct:82 },
            { name:'Lead qualification', pct:74 },
            { name:'Positive comments', pct:91 },
          ].map((s,i) => (
            <div key={i} style={{ marginBottom:i<2?16:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                <span style={{ fontSize:13, color:'#ccc' }}>{s.name}</span>
                <span style={{ fontSize:13, color:T.mint, fontWeight:600 }}>{s.pct}%</span>
              </div>
              <div style={{ height:4, background:'#2a2a2c', borderRadius:2, overflow:'hidden' }}>
                <div style={{ width:`${s.pct}%`, height:'100%', background:T.mint, borderRadius:2, transition:'width .5s ease' }} />
              </div>
            </div>
          ))}
        </div>

        {/* Recent auto-handled */}
        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:13, fontWeight:600, color:'#999', marginBottom:14, letterSpacing:'0.05em', textTransform:'uppercase' }}>Recently handled</div>
          {AI_HANDLED.map((item,i) => (
            <div key={i}>
              <div onClick={() => setExpanded(expanded===i?null:i)}
                style={{ background:T.darkSurface, borderRadius: expanded===i ? '14px 14px 0 0' : 14, padding:'14px 18px', marginBottom: expanded===i ? 0 : 8,
                  border:`1px solid ${T.darkBorder}`, cursor:'pointer', transition:'all .15s ease',
                  borderBottom: expanded===i ? 'none' : undefined }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span style={{ fontSize:14, fontWeight:500, color:'#ddd' }}>{item.user}</span>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ fontSize:10, color:T.mintDim, background:'rgba(79,255,176,0.1)', padding:'2px 10px', borderRadius:20 }}>{item.type}</span>
                    <span style={{ fontSize:11, color:'#555' }}>{item.status}</span>
                  </div>
                </div>
                <div style={{ fontSize:13, color:'#777', marginTop:5 }}>{item.msg}</div>
              </div>
              {expanded===i && item.draft && (
                <div className="fade-in" style={{ background:T.darkSurface, borderRadius:'0 0 14px 14px', padding:'0 18px 16px', marginBottom:8,
                  border:`1px solid ${T.darkBorder}`, borderTop:'none' }}>
                  <div style={{ borderTop:`1px solid ${T.darkBorder}`, paddingTop:14 }}>
                    <div style={{ fontSize:12, color:'#666', marginBottom:6 }}>Chatty replied:</div>
                    <div style={{ fontSize:13, color:'#bbb', lineHeight:1.5, marginBottom:14 }}>{item.draft}</div>
                    <div style={{ display:'flex', gap:8 }}>
                      <span style={{ fontSize:12, padding:'6px 16px', background:'rgba(79,255,176,0.15)', color:T.mint, borderRadius:20, cursor:'pointer', fontWeight:500 }}>Looks good</span>
                      <span style={{ fontSize:12, padding:'6px 16px', border:`1px solid ${T.darkBorder}`, color:'#888', borderRadius:20, cursor:'pointer' }}>Flag this</span>
                    </div>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Patterns learned */}
        <div style={{ background:T.darkSurface, borderRadius:16, padding:'20px', border:`1px solid ${T.darkBorder}` }}>
          <div style={{ fontSize:13, fontWeight:600, color:'#999', marginBottom:10, letterSpacing:'0.05em', textTransform:'uppercase' }}>Patterns learned</div>
          <div style={{ fontSize:13, color:T.mint, marginBottom:10 }}>3 new this week</div>
          <div style={{ fontSize:12, color:'#777', lineHeight:1.6 }}>
            Shorter lead replies · Emoji-free FAQs ·<br/>Warmer tone for comments
          </div>
        </div>
      </div>
    </div>
  );
}
