/* ─── Shared: Progress Ring (SVG) ─── */
function ProgressRing({ progress, size = 120, stroke = 6 }) {
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (progress / 100) * circumference;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={T.lightGray} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={T.accent} strokeWidth={stroke}
        strokeDasharray={circumference} strokeDashoffset={offset}
        strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.6s ease' }} />
    </svg>
  );
}

/* Staggered fade-in messages (replaces TypeWriter — 2s instead of 25s) */
function InboxMessages({ messages, onAllDone }) {
  const [visibleCount, setVisibleCount] = useState(0);

  useEffect(() => {
    messages.forEach((_, i) => {
      setTimeout(() => {
        setVisibleCount(i + 1);
        if (i === messages.length - 1 && onAllDone) {
          setTimeout(onAllDone, 400);
        }
      }, 300 + i * 500);
    });
  }, [messages.length]);

  return (
    <div>
      {messages.map((msg, i) => (
        <div key={i} style={{ marginBottom: 10, opacity: i < visibleCount ? 1 : 0, transform: i < visibleCount ? 'translateY(0)' : 'translateY(12px)', transition: 'all .35s ease-out' }}>
          {i === 0 && (
            <div style={{ fontSize: 12, color: T.gray, marginBottom: 6, fontWeight: 500, letterSpacing: '0em' }}>
              Inbox
            </div>
          )}
          <div style={{ background: T.warmGray, borderRadius: 18, borderTopLeftRadius: i === 0 ? 18 : 6, padding: '14px 18px', maxWidth: '88%', display: 'inline-block' }}>
            <div style={{ fontSize: 15, color: T.ink, lineHeight: 1.55, letterSpacing: '-0.01em' }}>{msg}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

        <div style={{ height: '100%', background: T.accent, width: `${(step / total) * 100}%`, transition: 'width .5s cubic-bezier(.25,.46,.45,.94)' }} />

      {label && (
        <div style={{ padding: '10px 28px 0', fontSize: 10, color: T.gray, fontWeight: 500, letterSpacing: '0.02em' }}>
          Step {step} of {total} · {label}
        </div>

  );
}

function ObSorting({ onNext, onSkip }) {
  const [phase, setPhase] = useState('loading1'); // loading1 | question | loading2
  const [count, setCount] = useState(0);
  const [statusIdx, setStatusIdx] = useState(0);
  const [selected, setSelected] = useState({ leads: true, comments: false, collabs: false, scheduling: true });
  const [customText, setCustomText] = useState('');
  const [showCustom, setShowCustom] = useState(false);
  const customRef = useRef(null);
  const timers = useRef([]);

  const loading1Status = [
    'Let me pull in your messages...',
    'Going through your DMs...',
    'Found some that look interesting...',
    'Filtering out the noise...',
  ];
  const loading2Status = [
    'Setting things up for you...',
    'Sorting by what matters most...',
    'Matching your tone and voice...',
  ];
  const countSteps = [0, 46, 87, 118, 142];

  useEffect(() => {
    return () => timers.current.forEach(t => clearTimeout(t));
  }, []);

  useEffect(() => {
    if (phase === 'loading1') {
      setCount(0);
      setStatusIdx(0);
      countSteps.forEach((val, i) => {
        if (i === 0) return;
        timers.current.push(setTimeout(() => setCount(val), i * 1200));
      });
      loading1Status.forEach((_, i) => {
        timers.current.push(setTimeout(() => setStatusIdx(i), i * 1200));
      });
      timers.current.push(setTimeout(() => setPhase('question'), loading1Status.length * 1200 + 600));
    }
    if (phase === 'loading2') {
      setStatusIdx(0);
      loading2Status.forEach((_, i) => {
        timers.current.push(setTimeout(() => setStatusIdx(i), i * 1000));
      });
      timers.current.push(setTimeout(onNext, loading2Status.length * 1000 + 800));
    }
  }, [phase]);

  const progress = phase === 'loading1' ? (count / 142) * 60 : phase === 'question' ? 65 : 65 + (statusIdx / (loading2Status.length - 1)) * 35;
  const statusLines = phase === 'loading1' ? loading1Status : loading2Status;

  if (phase === 'question') {
    return (
      <div className="fade-up" style={{ background: T.paper, height: '100%', display: 'flex', flexDirection: 'column', position: 'relative' }}>
        {/* Compact progress at top */}
        <div style={{ padding: '52px 28px 0' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 28 }}>
            <ProgressRing progress={65} size={36} stroke={3} />
            <span style={{ fontSize: 13, color: T.gray, fontWeight: 500 }}>142 DMs scanned</span>
          </div>

          {/* Question */}
          <div style={{ fontSize: 11, color: T.gray, marginBottom: 8, fontWeight: 500 }}>Inbox</div>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: T.ink, lineHeight: 1.2, letterSpacing: '-0.02em', marginBottom: 8 }}>
            While I sort your messages — what matters most to you?
          </h2>
          <p style={{ fontSize: 14, color: T.gray, lineHeight: 1.5, marginBottom: 24 }}>
            Based on your business <span style={{ fontWeight: 600, color: T.ink }}>Sofia Reyes Coaching</span>, I suggest:
          </p>

          {/* Options */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <SelectChip label="People interested in coaching" desc="Leads asking about your services" selected={selected.leads} onClick={() => setSelected(s => ({...s, leads: !s.leads}))} />
            <SelectChip label="Comments on my posts" desc="Engage with your audience" selected={selected.comments} onClick={() => setSelected(s => ({...s, comments: !s.comments}))} />
            <SelectChip label="Collaboration requests" desc="Brand deals and partnerships" selected={selected.collabs} onClick={() => setSelected(s => ({...s, collabs: !s.collabs}))} />
            <SelectChip label="Scheduling and booking" desc="Session requests and reschedules" selected={selected.scheduling} onClick={() => setSelected(s => ({...s, scheduling: !s.scheduling}))} />

            {/* Custom "Other" option */}
            {!showCustom ? (
              <div onClick={() => { setShowCustom(true); setTimeout(() => customRef.current?.focus(), 100); }}
                style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px', borderRadius: 14,
                  border: `1.5px dashed ${T.lightGray}`, background: T.cardBg, cursor: 'pointer', transition: 'all .2s ease' }}>
                <div style={{ width: 24, height: 24, borderRadius: 12, border: `2px solid ${T.lightGray}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 14, color: T.gray, lineHeight: 1 }}>+</div>
                <div style={{ fontSize: 15, fontWeight: 500, color: T.gray, letterSpacing: '-0.01em' }}>Something else...</div>
              </div>
            ) : (
              <div className="fade-up" style={{ padding: '14px 16px', borderRadius: 14,
                border: `1.5px solid ${customText.trim() ? T.accent : T.lightGray}`,
                background: customText.trim() ? '#EBF4FF' : T.cardBg, transition: 'all .2s ease' }}>
                <textarea ref={customRef} value={customText} onChange={e => setCustomText(e.target.value)}
                  placeholder="Type what matters to you..."
                  style={{ width: '100%', fontSize: 14, color: T.ink, lineHeight: 1.5, padding: 0, border: 'none', resize: 'none',
                    height: 48, fontFamily: 'Inter', background: 'transparent', outline: 'none',
                    letterSpacing: '-0.01em' }} />
              </div>
            )}
          </div>
        </div>

        <div style={{ marginTop: 'auto', padding: '16px 28px 50px' }}>
          <BlackBtn label="Set up Inbox" onClick={() => setPhase('loading2')} disabled={!Object.values(selected).some(Boolean) && !customText.trim()} />
        </div>
      </div>
    );
  }

  // Loading phases (1 and 2)
  return (
    <div className="fade-up" style={{ background: T.paper, height: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', position: 'relative' }}>

        <ProgressRing progress={progress} size={120} stroke={6} />
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ fontSize: 32, fontWeight: 700, color: T.ink, letterSpacing: '-0.03em', lineHeight: 1 }}>{phase === 'loading1' ? count : 142}</div>
          <div style={{ fontSize: 11, color: T.gray, marginTop: 4 }}>DMs scanned</div>
        </div>
      </div>

      {/* Status text */}

        {statusLines[statusIdx]}

      {/* Skip */}
      <div style={{ position: 'absolute', bottom: 50, left: 0, right: 0 }}>

    </div>
  );

          {tab.count !== null && tab.count > 0 && (
            <span style={{ fontSize:9, fontWeight:600, background: active === tab.id ? T.ink : T.lightGray, color: active === tab.id ? '#fff' : T.gray,
              padding:'2px 7px', borderRadius:10, marginLeft:5, verticalAlign:'top' }}>{tab.count}</span>
          )}
          {active === tab.id && <div style={{ position:'absolute', bottom:-1, left:'20%', right:'20%', height:2, background:T.accent, borderRadius:1 }} />}
        </div>
      ))}
    </div>
  );
}

/* ─── Section header inside tabs ─── */
function SectionLabel({ label, count }) {

      {count !== undefined && <span style={{ fontSize:12, color:T.gray }}>· {count}</span>}

}

/* ─── Message row (IG DM style) ─── */
function MsgRow({ user, name, avatar, msg, time, badge, badgeColor, onClick, hasDraft, unread }) {

}

/* ─── Chat Detail (full-screen overlay) ─── */
function ChatDetail({ item, label, labelColor, onClose, isSensitive, onSent, draftMode, onSkipDraft, onDraftFeedback }) {
  const useSuggestMode = draftMode === 'suggest' && item.draft && !isSensitive;

  // Modes:
  // suggest — AI proposes next action at bottom
  // inline — draft shown in chat body, input at bottom (fallback after feedback)
  // editing — editing draft (works in both modes)
  // custom — user writing from scratch
  // sent — message sent
  // summary — sensitive message summary
  // feedback — AI asks why user keeps skipping drafts
  const getInitialMode = () => {
    if (isSensitive) return 'summary';
    if (!item.draft) return 'custom';
    return useSuggestMode ? 'suggest' : 'inline';
  };

  const [mode, setMode] = useState(getInitialMode);
  const [editVal, setEditVal] = useState(item.draft || '');
  const [customVal, setCustomVal] = useState('');
  const [showToast, setShowToast] = useState(false);
  const [toastMsg, setToastMsg] = useState('');
  const [sentMsg, setSentMsg] = useState('');
  const [activeTone, setActiveTone] = useState(null);
  const originalDraft = item.draft || '';
  const chatBodyRef = useRef(null);

  const triggerToast = (msg) => {
    setToastMsg(msg);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 2500);
  };

  const handleSend = () => {
    const msg = (mode === 'editing') ? editVal : item.draft;
    setSentMsg(msg);
    setMode('sent');
    if (mode === 'editing') {
      triggerToast(activeTone
        ? 'Got it — ' + activeTone.toLowerCase() + ' tone for similar messages.'
        : 'Noted — I\'ll adjust my style based on your edit.');
    }
    if (onSent) onSent(item.user);
  };

  const handleSendCustom = () => {
    if (!customVal.trim()) return;
    setSentMsg(customVal);
    setMode('sent');
    if (onSent) onSent(item.user);
    triggerToast('Got it — I\'ll adjust for next time');
  };

  const handleIllReply = () => {
    if (onSkipDraft) {
      const count = onSkipDraft();
      if (count >= 5) {
        // 5th skip — trigger feedback
        setMode('feedback');
        return;
      }
    }
    setMode('custom');
    setCustomVal('');
  };

  const handleFeedbackChoice = (reason) => {
    triggerToast('Got it — ' + reason + '. I\'ll adjust.');
    if (onDraftFeedback) onDraftFeedback(); // switches parent to inline mode
    setMode('custom');
    setCustomVal('');
  };

  // Scroll chat to bottom on mode change
  useEffect(() => {
    if (chatBodyRef.current) {
      setTimeout(() => { chatBodyRef.current.scrollTop = chatBodyRef.current.scrollHeight; }, 50);
    }
  }, [mode]);

  // Conversation history
  const chatHistory = [
    { from: 'them', text: item.msg, time: item.time || '2h ago' },
  ];
  if (item.source === 'DM') {
    chatHistory.unshift({ from: 'them', text: 'Hey!', time: '2h ago' });
  }

  return (
    <div className="fade-up" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={(e) => { e.stopPropagation(); onClose(); }} style={{ cursor:'pointer', fontSize:20, color:T.ink, fontWeight:300, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          {item.avatar && <img src={item.avatar} alt="" style={{ width:36, height:36, borderRadius:18, objectFit:'cover', background:T.lightGray }} />}
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink, letterSpacing:'-0.01em' }}>{item.name || item.user}</div>
            <div style={{ fontSize:11, color:T.gray }}>{item.user}</div>
          </div>
        </div>
      </div>

      {/* Chat body — always scrollable, never covered */}
      <div ref={chatBodyRef} style={{ flex:1, overflowY:'auto', padding:'20px 20px 12px' }}>
        {chatHistory.map((m, i) => (
          <div key={i} style={{ marginBottom:12, display:'flex', justifyContent: m.from === 'you' ? 'flex-end' : 'flex-start' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:18, background: m.from === 'you' ? T.ink : T.cardBg, color: m.from === 'you' ? '#fff' : T.ink, border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 6 : 18, borderTopRightRadius: m.from === 'you' ? 6 : 18 }}>
              <div style={{ fontSize:14, lineHeight:1.5, letterSpacing:'-0.01em' }}>{m.text}</div>
              <div style={{ fontSize:10, color: m.from === 'you' ? 'rgba(255,255,255,0.45)' : T.gray, marginTop:4, textAlign:'right' }}>{m.time}</div>
            </div>
          </div>
        ))}

        {/* Summary for sensitive */}
        {mode === 'summary' && item.summary && (
          <div className="fade-up" style={{ marginBottom:12 }}>
            <div style={{ background:T.warmGray, borderRadius:14, padding:'14px 16px', maxWidth:'85%' }}>
              <div style={{ fontSize:10, fontWeight:600, color:T.gray, letterSpacing:'0.05em', marginBottom:6 }}>SUMMARY</div>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.55 }}>{item.summary}</div>
            </div>
          </div>
        )}

        {/* Inline draft (fallback mode — draft shown in chat body) */}
        {mode === 'inline' && item.draft && (
          <div className="fade-up" style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, marginBottom:4, fontWeight:500 }}>Inbox</div>
            <div style={{ display:'flex', justifyContent:'flex-end' }}>
              <div style={{ maxWidth:'85%' }}>
                <div style={{ padding:'13px 16px', borderRadius:18, borderTopRightRadius:6, border:`1.5px dashed ${T.lightGray}`, background:T.warmGray }}>
                  <div style={{ fontSize:14, lineHeight:1.5, color:T.ink, letterSpacing:'-0.01em' }}>{item.draft}</div>
                </div>
                <div style={{ display:'flex', gap:6, marginTop:8 }}>
                  <button onClick={handleSend} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:20, fontSize:12, fontWeight:600, cursor:'pointer' }}>Send</button>
                  <button onClick={() => { setMode('editing'); setEditVal(item.draft); }} style={{ padding:'7px 14px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:20, fontSize:12, fontWeight:500, cursor:'pointer', color:T.ink }}>Edit</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Sent message */}
        {mode === 'sent' && (
          <div className="fade-up" style={{ marginBottom:12, display:'flex', justifyContent:'flex-end' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:18, borderTopRightRadius:6, background:T.ink, color:'#fff' }}>
              <div style={{ fontSize:14, lineHeight:1.5, letterSpacing:'-0.01em' }}>{sentMsg}</div>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.4)', marginTop:4, textAlign:'right' }}>Just now</div>
            </div>
          </div>
        )}
      </div>

      {/* ═══ Bottom: AI suggestion (next action) ═══ */}
      {mode === 'suggest' && item.draft && (
        <div className="fade-up" style={{ flexShrink:0, background:T.paper, padding:'0 20px 40px' }}>
          <div style={{ height:1, background:T.lightGray, marginBottom:16 }} />

          {/* Conversational agent message */}
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:T.gray, marginBottom:6, fontWeight:500, letterSpacing:'0em' }}>Inbox</div>
            <div style={{ fontSize:14, color:T.ink, lineHeight:1.55, letterSpacing:'-0.01em' }}>
              {item.reason}
            </div>
          </div>

          {/* Proposed message */}
          <div style={{ background:T.warmGray, borderRadius:14, padding:'13px 16px', marginBottom:12 }}>
            <div style={{ fontSize:14, color:T.ink, lineHeight:1.5, letterSpacing:'-0.01em' }}>{item.draft}</div>
          </div>

          {/* Permission ask */}
          <div style={{ fontSize:14, color:T.ink, lineHeight:1.55, letterSpacing:'-0.01em', marginBottom:16 }}>
            Can I send this?
          </div>

          {/* Actions */}
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <button onClick={handleSend}
              style={{ flex:1, padding:'12px 0', background:T.ink, color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:600, cursor:'pointer', letterSpacing:'-0.01em' }}>
              Send it
            </button>
            <button onClick={() => { setMode('editing'); setEditVal(item.draft); }}
              style={{ flex:1, padding:'12px 0', background:'transparent', border:`1.5px solid ${T.lightGray}`, borderRadius:12, fontSize:14, fontWeight:500, cursor:'pointer', color:T.ink, letterSpacing:'-0.01em' }}>
              Let me edit
            </button>
            <button onClick={handleIllReply}
              style={{ padding:'12px 14px', background:'transparent', border:'none', fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray, flexShrink:0 }}>
              I'll write this one
            </button>
          </div>
        </div>
      )}

      {/* ═══ Bottom: Edit mode ═══ */}
      {mode === 'editing' && (
        <div className="fade-up" style={{ flexShrink:0, background:T.paper, padding:'0 20px 40px' }}>
          <div style={{ height:1, background:T.lightGray, marginBottom:16 }} />

          <textarea value={editVal} onChange={e => setEditVal(e.target.value)} autoFocus
            style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:'13px 16px', border:`1.5px solid ${T.ink}`, borderRadius:14, resize:'none', height:80, fontFamily:'Inter, system-ui, sans-serif', background:'#fff', outline:'none', letterSpacing:'-0.01em', boxSizing:'border-box' }} />

          {/* Tone chips */}
          <div style={{ display:'flex', gap:6, marginTop:10, flexWrap:'wrap' }}>
            {['Friendly','Formal','Shorter','Direct'].map(tone => (
              <span key={tone} onClick={() => {
                setActiveTone(tone);
                const base = originalDraft;
                if (tone === 'Shorter') {
                  const sentences = base.split(/(?<=[.!?])\s+/);
                  setEditVal(sentences.slice(0, Math.ceil(sentences.length / 2)).join(' '));
                } else if (tone === 'Friendly') {
                  setEditVal('Hey! ' + base.charAt(0).toLowerCase() + base.slice(1).replace(/\.$/, '') + ' :)');
                } else if (tone === 'Formal') {
                  setEditVal('Thank you for reaching out. ' + base.replace(/!/g, '.').replace(/Hey!?\s*/gi, ''));
                } else if (tone === 'Direct') {
                  const sentences = base.split(/(?<=[.!?])\s+/);
                  setEditVal(sentences.filter(s => s.length > 20).join(' ') || base);
                }
              }} style={{ fontSize:12, padding:'6px 14px', borderRadius:20, border: activeTone === tone ? `1.5px solid ${T.ink}` : `1px solid ${T.lightGray}`, cursor:'pointer', color: activeTone === tone ? '#fff' : T.ink, fontWeight:500, background: activeTone === tone ? T.ink : '#fff', transition:'all .15s ease' }}>{tone}</span>
            ))}
          </div>

          <div style={{ display:'flex', gap:8, marginTop:12 }}>
            <button onClick={handleSend}
              style={{ flex:1, padding:'12px 0', background:T.ink, color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:600, cursor:'pointer' }}>
              Send
            </button>
            <button onClick={() => { setMode('suggest'); setActiveTone(null); setEditVal(item.draft); }}
              style={{ padding:'12px 20px', background:'transparent', border:'none', fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
              Back
            </button>
          </div>
        </div>
      )}

      {/* ═══ Bottom: Feedback — AI asks why user skips drafts ═══ */}
      {mode === 'feedback' && (
        <div className="fade-up" style={{ flexShrink:0, background:T.paper, padding:'0 20px 40px' }}>
          <div style={{ height:1, background:T.lightGray, marginBottom:16 }} />

          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:T.gray, marginBottom:6, fontWeight:500 }}>Inbox</div>
            <div style={{ fontSize:14, color:T.ink, lineHeight:1.55, letterSpacing:'-0.01em' }}>
              I noticed you prefer writing your own replies. That's totally fine — but it'd help me improve. What's off about my drafts?
            </div>
          </div>

          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {[
              'They don\'t sound like me',
              'Too generic',
              'I just prefer writing myself',
              'They\'re too long',
              'Wrong tone for this audience',
            ].map(reason => (
              <div key={reason} onClick={() => handleFeedbackChoice(reason)}
                style={{ padding:'12px 16px', background:T.warmGray, borderRadius:12, cursor:'pointer', fontSize:13, color:T.ink, letterSpacing:'-0.01em', transition:'all .15s ease' }}>
                {reason}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ═══ Bottom: Inline draft mode (draft in chat + input) ═══ */}
      {mode === 'inline' && item.draft && (
        <div style={{ flexShrink:0, borderTop:`1px solid ${T.lightGray}`, background:T.paper, padding:'12px 20px 40px' }}>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <div style={{ flex:1, padding:'11px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
              <input value={customVal} onChange={e => setCustomVal(e.target.value)}
                placeholder="Type your message..."
                onKeyDown={e => { if (e.key === 'Enter' && customVal.trim()) handleSendCustom(); }}
                style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter, system-ui, sans-serif' }} />
            </div>
            <div onClick={() => { if (customVal.trim()) handleSendCustom(); }}
              style={{ width:36, height:36, borderRadius:18, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background .2s', flexShrink:0 }}>
              <span style={{ color:'#fff', fontSize:13 }}>↑</span>
            </div>
          </div>
        </div>
      )}

      {/* ═══ Bottom: Free text input (custom / sent / summary) ═══ */}
      {(mode === 'custom' || mode === 'sent' || mode === 'summary') && (
        <div style={{ flexShrink:0, borderTop:`1px solid ${T.lightGray}`, background:T.paper, padding:'12px 20px 40px' }}>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <div style={{ flex:1, padding:'11px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
              <input value={customVal} onChange={e => setCustomVal(e.target.value)}
                placeholder="Type your message..."
                onKeyDown={e => { if (e.key === 'Enter' && customVal.trim()) handleSendCustom(); }}
                style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter, system-ui, sans-serif' }} />
            </div>
            <div onClick={() => { if (customVal.trim()) handleSendCustom(); }}
              style={{ width:36, height:36, borderRadius:18, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background .2s', flexShrink:0 }}>
              <span style={{ color:'#fff', fontSize:13 }}>↑</span>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {showToast && (
        <div style={{ position:'absolute', bottom:100, left:'50%', transform:'translateX(-50%)', background:T.ink, color:'#fff', padding:'10px 20px', borderRadius:10, fontSize:13, fontWeight:500, animation:'fadeUp .3s ease-out', whiteSpace:'nowrap', zIndex:110, boxShadow:'0 4px 16px rgba(28,26,22,.15)', letterSpacing:'-0.01em' }}>
          {toastMsg}
        </div>
      )}
    </div>
  );
}

/* ─── Important Tab ─── */
function ImportantTab({ onOpenChat, answeredChats }) {
  // Sort groups: groups with pending items first, fully answered groups at the bottom
  const sortedGroups = [...IMPORTANT_GROUPS].sort((a, b) => {
    const aPending = a.items.some(item => !answeredChats.has(item.user));
    const bPending = b.items.some(item => !answeredChats.has(item.user));
    if (aPending && !bPending) return -1;
    if (!aPending && bPending) return 1;
    return 0;
  });

  const renderAnsweredRow = (item) => (
    <div key={`a${item.user}`} onClick={() => onOpenChat(item, '', T.gray, !!item._sensitive)}
      style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 4px', opacity:0.4, cursor:'pointer' }}>
      <img src={item.avatar} alt="" style={{ width:40, height:40, borderRadius:20, objectFit:'cover', flexShrink:0, background:T.lightGray, filter:'grayscale(0.5)' }} />
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:2 }}>
          <span style={{ fontSize:14, fontWeight:500, color:T.gray, letterSpacing:'-0.01em' }}>{item.name || item.user}</span>
          <span style={{ fontSize:10, fontWeight:500, color:'#3D7A3D' }}>answered</span>
        </div>
        <div style={{ fontSize:13, color:T.gray, opacity:0.6, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.msg}</div>
      </div>
    </div>
  );

  return (
    <div>
      {sortedGroups.map((group, gi) => {
        const pending = group.items.filter(item => !answeredChats.has(item.user));
        const answered = group.items.filter(item => answeredChats.has(item.user));
        if (pending.length === 0 && answered.length === 0) return null;
        const allDone = pending.length === 0;

        return (
          <div key={gi} style={{ opacity: allDone ? 0.5 : 1, transition:'opacity .3s ease' }}>
            <IntentionHeader label={group.intention} count={allDone ? `${answered.length} answered` : group.items.length} />
            {pending.map((item) => (
              <MsgRow key={item.user} user={item.user} name={item.name} avatar={item.avatar} msg={item.msg} time={item.time}
                unread={item.unread} hasDraft={!item._sensitive && !!item.draft}
                onClick={() => onOpenChat(item, '', T.gray, !!item._sensitive)} />
            ))}
            {answered.map(renderAnsweredRow)}
          </div>
        );
      })}
    </div>
  );
}

/* ─── In-Progress Detail (full-screen conversation with feedback) ─── */
function InProgressDetail({ item, onClose }) {
  const [feedbackMsg, setFeedbackMsg] = useState(null); // index of AI msg being reviewed
  const [feedbackStep, setFeedbackStep] = useState(null); // 'pick' | 'reason' | 'correction' | 'done'
  const [selectedReason, setSelectedReason] = useState(null);
  const [correctionText, setCorrectionText] = useState('');
  const [correctedDraft, setCorrectedDraft] = useState('');

  const reasons = [
    'Too pushy / salesy',
    'Didn\'t answer the question',
    'Wrong tone',
    'Shared incorrect info',
    'Too long',
  ];

  const handleWrong = (idx) => { setFeedbackMsg(idx); setFeedbackStep('reason'); };
  const handleGood = (idx) => { setFeedbackMsg(idx); setFeedbackStep('done'); };

  const pickReason = (r) => {
    setSelectedReason(r);
    setFeedbackStep('correction');
    // Generate a "corrected" version
    const orig = item.conversation[feedbackMsg].text;
    if (r === 'Too pushy / salesy') setCorrectedDraft(orig.replace(/!+/g, '.').replace(/Want me to/, 'I can'));
    else if (r === 'Too long') setCorrectedDraft(orig.split('.').slice(0,2).join('.') + '.');
    else setCorrectedDraft(orig.replace(/\?$/, '. Let me know if you have questions.'));
  };

  const handleCorrectionGood = () => setFeedbackStep('done');

  return (
    <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={onClose} style={{ cursor:'pointer', fontSize:20, color:T.ink, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink }}>{item.user}</div>

function AllTab({ onOpenChat }) {
  const getOpacity = (category) => {
    return 1;

  // Map category to a clickable item for ChatDetail
  const getChatItem = (m) => {
    // Find matching item in IMPORTANT_DATA or QUESTIONS_DATA for draft info
    const allImportant = IMPORTANT_GROUPS.flatMap(g => g.items);
    const match = allImportant.find(item => item.user === m.user);
    if (match) return match;
    return { user: m.user, msg: m.msg, source: 'DM', time: m.time };

  const handleClick = (m) => {
    const item = getChatItem(m);
    const isSensitive = m.category === 'sensitive';
    onOpenChat(item, m.badge || '', m.badgeColor || T.gray, isSensitive);

  return (
    <div>

        <div key={i} onClick={() => handleClick(m)}

function InboxV2({ onOverlayChange }) {
  const [morningDismissed, setMorningDismissed] = useState(true); // skip morning report on first setup
  const [reportCollapsed, setReportCollapsed] = useState(true);
  const [summaryOpen, setSummaryOpen] = useState(false);
  const [activeTab, setActiveTab] = useState('important');
  const [openChat, setOpenChat] = useState(null);
  const [answeredChats, setAnsweredChats] = useState(new Set());
  const [leadWalkthroughDone, setLeadWalkthroughDone] = useState(false);
  const [showLeadWalkthrough, setShowLeadWalkthrough] = useState(false);
  const [showLeadDef, setShowLeadDef] = useState(false);
  const [chatCloseCount, setChatCloseCount] = useState(0);
  const [showNotifModal, setShowNotifModal] = useState(false);
  const [notifModalDone, setNotifModalDone] = useState(false);
  const [headerHidden, setHeaderHidden] = useState(false);
  const [showPriorities, setShowPriorities] = useState(false);
  const [skipDraftCount, setSkipDraftCount] = useState(0);
  const [draftMode, setDraftMode] = useState('suggest'); // 'suggest' | 'inline'
  const scrollRef = useRef(null);
  const lastScrollTop = useRef(0);

  // Report overlay state AND scroll-hide to parent for nav visibility
  useEffect(() => {
    const anyOverlay = !!openChat || summaryOpen || showLeadWalkthrough || showLeadDef || showNotifModal || showPriorities;
    if (onOverlayChange) onOverlayChange(anyOverlay || headerHidden);
  }, [openChat, summaryOpen, showLeadWalkthrough, showLeadDef, showNotifModal, showPriorities, headerHidden]);

  const handleScroll = () => {
    if (!scrollRef.current) return;
    const st = scrollRef.current.scrollTop;
    const delta = st - lastScrollTop.current;

    if (delta > 5 && st > 40) {
      // Scrolling down
      setHeaderHidden(true);
    } else if (delta < -5) {
      // Scrolling up
      setHeaderHidden(false);
    }
    lastScrollTop.current = st;
  };

  const handleOpenChat = (item, label, labelColor, isSensitive) => {
    setOpenChat({ item, label, labelColor, isSensitive });
    // First time opening a lead? Show walkthrough after 1 sec delay
    if (label === 'lead' && !leadWalkthroughDone) {
      setTimeout(() => setShowLeadWalkthrough(true), 500);
    }
  };

  const handleLeadWalkthroughDone = () => {
    setLeadWalkthroughDone(true);
    setShowLeadDef(false);
    setShowLeadWalkthrough(false);
  };

  const counts = {
    important: IMPORTANT_GROUPS.reduce((sum, g) => sum + g.items.length, 0),
    all: ALL_MESSAGES.length,
  };

  return (
    <div style={{ background:T.paper, height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>

      {/* Morning brief overlay */}
      {!morningDismissed && (
        <MorningBrief onDismiss={() => setMorningDismissed(true)} />
      )}

      {summaryOpen && (
        <SummaryOverlay onDismiss={() => setSummaryOpen(false)} />
      )}

      {showLeadWalkthrough && !showLeadDef && (
        <LeadWalkthrough
          onNow={() => { setShowLeadWalkthrough(false); setShowLeadDef(true); }}
          onLater={() => handleLeadWalkthroughDone()}
        />
      )}

      {showLeadDef && (
        <LeadDefOverlay onDismiss={() => handleLeadWalkthroughDone()} />
      )}

      {showPriorities && (
        <PrioritiesOverlay onDismiss={() => setShowPriorities(false)} />
      )}

      {showNotifModal && (
        <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:150, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div onClick={() => { setShowNotifModal(false); setNotifModalDone(true); }} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.25)' }} />
          <div style={{ position:'relative', zIndex:151, background:T.paper, borderRadius:20, padding:'28px 24px', maxWidth:320, width:'90%', boxShadow:'0 12px 40px rgba(0,0,0,0.15)' }}>
            <div style={{ fontSize:11, color:T.gray, marginBottom:8, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase' }}>Inbox</div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink, lineHeight:1.4, marginBottom:8 }}>
              Want a morning report?
            </div>
            <div style={{ fontSize:13, color:T.gray, lineHeight:1.5, marginBottom:20 }}>
              Every morning I'll send you a summary of what happened overnight — new leads, messages sorted, and anything that needs your attention. One quick read before you start your day.
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={() => { setShowNotifModal(false); setNotifModalDone(true); }} style={{ flex:1, padding:'12px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
                Enable notifications
              </button>
              <button onClick={() => { setShowNotifModal(false); setNotifModalDone(true); }} style={{ padding:'12px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:14, fontWeight:500, cursor:'pointer', color:T.gray }}>
                Skip
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Fixed header area — hides on scroll down, shows on scroll up */}
      <div style={{ padding:'52px 20px 0', flexShrink:0, transform: headerHidden ? 'translateY(-100%)' : 'translateY(0)', maxHeight: headerHidden ? 0 : 500, opacity: headerHidden ? 0 : 1, overflow:'hidden', transition:'all .3s ease' }}>
        <DailyReport collapsed={true} onToggle={() => setSummaryOpen(true)} />
      </div>

      {/* Scrollable content */}
      <div ref={scrollRef} onScroll={handleScroll}
        style={{ flex:1, overflowY:'auto', overflowX:'hidden', padding:'0 20px 100px 20px' }}>
        {/* Soft header */}
        <div style={{ padding:'4px 0 12px' }}>
          <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, letterSpacing:'-0.01em' }}>
            Based on what you told me matters. <span onClick={() => setShowPriorities(true)} style={{ color:T.ink, fontWeight:500, cursor:'pointer', textDecoration:'underline', textDecorationColor:T.lightGray, textUnderlineOffset:2 }}>Change priorities</span>
          </div>
        </div>
        <ImportantTab onOpenChat={handleOpenChat} answeredChats={answeredChats} />
      </div>

      {/* Chat Detail Overlay */}
      {openChat && (
        <ChatDetail
          item={openChat.item}
          label={openChat.label}
          labelColor={openChat.labelColor}
          isSensitive={openChat.isSensitive}
          draftMode={draftMode}
          onClose={() => {
            setOpenChat(null);
            const newCount = chatCloseCount + 1;
            setChatCloseCount(newCount);
            if (newCount === 3 && !notifModalDone) {
              setTimeout(() => setShowNotifModal(true), 400);
            }
          }}
          onSent={(user) => setAnsweredChats(prev => new Set([...prev, user]))}
          onSkipDraft={() => {
            const newCount = skipDraftCount + 1;
            setSkipDraftCount(newCount);
            return newCount;
          }}
          onDraftFeedback={() => setDraftMode('inline')}
        />
      )}
    </div>
  );
}

  // Check if done after state changes
  useEffect(() => {
    if(phase === 'reviewing' && reviewIdx >= REVIEWS.length) setPhase('done');
  }, [reviewIdx, phase]);

  // Check if next item is a batch
  useEffect(() => {
    if(phase === 'reviewing' && isBatch) setPhase('batch');
  }, [reviewIdx, phase]);

  useEffect(() => {
    if(scrollRef.current) setTimeout(() => { scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 50);
  }, [phase, reviewIdx, sentItems.length, editing]);

  useEffect(() => { if(currentItem) setEditVal(currentItem.draft); }, [reviewIdx]);

  return (
    <div style={{ height:'calc(100% - 120px)', display:'flex', flexDirection:'column' }}>
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'0 24px 20px' }}>

        {/* ── Phase: Greeting (clean, one message) ── */}
        {phase === 'greeting' && (
          <div className="fade-up" style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', paddingTop:40 }}>
            <div style={{ fontSize:48, marginBottom:32 }}>💬</div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>Inbox</div>
              <div style={{ background:T.warmGray, borderRadius:16, borderTopLeftRadius:4, padding:'16px 20px', maxWidth:'90%' }}>
                <div style={{ fontSize:16, color:T.ink, lineHeight:1.5 }}>
                  Good morning ☀️
                </div>
                <div style={{ fontSize:14, color:T.ink, lineHeight:1.6, marginTop:10 }}>
                  Inbox drafted responses for 2 lead inquiries and 1 FAQ. Ready when you are.
                </div>
                <div style={{ fontSize:14, color:T.ink, marginTop:12, fontWeight:500 }}>
                  {REVIEWS.length} replies to review. Wanna take a look?
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── Phase: Reviewing (one task at a time, scrollable history) ── */}
        {(phase === 'reviewing' || phase === 'batch' || phase === 'takeover') && (
          <>
            {/* Sent items scroll history */}
            {sentItems.map((item) => (
              <SentBubble key={`sent-${item.id}`} item={item} />
            ))}

            {/* Current single task */}
            {phase === 'reviewing' && currentItem && !isBatch && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5, display:'flex', alignItems:'center', gap:5 }}>
                    💬 Inbox · {reviewIdx+1} of {REVIEWS.length}
                  </div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'14px 16px', maxWidth:'90%' }}>
                    <div style={{ fontSize:14, fontWeight:600, color:T.ink, marginBottom:4 }}>
                      {currentItem.user} <span style={{ fontWeight:400, color:T.gray }}>· {currentItem.source}</span>
                    </div>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>
                      {NARRATIONS[currentItem.id]}
                    </div>
                  </div>
                </div>

                {/* Their message */}
                <div style={{ marginLeft:16, marginBottom:10 }}>
                  <div style={{ padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:12, borderTopLeftRadius:4, maxWidth:'85%' }}>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5, fontStyle:'italic' }}>"{currentItem.msg}"</div>
                  </div>
                </div>

                {/* Draft intro + draft */}
                <div style={{ marginBottom:6 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Inbox</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'10px 16px', maxWidth:'55%', fontSize:13, color:T.ink }}>
                    I'd answer with this:
                  </div>
                </div>
                <div style={{ marginLeft:16, marginBottom:8 }}>
                  {!editing ? (
                    <div style={{ padding:'14px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:12, maxWidth:'90%' }}>
                      <div style={{ fontSize:14, color:T.ink, lineHeight:1.55 }}>{currentItem.draft}</div>
                    </div>
                  ) : (
                    <div style={{ maxWidth:'90%' }}>
                      <textarea value={editVal} onChange={e=>setEditVal(e.target.value)}
                        style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:'14px 16px', border:`2px solid ${T.accent}`, borderRadius:12, resize:'none', height:100, fontFamily:'Inter', background:'#fff', outline:'none' }} />
                      <div style={{ display:'flex', gap:6, marginTop:8, flexWrap:'wrap' }}>
                        {['Shorter','Warmer','Add a question','More direct'].map(c => (
                          <span key={c} style={{ fontSize:11, padding:'5px 12px', borderRadius:20, border:`1px solid ${T.lightGray}`, cursor:'pointer', color:T.ink, fontWeight:500, background:'#fff' }}>{c}</span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Batch */}
            {phase === 'batch' && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Inbox</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'14px 16px', maxWidth:'90%' }}>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>
                      These {batchItems.length} are very similar — all FAQ replies about your program. Want to approve them all?
                    </div>
                  </div>
                </div>
                <div style={{ marginLeft:16, marginBottom:8 }}>
                  {(batchExpanded ? batchItems : batchItems).map((item,i) => (
                    <div key={i} style={{ padding:'12px 14px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:10, marginBottom:6,
                      opacity: !batchExpanded && i > 0 ? 0.6 : 1 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:T.ink }}>{item.user} <span style={{ fontWeight:400, color:T.gray }}>· {item.type}</span></div>
                      <div style={{ fontSize:13, color:T.gray, fontStyle:'italic', marginTop:3 }}>"{item.msg.slice(0,50)}{item.msg.length>50?'...':''}"</div>
                      {batchExpanded && (
                        <div style={{ fontSize:12, color:T.ink, marginTop:8, paddingTop:8, borderTop:`1px solid ${T.lightGray}`, lineHeight:1.4 }}>
                          Draft: {item.draft}
                        </div>
                      )}
                    </div>
                  ))}
                  {!batchExpanded && (
                    <div onClick={() => setBatchExpanded(true)} style={{ fontSize:12, color:T.accent, cursor:'pointer', marginTop:4, fontWeight:500 }}>
                      Show drafts →
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Take over */}
            {phase === 'takeover' && currentItem && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Inbox</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'12px 16px', maxWidth:'65%', fontSize:14, color:T.ink }}>
                    All yours! Write your reply:
                  </div>
                </div>
                <div style={{ marginLeft:16, maxWidth:'90%' }}>
                  <textarea placeholder="Type your reply..."
                    style={{ width:'100%', padding:'14px 16px', borderRadius:12, border:`1px solid ${T.lightGray}`, fontSize:14, lineHeight:1.5, resize:'none', height:90, fontFamily:'Inter', background:'#fff', outline:'none', color:T.ink }} />
                </div>
              </div>
            )}
          </>
        )}

        {/* ── Phase: Done ── */}
        {phase === 'done' && (
          <>
            {sentItems.map((item) => (
              <SentBubble key={`sent-${item.id}`} item={item} />
            ))}
            <div className="fade-up" style={{ textAlign:'center', padding:'40px 20px' }}>
              <div style={{ fontSize:48, marginBottom:16 }}>✨</div>
              <h2 style={{ fontSize:22, fontWeight:700, color:T.ink, marginBottom:8 }}>All caught up</h2>
              <p style={{ fontSize:14, color:T.gray, lineHeight:1.5 }}>I picked up 2 preferences from your edits.</p>
              <p style={{ fontSize:13, color:'#bbb', marginTop:20 }}>Go create something.</p>
            </div>
          </>
        )}
      </div>

      {/* ─── Pinned bottom bar ─── */}
      {phase === 'greeting' && (
        <div style={{ padding:'12px 24px 28px', display:'flex', gap:10 }}>
          <button style={{ flex:1, padding:'14px 0', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:12, fontSize:14, fontWeight:500, cursor:'pointer', color:T.ink }}>
            Summary first
          </button>
          <button onClick={startReviewing} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            Start reviewing
          </button>
        </div>
      )}

      {phase === 'reviewing' && currentItem && !isBatch && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8, alignItems:'center' }}>
          <button onClick={handleApprove} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            {editing ? 'Send edited' : 'Approve'}
          </button>
          <button onClick={() => { setEditing(!editing); if(currentItem) setEditVal(currentItem.draft); }}
            style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:12, fontSize:13, fontWeight:500, cursor:'pointer', color:T.ink }}>
            {editing ? 'Cancel' : 'Edit'}
          </button>
          <button onClick={handleSkip} style={{ padding:'14px 16px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:12, fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
            Skip
          </button>
          <button onClick={() => setPhase('takeover')} style={{ padding:'14px 0', background:'transparent', border:'none', fontSize:11, fontWeight:500, cursor:'pointer', color:'#bbb' }}>
            I'll take over
          </button>
        </div>
      )}

      {phase === 'batch' && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8 }}>
          <button onClick={handleBatchApprove} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            Approve all {batchItems.length}
          </button>
          <button onClick={() => { setBatchMode(false); setPhase('reviewing'); }} style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:12, fontSize:13, fontWeight:500, cursor:'pointer', color:T.ink }}>
            One by one
          </button>
        </div>
      )}

      {phase === 'takeover' && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8 }}>
          <button onClick={() => { setSentItems(s => [...s, currentItem]); setReviewIdx(i=>i+1); setPhase('reviewing'); }}
            style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            Send my reply
          </button>
          <button onClick={() => setPhase('reviewing')} style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:12, fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
            Back
          </button>
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState(window.location.hash === '#inbox' ? 'main' : 'ob-welcome');
  const [hideNav, setHideNav] = useState(false);

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden' }}>

      {/* ─── Onboarding (3-screen flow) ─── */}
      {screen === 'ob-welcome' && <ObWelcomeNew onNext={() => setScreen('ob-sorting')} onSkip={() => setScreen('main')} />}
      {screen === 'ob-sorting' && <ObSorting onNext={() => setScreen('ob-results')} onSkip={() => setScreen('main')} />}
      {screen === 'ob-results' && <ObResultsNew onNext={() => setScreen('main')} />}

      {/* ─── V2 Inbox ─── */}
      {screen === 'main' && <InboxV2 onOverlayChange={(open) => setHideNav(open)} />}

      {/* iOS 26 Bottom Nav — only on welcome + main inbox, hidden when overlays open */}
      {(screen === 'ob-welcome' || (screen === 'main' && !hideNav)) && <BottomNav />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
