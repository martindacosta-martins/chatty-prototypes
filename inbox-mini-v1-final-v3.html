<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inbox — AI Native Inbox</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* ═══ STYLES ═══ */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Inter',-apple-system,system-ui,sans-serif; background:#E0E0E0; display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  #root { width:393px; height:852px; position:relative; overflow:hidden; border-radius:44px; box-shadow:0 20px 60px rgba(28,26,22,.16), 0 1px 3px rgba(28,26,22,.06); }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  @keyframes sheetUp { from { opacity:0; transform:translateY(100%); } to { opacity:1; transform:translateY(0); } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  .fade-up { animation: fadeUp .4s cubic-bezier(.25,.46,.45,.94) both; }
  .fade-in { animation: fadeIn .3s ease both; }
  .sheet-up { animation: sheetUp .45s cubic-bezier(.32,.72,.35,1.01) both; }
  @keyframes pillExpandIn {
    0%   { opacity:0; transform:translateY(40px) scale(0.92); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  .pill-expand { animation: pillExpandIn .4s cubic-bezier(.16,1,.3,1) both; }
  .cursor-blink { display:inline-block; width:2px; height:14px; background:rgba(255,255,255,0.6); margin-left:2px; vertical-align:text-bottom; animation: blink .8s step-end infinite; }
  @keyframes shimmer {
    0%   { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  .skeleton-line {
    height:12px; border-radius:6px; margin-bottom:8px;
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 400px 100%;
    animation: shimmer 1.4s ease infinite;
  }

  /* ── Recording pulse rings ── */
  @keyframes recordPulse {
    0%   { transform:scale(1); opacity:0.4; }
    100% { transform:scale(2.2); opacity:0; }
  }
  @keyframes recordGlow {
    0%,100% { box-shadow:0 0 0 0 rgba(255,59,48,0); }
    50%     { box-shadow:0 0 20px 8px rgba(255,59,48,0.3); }
  }
  @keyframes thinkDots {
    0%,80%,100% { opacity:0.2; }
    40% { opacity:1; }
  }

  /* ── Agent takeover: gradient wave erupts from button, fills screen ── */
  @keyframes agent-takeover {
    0%   { clip-path: circle(0%   at 50% 94%); opacity: 0.85; }
    60%  { clip-path: circle(80%  at 50% 94%); opacity: 1;    }
    100% { clip-path: circle(160% at 50% 94%); opacity: 1;    }
  }
  /* ── Text wave: each line floats up as the gradient passes through ── */
  @keyframes text-wave {
    0%   { transform: translateY(0)    scaleX(1);    filter: blur(0px);   opacity: 1;   }
    25%  { transform: translateY(-14px) scaleX(1.015); filter: blur(2px);  opacity: 0.7; }
    55%  { transform: translateY(6px)  scaleX(0.99); filter: blur(0.5px); opacity: 0.9; }
    80%  { transform: translateY(-2px) scaleX(1);    filter: blur(0px);   opacity: 1;   }
    100% { transform: translateY(0)    scaleX(1);    filter: blur(0px);   opacity: 1;   }
  }

  /* Scrollbar hide */
  ::-webkit-scrollbar { display:none; }

  /* Mobile responsive */
  @media (max-width:420px) {
    body { background:#FFFFFF; align-items:flex-start; }
    #root { width:100vw; height:100vh; height:100dvh; border-radius:0; box-shadow:none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══ DESIGN TOKENS ═══ */
const T = {
  paper: '#FFFFFF',
  ink: '#1B1B18',
  gray: '#7F7E76',
  lightGray: '#D6D6D6',
  cardBg: '#FFFFFF',
  accent: '#006BE2',
  darkBg: '#1B1B18',
  darkSurface: '#28271F',
  darkBorder: '#3D3C34',
  warmGray: '#F5F5F5',
};

/* ═══ DATA ═══ */
const IMPORTANT_GROUPS = [
  {
    intention: 'Interested in your 12-week course',
    desc: 'Asked about pricing, signing up, or your program.',
    items: [
      { user:'@jayrunz', name:'Jay Ruiz', avatar:'https://i.pravatar.cc/88?u=jayrunz', msg:"I've been struggling for 2 years. Is it too late to start?", source:'DM', time:'2h', unread:3, intent:'Interested',
        draft:"It's never too late — 2 years of trying tells me you're serious about change. The 12-week Reboot program is built for people exactly where you are. Want to see what week 1 looks like?",
        because:"He mentioned struggling for 2 years — that maps to your 12-Week Reboot, not the 4-Week Kickstart. He's not asking about price, he's asking if it's too late. So I led with validation, not a sales pitch. I also added a soft next step — showing week 1 lowers the commitment barrier.",
        agentRead:'Ready to sign up · Reply drafted' },
      { user:'@emma.k', name:'Emma Kim', avatar:'https://i.pravatar.cc/88?u=emmak', msg:"I want to sign up but nervous about the cost", source:'DM', time:'4h', unread:2, intent:'Interested',
        draft:"Totally understand — investing in yourself is a big step. The 12-Week Reboot has a 3-payment plan at $197/mo. And there's a 7-day guarantee, so there's zero risk. Want me to send the details?",
        because:"She said 'nervous about cost' — not 'too expensive.' That's a different signal. She wants to buy but needs reassurance. I pulled the exact payment plan for the 12-Week Reboot ($197/mo x 3) and mentioned your 7-day guarantee to remove risk. Didn't discount — just removed friction.",
        agentRead:'Interested, hesitant about cost · Reply drafted' },
    ],
  },
  {
    intention: 'Want to collaborate',
    desc: 'Brands and media reaching out.',
    items: [
      { user:'@fitbrand.co', name:'FitBrand', avatar:'https://i.pravatar.cc/88?u=fitbrand', msg:"Would love to explore a partnership. We have 200k followers", source:'DM', time:'6h', unread:1, intent:'Collab',
        draft:"Hey! Love FitBrand's content — especially the athlete recovery series. I'd be open to exploring something. What kind of partnership are you thinking? Affiliate, co-branded content, or something else?",
        because:"FitBrand has 200k followers in the fitness/recovery space — directly overlaps with your audience. Their last 3 posts got 4-8% engagement, which is strong. I referenced their recovery series to show we actually looked. And I asked what type of collab to qualify them before committing your time.",
        agentRead:'Partnership request · Reply drafted' },
      { user:'@wellness.mag', name:'Wellness Magazine', avatar:'https://i.pravatar.cc/88?u=wellnessmag', msg:"We'd like to feature you in our next issue", source:'DM', time:'1d', intent:'Collab',
        draft:"That sounds amazing — I'd be honored! I have some recent client transformation stories that could work well. What's the angle for the piece, and what do you need from me?",
        because:"Wellness Magazine has 85k followers and publishes monthly. A feature there could drive traffic to your 12-Week Reboot landing page. I offered client stories because that's their format — real transformations, not just tips. Asking about the angle helps you prepare the right material.",
        agentRead:'Media feature request · Reply drafted' },
    ],
  },
  {
    intention: 'Questions about your services',
    desc: 'Pricing, shipping, and scheduling.',
    items: [
      { user:'@mike.coach', name:'Mike Chen', avatar:'https://i.pravatar.cc/88?u=mikecoach', msg:"What's included in the premium program?", source:'DM', time:'3h', intent:'FAQ',
        draft:"Great question! The 12-Week Reboot includes weekly 1-on-1 coaching calls, a custom meal plan updated every 4 weeks, access to the private community, and a workout library with 60+ videos. Want me to send the full breakdown?",
        because:"He asked about 'premium' — that's your 12-Week Reboot (not the 4-Week Kickstart). I listed the specific inclusions: 1-on-1 calls, custom meal plan, private community, 60+ video library. These are the four things that differentiate it from the basic tier. The question about a 'full breakdown' gives you a reason to send the sales page.",
        agentRead:'Product question · Reply drafted' },
      { user:'@carlos.m', name:'Carlos Mendez', avatar:'https://i.pravatar.cc/88?u=carlosm', msg:"Do you ship internationally?", source:'DM', time:'2h', intent:'FAQ',
        draft:"Yes! The program is 100% online, so it works from anywhere. You get instant access to everything — coaching calls are via Zoom, and the meal plans adapt to what's available in your region. Where are you based?",
        because:"He's asking about shipping, but your product is digital — no shipping needed. Instead of just saying 'yes,' I reframed: it's online, works anywhere, and Zoom-based. Asking where he's based opens the door to personalize the meal plan conversation and qualify him as a lead.",
        agentRead:'Shipping question · Reply drafted' },
      { user:'@alex.j', name:'Alex Jordan', avatar:'https://i.pravatar.cc/88?u=alexj', msg:"Is there a refund policy?", source:'DM', time:'5h', intent:'FAQ',
        draft:"Yes — there's a 7-day money-back guarantee on all programs, no questions asked. Most people know within the first week if it's the right fit. Want to take a look at what's included before deciding?",
        because:"Refund questions usually mean they're close to buying but need safety. Your policy is 7 days, no questions. I added 'most people know within the first week' — that reframes the guarantee as confidence, not a safety net. Then I offered to show what's included, which is a softer push than 'ready to sign up?'",
        agentRead:'Refund policy question · Reply drafted' },
      { user:'@maria.v', name:'María Vargas', avatar:'https://i.pravatar.cc/88?u=mariav', msg:"Can I reschedule my session to next week?", source:'DM', time:'3h', intent:'FAQ',
        draft:"Of course! Your next session is Thursday at 3pm. I can move it to any day next week — what works best for you?",
        because:"She's an existing client in the 12-Week Reboot. Her next session is Thursday at 3pm (from your calendar). I confirmed the current time so she doesn't have to check, and offered flexibility for rescheduling. Kept it short — this doesn't need a sales angle.",
        agentRead:'Scheduling request · Reply drafted' },
    ],
  },
  {
    intention: 'Shared something personal',
    desc: 'These felt too personal for a drafted reply — they need your voice.',
    items: [
      { user:'@lena.fit', name:'Lena Müller', avatar:'https://i.pravatar.cc/88?u=lenafit', msg:"You seem real. I've tried everything. I'm scared to spend more money.", source:'DM', time:'1h', intent:'Emotional', _sensitive:true, summary:"She's been through at least 3 other programs (mentioned in previous DMs). She's not asking about your course — she's asking if she can trust you. This isn't a sales moment. She needs to hear from you, not a drafted reply.", agentRead:'Needs your personal reply' },
      { user:'@ana.healing', name:'Ana Reyes', avatar:'https://i.pravatar.cc/88?u=anahealing', msg:"I'm going through a really hard time and need something to focus on", source:'DM', time:'5h', intent:'Emotional', _sensitive:true, summary:"She's going through something personal and looking for structure, not a program pitch. She's followed you for 8 months but never DM'd before. The fact that she reached out at all is significant. Handle with care.", agentRead:'Needs your personal reply' },
    ],
  },
];

/* ═══ SHARED COMPONENTS ═══ */
function BlackBtn({ label, onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ width:'100%', padding:'14px 0', background: disabled ? T.lightGray : T.ink, color: disabled ? T.gray : '#FFFFFF',
        border:'none', borderRadius:12, fontSize:15, fontWeight:600, cursor: disabled ? 'default' : 'pointer',
        transition:'all .2s ease', letterSpacing:'-0.01em' }}>
      {label}
    </button>
  );
}

/* ─── Shared: Blue CTA Button ─── */
function BlueBtn({ label, onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ width:'100%', padding:'16px 0', background: disabled ? T.lightGray : T.accent, color: disabled ? T.gray : '#FFFFFF',
        border:'none', borderRadius:14, fontSize:16, fontWeight:600, cursor: disabled ? 'default' : 'pointer',
        transition:'all .2s ease', letterSpacing:'-0.01em' }}>
      {label}
    </button>
  );
}

/* ═══ ONBOARDING ═══ */

/* Staggered fade-in messages (replaces TypeWriter — 2s instead of 25s) */
function InboxMessages({ messages, onAllDone }) {
  const [visibleCount, setVisibleCount] = useState(0);

  useEffect(() => {
    messages.forEach((_, i) => {
      setTimeout(() => {
        setVisibleCount(i + 1);
        if (i === messages.length - 1 && onAllDone) {
          setTimeout(onAllDone, 400);
        }
      }, 300 + i * 500);
    });
  }, [messages.length]);

  return (
    <div>
      {messages.map((msg, i) => (
        <div key={i} style={{ marginBottom: 10, opacity: i < visibleCount ? 1 : 0, transform: i < visibleCount ? 'translateY(0)' : 'translateY(12px)', transition: 'all .35s ease-out' }}>
          {i === 0 && (
            <div style={{ fontSize: 12, color: T.gray, marginBottom: 6, fontWeight: 500, letterSpacing: '0em' }}>
              Inbox Agent
            </div>
          )}
          <div style={{ background: T.warmGray, borderRadius: 18, borderTopLeftRadius: i === 0 ? 18 : 6, padding: '14px 18px', maxWidth: '88%', display: 'inline-block' }}>
            <div style={{ fontSize: 15, color: T.ink, lineHeight: 1.55, letterSpacing: '-0.01em' }}>{msg}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── NEW Step 2: "Watch Me Work" — Live Processing Feed ─── */
/* ─── Quick scan — 3 seconds, just a few status lines ─── */
function ObSorting({ onNext }) {
  const [vis, setVis] = useState(0);
  const lines = [
    'Reading your DMs...',
    'Found some interesting conversations',
    'I have a few questions for you',
  ];

  useEffect(() => {
    const timers = [];
    lines.forEach((_, i) => {
      timers.push(setTimeout(() => setVis(i + 1), i * 900 + 400));
    });
    timers.push(setTimeout(onNext, lines.length * 900 + 800));
    return () => timers.forEach(t => clearTimeout(t));
  }, []);

  return (
    <div style={{ background:'#0F0F0F', height:'100%', display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 28px' }}>
      {lines.map((line, i) => (
        <div key={i} style={{
          fontSize:16, fontWeight:400, color:'#fff', lineHeight:1.6, marginBottom:12,
          opacity: vis > i ? 1 : 0,
          transform: vis > i ? 'translateY(0)' : 'translateY(8px)',
          transition:'opacity .45s ease, transform .45s ease',
        }}>
          {line}
        </div>
      ))}
    </div>
  );
}

/* ─── Business question — voice/type → recording → processing → confirmation ─── */
function ObQuestion({ onNext }) {
  // Phases: ask | recording | processing | confirm | fantastic
  const [phase, setPhase] = useState('ask');
  const [inputMode, setInputMode] = useState('voice'); // voice | typing
  const [inputVal, setInputVal] = useState('');
  const [vis, setVis] = useState(0);
  const [confirmVis, setConfirmVis] = useState(0);
  const [confirmBottom, setConfirmBottom] = useState('buttons'); // buttons | voice | typing
  const [revision, setRevision] = useState(0);

  // Each revision shows a different title + summary — the agent is learning
  const revisions = [
    {
      title: "Did I get it right?",
      subtitle: "Let me know if this is correct",
      summary: "I run a fitness coaching business called Sofia Reyes Coaching. My main offer is a 12-Week Reboot program with weekly 1-on-1 calls, custom meal plans, and a private community. I also have a 4-Week Kickstart for beginners. Most of my leads come from Instagram DMs and post comments.",
    },
    {
      title: "Okay, let me try again.",
      subtitle: "Here's what I understand now",
      summary: "Sofia Reyes Coaching offers two programs: the 12-Week Reboot ($597 or 3x $197/mo) with weekly 1-on-1 coaching, custom meal plans, and a private community — and the 4-Week Kickstart ($197) for beginners. Your main audience is women 25-40 interested in fitness transformations. Leads mostly come through Instagram DMs and comments on transformation posts.",
    },
    {
      title: "Third time's the charm?",
      subtitle: "I think I've got it now",
      summary: "Sofia Reyes Coaching helps women 25-40 transform their fitness with two programs: the flagship 12-Week Reboot (1-on-1 coaching, custom nutrition, private community) and the entry-level 4-Week Kickstart. Most clients discover you through Instagram — especially your before/after posts and Reels. Your biggest conversion driver is DM conversations where you address hesitation around cost and commitment. You also get collab requests from fitness brands weekly.",
    },
  ];

  const current = revisions[Math.min(revision, revisions.length - 1)];

  // Intro animation
  useEffect(() => {
    if (phase !== 'ask') return;
    const timers = [];
    for (let i = 1; i <= 3; i++) timers.push(setTimeout(() => setVis(i), i * 500 + 200));
    return () => timers.forEach(t => clearTimeout(t));
  }, [phase]);

  // Confirm animation
  useEffect(() => {
    if (phase !== 'confirm') return;
    const timers = [];
    for (let i = 1; i <= 4; i++) timers.push(setTimeout(() => setConfirmVis(i), i * 400 + 200));
    return () => timers.forEach(t => clearTimeout(t));
  }, [phase]);

  // Processing → confirm
  useEffect(() => {
    if (phase !== 'processing') return;
    const t = setTimeout(() => {
      setConfirmVis(0);
      setConfirmBottom('buttons');
      setPhase('confirm');
    }, 2000);
    return () => clearTimeout(t);
  }, [phase]);

  // Fantastic → onNext
  useEffect(() => {
    if (phase !== 'fantastic') return;
    const t = setTimeout(onNext, 1800);
    return () => clearTimeout(t);
  }, [phase]);

  const show = (i) => ({
    opacity: vis >= i ? 1 : 0,
    transform: vis >= i ? 'translateY(0)' : 'translateY(8px)',
    transition:'opacity .45s ease, transform .45s ease',
  });

  const cShow = (i) => ({
    opacity: confirmVis >= i ? 1 : 0,
    transform: confirmVis >= i ? 'translateY(0)' : 'translateY(8px)',
    transition:'opacity .45s ease, transform .45s ease',
  });

  const handleRelease = () => {
    setPhase('processing');
  };

  const handleTypeSend = () => {
    if (!inputVal.trim()) return;
    setPhase('processing');
  };

  const handleEdit = () => {
    setConfirmBottom('voice');
  };

  const MicIcon = ({ size=24, color='#0F0F0F' }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  );

  /* ── ASK phase ── */
  if (phase === 'ask') return (
    <div style={{ background:'#0F0F0F', height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', padding:'100px 28px 0' }}>
        <div style={{ marginBottom:16, ...show(1) }}>
          <h1 style={{ fontSize:34, fontWeight:900, color:'#fff', letterSpacing:'-0.04em', lineHeight:1.12, WebkitTextStroke:'0.5px #fff' }}>
            Tell me more about your business
          </h1>
        </div>
        <div style={{ ...show(2) }}>
          <p style={{ fontSize:16, fontWeight:400, color:'#fff', lineHeight:1.6 }}>
            I have found people like Emma Kim interested in your service, but I would like to learn more about your business to find the right messages.
          </p>
        </div>
      </div>

      {inputMode === 'voice' && (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'0 28px 40px', ...show(3) }}>
          <div onMouseDown={() => setPhase('recording')} onTouchStart={() => setPhase('recording')}
            style={{ width:64, height:64, borderRadius:32, background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', marginBottom:12 }}>
            <MicIcon />
          </div>
          <span style={{ fontSize:14, color:'rgba(255,255,255,0.6)', marginBottom:40 }}>Hold and talk</span>
          <span onClick={() => setInputMode('typing')} style={{ fontSize:14, color:'rgba(255,255,255,0.4)', cursor:'pointer' }}>Or tap to type</span>
        </div>
      )}

      {inputMode === 'typing' && (
        <div style={{ padding:'0 28px 40px', ...show(3) }}>
          <textarea value={inputVal} onChange={e => setInputVal(e.target.value)} autoFocus
            placeholder="Tell me about your business..."
            style={{ width:'100%', fontSize:16, color:'#fff', lineHeight:1.5, padding:'14px 16px', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:16, resize:'none', height:100, fontFamily:'Inter, system-ui, sans-serif', outline:'none', letterSpacing:'-0.01em' }} />
          <div style={{ display:'flex', gap:10, marginTop:12 }}>
            <button onClick={handleTypeSend}
              style={{ flex:1, padding:'14px', background:'#fff', color:'#0F0F0F', border:'none', borderRadius:50, fontSize:15, fontWeight:600, cursor:'pointer' }}>
              Continue
            </button>
            <button onClick={() => setInputMode('voice')}
              style={{ padding:'14px 20px', background:'transparent', border:'1.5px solid rgba(255,255,255,0.12)', borderRadius:50, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <MicIcon size={18} color="rgba(255,255,255,0.5)" />
            </button>
          </div>
        </div>
      )}
    </div>
  );

  /* ── RECORDING phase ── */
  if (phase === 'recording') return (
    <div style={{ background:'#0F0F0F', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}
      onMouseUp={handleRelease} onTouchEnd={handleRelease}>
      {/* Pulsing rings */}
      <div style={{ position:'relative', width:100, height:100, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ position:'absolute', inset:0, borderRadius:'50%', border:'2px solid rgba(255,59,48,0.3)', animation:'recordPulse 1.2s ease-out infinite' }} />
        <div style={{ position:'absolute', inset:0, borderRadius:'50%', border:'2px solid rgba(255,59,48,0.2)', animation:'recordPulse 1.2s ease-out 0.4s infinite' }} />
        <div style={{
          width:72, height:72, borderRadius:36, background:'#FF3B30',
          display:'flex', alignItems:'center', justifyContent:'center',
          animation:'recordGlow 1.5s ease infinite',
        }}>
          <MicIcon size={28} color="#fff" />
        </div>
      </div>
      <p style={{ fontSize:16, color:'#fff', marginTop:24 }}>Listening...</p>
      <p style={{ fontSize:13, color:'rgba(255,255,255,0.35)', marginTop:8 }}>Release to stop</p>
    </div>
  );

  /* ── PROCESSING phase ── */
  if (phase === 'processing') return (
    <div style={{ background:'#0F0F0F', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
      <div style={{ display:'flex', gap:8, marginBottom:16 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ width:8, height:8, borderRadius:4, background:'#fff', animation:`thinkDots 1.2s ease infinite ${i * 0.2}s` }} />
        ))}
      </div>
      <p style={{ fontSize:16, color:'rgba(255,255,255,0.5)' }}>Processing...</p>
    </div>
  );

  /* ── CONFIRM phase ── */
  if (phase === 'confirm') return (
    <div style={{ background:'#0F0F0F', height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ flex:1, display:'flex', flexDirection:'column', padding:'100px 28px 0' }}>
        <div style={{ marginBottom:12, ...cShow(1) }}>

/* ─── Streaming text — character-by-character like ChatGPT/Claude ─── */
function StreamText({ text, speed = 22, delay = 0, onDone, style }) {
  const [displayed, setDisplayed] = useState('');
  const [done, setDone] = useState(false);
  const idx = useRef(0);

  useEffect(() => {
    const start = setTimeout(() => {
      const interval = setInterval(() => {
        idx.current++;
        setDisplayed(text.slice(0, idx.current));
        if (idx.current >= text.length) {
          clearInterval(interval);
          setDone(true);
          if (onDone) onDone();
        }
      }, speed);
      return () => clearInterval(interval);
    }, delay);
    return () => clearTimeout(start);
  }, [text]);

  return (
    <span style={style}>
      {displayed}
      {!done && <span className="cursor-blink" />}
    </span>
  );
}

/* ═══ CHAT DETAIL ═══ */
function ChatDetail({ item, label, labelColor, onClose, isSensitive, onSent, draftMode, onSkipDraft, onDraftFeedback, isFirstSend, onFirstSend }) {
  const useSuggestMode = draftMode === 'suggest' && item.draft && !isSensitive;

  // Modes:
  // suggest — AI proposes next action at bottom
  // inline — draft shown in chat body, input at bottom (fallback after feedback)
  // editing — editing draft (works in both modes)
  // custom — user writing from scratch
  // sent — message sent
  // summary — sensitive message summary
  // feedback — AI asks why user keeps skipping drafts
  const getInitialMode = () => {
    if (isSensitive) return 'summary';
    if (!item.draft) return 'custom';
    return useSuggestMode ? 'suggest' : 'inline';
  };

  const [mode, setMode] = useState(getInitialMode);
  const [editVal, setEditVal] = useState(item.draft || '');
  const [customVal, setCustomVal] = useState('');
  const [showToast, setShowToast] = useState(false);
  const [toastMsg, setToastMsg] = useState('');
  const [sentMsg, setSentMsg] = useState('');
  const [activeTone, setActiveTone] = useState(null);
  const [editFeedback, setEditFeedback] = useState(null); // null | 'asking' | 'done'
  const [customFeedback, setCustomFeedback] = useState(null); // null | 'asking' | 'done'
  const [showSendCelebration, setShowSendCelebration] = useState(false);
  const [undoCount, setUndoCount] = useState(0);
  const undoTimerRef = useRef(null);
  const originalDraft = item.draft || '';
  const chatBodyRef = useRef(null);

  // Simple diff: percentage of words changed
  const calcEditDistance = (a, b) => {
    if (!a || !b) return 1;
    const words1 = a.toLowerCase().split(/\s+/);
    const words2 = b.toLowerCase().split(/\s+/);
    let matches = 0;
    words2.forEach(w => { if (words1.includes(w)) matches++; });
    return 1 - (matches / Math.max(words1.length, 1));
  };

  // Intent label + context menu
  const [intentLabel, setIntentLabel] = useState(item.intent || null);
  const [intentMenu, setIntentMenu] = useState(false); // false | 'main' | 'change' | 'why'
  const allIntents = ['Interested', 'FAQ', 'Collab', 'Emotional', 'Spam', 'Other'];

  const intentColors = {
    'Interested':'#E85D04', 'FAQ':'#0369A1', 'Collab':'#7C3AED',
    'Emotional':'#DC2626', 'Spam':'#999', 'Other':'#666',
  };

  const triggerToast = (msg) => {
    setToastMsg(msg);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 2500);
  };

  const handleSend = () => {
    const wasEditing = (mode === 'editing');
    const msg = wasEditing ? editVal : item.draft;
    setSentMsg(msg);
    setMode('sent');
    if (wasEditing) {
      const distance = calcEditDistance(originalDraft, editVal);
      if (distance > 0.5 && !activeTone) {
        // Major rewrite — ask what was off after a brief pause
        setTimeout(() => setEditFeedback('asking'), 1200);
      } else {
        triggerToast(activeTone
          ? 'Got it — ' + activeTone.toLowerCase() + ' tone for similar messages.'
          : 'Noted — I\'ll adjust my style based on your edit.');
      }
    }
    if (onSent) onSent(item.user);
    if (isFirstSend && onFirstSend) {
      onFirstSend();
      setShowSendCelebration(true);
      setTimeout(() => setShowSendCelebration(false), 1500);
    }
  };

  const handleSendCustom = () => {
    if (!customVal.trim()) return;
    setSentMsg(customVal);
    setMode('sent');
    if (onSent) onSent(item.user);
    triggerToast('Got it — I\'ll adjust for next time');
  };

  const handleIllReply = () => {
    if (onSkipDraft) {
      const count = onSkipDraft();
      if (count >= 5) {
        // 5th skip — trigger feedback
        setMode('feedback');
        return;
      }
    }
    setMode('custom');
    setCustomVal('');
    if (item.draft) setCustomFeedback('asking');
  };

  const handleFeedbackChoice = (reason) => {
    triggerToast('Got it — ' + reason + '. I\'ll adjust.');
    if (onDraftFeedback) onDraftFeedback(); // switches parent to inline mode
    setMode('custom');
    setCustomVal('');
  };

  const handleUndo = () => {
    clearInterval(undoTimerRef.current);
    setMode(draftMode === 'suggest' ? 'suggest' : 'inline');
    setSentMsg('');
    setUndoCount(0);
  };

  // Scroll chat to bottom on mode change
  useEffect(() => {
    if (chatBodyRef.current) {
      setTimeout(() => { chatBodyRef.current.scrollTop = chatBodyRef.current.scrollHeight; }, 50);
    }
  }, [mode]);

  // Undo countdown when mode becomes 'sent'
  useEffect(() => {
    if (mode !== 'sent') return;
    setUndoCount(5);
    let count = 5;
    undoTimerRef.current = setInterval(() => {
      count -= 1;
      setUndoCount(count);
      if (count <= 0) clearInterval(undoTimerRef.current);
    }, 1000);
    return () => clearInterval(undoTimerRef.current);
  }, [mode]);

  // Conversation history
  const chatHistory = [
    { from: 'them', text: item.msg, time: item.time || '2h ago' },
  ];
  if (item.source === 'DM') {
    chatHistory.unshift({ from: 'them', text: 'Hey!', time: '2h ago' });
  }

  return (
    <div className="fade-up" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={(e) => { e.stopPropagation(); onClose(); }} style={{ cursor:'pointer', fontSize:20, color:T.ink, fontWeight:300, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          {item.avatar && <img src={item.avatar} alt="" style={{ width:36, height:36, borderRadius:18, objectFit:'cover', background:T.lightGray }} />}
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink, letterSpacing:'-0.01em' }}>{item.name || item.user}</div>
            <div style={{ fontSize:11, color:T.gray }}>{item.user}</div>
          </div>
        </div>

        {/* Intent label */}
        {intentLabel && (
          <div style={{ position:'relative' }}>
            <div onClick={(e) => { e.stopPropagation(); setIntentMenu(intentMenu ? false : 'main'); }}
              style={{ fontSize:11, fontWeight:500, color: intentColors[intentLabel] || '#666', background:(intentColors[intentLabel] || '#666') + '14', padding:'5px 12px', borderRadius:8, cursor:'pointer', userSelect:'none', letterSpacing:'-0.01em' }}>
              {intentLabel}
            </div>

            {/* Context menu */}
            {intentMenu === 'main' && (
              <div className="fade-in" onClick={e => e.stopPropagation()} style={{ position:'absolute', right:0, top:'100%', marginTop:6, background:'#0F0F0F', borderRadius:14, boxShadow:'0 8px 32px rgba(0,0,0,0.25)', zIndex:20, minWidth:200, overflow:'hidden' }}>
                <div onClick={() => setIntentMenu('why')}
                  style={{ padding:'13px 16px', fontSize:13, color:'#ff6b6b', cursor:'pointer', borderBottom:'1px solid rgba(255,255,255,0.06)', fontWeight:500 }}>
                  It's not {intentLabel.toLowerCase()}
                </div>
                <div onClick={() => setIntentMenu('change')}
                  style={{ padding:'13px 16px', fontSize:13, color:'rgba(255,255,255,0.7)', cursor:'pointer', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
                  Change intent
                </div>
                <div onClick={() => setIntentMenu(false)}
                  style={{ padding:'13px 16px', fontSize:13, color:'rgba(255,255,255,0.35)', cursor:'pointer' }}>
                  Cancel
                </div>
              </div>
            )}

            {/* Why it's wrong */}
            {intentMenu === 'why' && (
              <div className="fade-in" onClick={e => e.stopPropagation()} style={{ position:'absolute', right:0, top:'100%', marginTop:6, background:'#0F0F0F', borderRadius:14, boxShadow:'0 8px 32px rgba(0,0,0,0.25)', zIndex:20, minWidth:210, overflow:'hidden' }}>
                <div style={{ padding:'12px 16px', fontSize:11, color:'rgba(255,255,255,0.35)', fontWeight:500, borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
                  Why isn't this {intentLabel.toLowerCase()}?
                </div>
                {['Just browsing', 'Wrong topic', 'Spam or bot', 'It\'s something else'].map(reason => (
                  <div key={reason} onClick={() => { triggerToast('Got it — I\'ll learn from this.'); setIntentLabel(null); setIntentMenu(false); }}
                    style={{ padding:'13px 16px', fontSize:13, color:'rgba(255,255,255,0.7)', cursor:'pointer', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
                    {reason}
                  </div>
                ))}
              </div>
            )}

            {/* Change intent */}
            {intentMenu === 'change' && (
              <div className="fade-in" onClick={e => e.stopPropagation()} style={{ position:'absolute', right:0, top:'100%', marginTop:6, background:'#0F0F0F', borderRadius:14, boxShadow:'0 8px 32px rgba(0,0,0,0.25)', zIndex:20, minWidth:180, overflow:'hidden' }}>
                <div style={{ padding:'12px 16px', fontSize:11, color:'rgba(255,255,255,0.35)', fontWeight:500, borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
                  Change to:
                </div>
                {allIntents.filter(i => i !== intentLabel).map(intent => (
                  <div key={intent} onClick={() => { setIntentLabel(intent); setIntentMenu(false); triggerToast('Updated to ' + intent); }}
                    style={{ padding:'13px 16px', fontSize:13, color:'rgba(255,255,255,0.7)', cursor:'pointer', borderBottom:'1px solid rgba(255,255,255,0.06)', display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ width:8, height:8, borderRadius:4, background: intentColors[intent] || '#666', flexShrink:0 }} />
                    {intent}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Chat body — always scrollable, never covered */}
      <div ref={chatBodyRef} style={{ flex:1, overflowY:'auto', padding:'20px 20px 12px', paddingBottom: mode === 'suggest' ? '300px' : '12px' }}>
        {chatHistory.map((m, i) => (
          <div key={i} style={{ marginBottom:12, display:'flex', justifyContent: m.from === 'you' ? 'flex-end' : 'flex-start' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:18, background: m.from === 'you' ? T.ink : T.cardBg, color: m.from === 'you' ? '#fff' : T.ink, border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 6 : 18, borderTopRightRadius: m.from === 'you' ? 6 : 18 }}>
              <div style={{ fontSize:14, lineHeight:1.5, letterSpacing:'-0.01em' }}>{m.text}</div>
              <div style={{ fontSize:10, color: m.from === 'you' ? 'rgba(255,255,255,0.45)' : T.gray, marginTop:4, textAlign:'right' }}>{m.time}</div>
            </div>
          </div>
        ))}

        {/* Summary removed from chat body — agent explains in bottom sheet */}

        {/* Inline draft (fallback mode — draft shown in chat body) */}
        {mode === 'inline' && item.draft && (
          <div className="fade-up" style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, marginBottom:4, fontWeight:500 }}>Inbox Agent</div>
            <div style={{ display:'flex', justifyContent:'flex-end' }}>
              <div style={{ maxWidth:'85%' }}>
                <div style={{ padding:'13px 16px', borderRadius:18, borderTopRightRadius:6, border:`1.5px dashed ${T.lightGray}`, background:T.warmGray }}>
                  <div style={{ fontSize:14, lineHeight:1.5, color:T.ink, letterSpacing:'-0.01em' }}>{item.draft}</div>
                </div>
                <div style={{ display:'flex', gap:6, marginTop:8 }}>
                  <button onClick={handleSend} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:20, fontSize:12, fontWeight:600, cursor:'pointer' }}>Send</button>
                  <button onClick={() => { setMode('editing'); setEditVal(item.draft); }} style={{ padding:'7px 14px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:20, fontSize:12, fontWeight:500, cursor:'pointer', color:T.ink }}>Edit</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Sent message */}
        {mode === 'sent' && (
          <div className="fade-up" style={{ marginBottom:12, display:'flex', justifyContent:'flex-end' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:18, borderTopRightRadius:6, background:T.ink, color:'#fff' }}>
              <div style={{ fontSize:14, lineHeight:1.5, letterSpacing:'-0.01em' }}>{sentMsg}</div>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.4)', marginTop:4, textAlign:'right' }}>Just now</div>
            </div>
          </div>
        )}

        {/* Gap 2: Edit feedback — appears after sent when draft was heavily rewritten */}
        {editFeedback === 'asking' && mode === 'sent' && (
          <div className="fade-up" style={{ marginBottom:12 }}>
            <div style={{ background:T.warmGray, borderRadius:14, padding:'14px 16px', maxWidth:'90%' }}>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.5, marginBottom:12 }}>
                I noticed you changed a lot. Was the draft off?
              </div>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                {[
                  'Not my tone',
                  'Wrong info',
                  'I just wanted to personalize',
                ].map(reason => (
                  <div key={reason} onClick={() => {
                    setEditFeedback('done');
                    triggerToast(reason === 'I just wanted to personalize'
                      ? 'Got it — draft was fine, you wanted your touch.'
                      : 'Got it — ' + reason.toLowerCase() + '. I\'ll adjust.');
                  }}
                    style={{ padding:'8px 14px', background:'#fff', borderRadius:20, cursor:'pointer', fontSize:12, color:T.ink, border:`1px solid ${T.lightGray}`, fontWeight:500, transition:'all .15s ease' }}>
                    {reason}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ═══ Inbox Agent bottom sheet — conversational, streaming ═══ */}
      {mode === 'suggest' && item.draft && <AgentSheet item={item} onSend={handleSend} onEdit={() => { setMode('editing'); setEditVal(item.draft); }} onSkip={handleIllReply} />}

      {/* ═══ Bottom: Edit mode ═══ */}
      {mode === 'editing' && (
        <div className="fade-up" style={{ flexShrink:0, background:T.paper, padding:'0 20px 40px' }}>
          <div style={{ height:1, background:T.lightGray, marginBottom:16 }} />

          <textarea value={editVal} onChange={e => setEditVal(e.target.value)} autoFocus
            style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:'13px 16px', border:`1.5px solid ${T.ink}`, borderRadius:14, resize:'none', height:80, fontFamily:'Inter, system-ui, sans-serif', background:'#fff', outline:'none', letterSpacing:'-0.01em', boxSizing:'border-box' }} />

          {/* Tone chips */}
          <div style={{ display:'flex', gap:6, marginTop:10, flexWrap:'wrap' }}>
            {['Friendly','Formal','Shorter','Direct'].map(tone => (
              <span key={tone} onClick={() => {
                setActiveTone(tone);
                const base = originalDraft;
                if (tone === 'Shorter') {
                  const sentences = base.split(/(?<=[.!?])\s+/);
                  setEditVal(sentences.slice(0, Math.ceil(sentences.length / 2)).join(' '));
                } else if (tone === 'Friendly') {
                  setEditVal('Hey! ' + base.charAt(0).toLowerCase() + base.slice(1).replace(/\.$/, '') + ' :)');
                } else if (tone === 'Formal') {
                  setEditVal('Thank you for reaching out. ' + base.replace(/!/g, '.').replace(/Hey!?\s*/gi, ''));
                } else if (tone === 'Direct') {
                  const sentences = base.split(/(?<=[.!?])\s+/);
                  setEditVal(sentences.filter(s => s.length > 20).join(' ') || base);
                }
              }} style={{ fontSize:12, padding:'6px 14px', borderRadius:20, border: activeTone === tone ? `1.5px solid ${T.ink}` : `1px solid ${T.lightGray}`, cursor:'pointer', color: activeTone === tone ? '#fff' : T.ink, fontWeight:500, background: activeTone === tone ? T.ink : '#fff', transition:'all .15s ease' }}>{tone}</span>
            ))}
          </div>

          <div style={{ display:'flex', gap:8, marginTop:12 }}>
            <button onClick={handleSend}
              style={{ flex:1, padding:'12px 0', background:T.ink, color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:600, cursor:'pointer' }}>
              Send
            </button>
            <button onClick={() => { setMode('suggest'); setActiveTone(null); setEditVal(item.draft); }}
              style={{ padding:'12px 20px', background:'transparent', border:'none', fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
              Back
            </button>
          </div>
        </div>
      )}

      {/* ═══ Bottom: Feedback — AI asks why user skips drafts (black sheet) ═══ */}
      {mode === 'feedback' && (
        <div className="sheet-up" style={{
          position:'absolute', bottom:0, left:0, right:0, zIndex:10,
          background:'#0F0F0F', borderRadius:'22px 22px 0 0',
          padding:'10px 22px 40px', boxShadow:'0 -8px 30px rgba(0,0,0,0.2)',
        }}>
          <div style={{ width:36, height:4, background:'rgba(255,255,255,0.14)', borderRadius:2, margin:'0 auto 18px' }} />

          <div style={{ fontSize:15, fontWeight:400, color:'#fff', lineHeight:1.55, letterSpacing:'-0.01em', marginBottom:16 }}>
            I noticed you prefer writing your own replies. That's fine — but what's off about mine?
          </div>

          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {[
              'They don\'t sound like me',
              'Too generic',
              'I just prefer writing myself',
              'They\'re too long',
              'Wrong tone for this audience',
            ].map(reason => (
              <div key={reason} onClick={() => handleFeedbackChoice(reason)}
                style={{ padding:'13px 16px', background:'rgba(255,255,255,0.06)', borderRadius:12, cursor:'pointer', fontSize:14, color:'rgba(255,255,255,0.8)', letterSpacing:'-0.01em', border:'1px solid rgba(255,255,255,0.06)', transition:'background .15s ease' }}>
                {reason}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ═══ Bottom: Inline draft mode (draft in chat + input) ═══ */}
      {mode === 'inline' && item.draft && (
        <div style={{ flexShrink:0, borderTop:`1px solid ${T.lightGray}`, background:T.paper, padding:'12px 20px 40px' }}>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <div style={{ flex:1, padding:'11px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
              <input value={customVal} onChange={e => setCustomVal(e.target.value)}
                placeholder="Type your message..."
                onKeyDown={e => { if (e.key === 'Enter' && customVal.trim()) handleSendCustom(); }}
                style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter, system-ui, sans-serif' }} />
            </div>
            <div onClick={() => { if (customVal.trim()) handleSendCustom(); }}
              style={{ width:36, height:36, borderRadius:18, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background .2s', flexShrink:0 }}>
              <span style={{ color:'#fff', fontSize:13 }}>↑</span>
            </div>
          </div>
        </div>
      )}

      {/* ═══ Bottom: Sensitive message — black agent sheet ═══ */}
      {mode === 'summary' && (
        <div className="sheet-up" style={{
          position:'absolute', bottom:0, left:0, right:0, zIndex:10,
          background:'#0F0F0F', borderRadius:'22px 22px 0 0',
          padding:'10px 22px 40px', boxShadow:'0 -8px 30px rgba(0,0,0,0.2)',
          minHeight:200,
        }}>
          <div style={{ width:36, height:4, background:'rgba(255,255,255,0.14)', borderRadius:2, margin:'0 auto 18px' }} />

          <div style={{ fontSize:15, fontWeight:400, color:'#fff', lineHeight:1.55, letterSpacing:'-0.01em', marginBottom:12 }}>
            I read this and decided not to write anything.
          </div>
          <div style={{ fontSize:15, fontWeight:400, color:'rgba(255,255,255,0.5)', lineHeight:1.55, letterSpacing:'-0.01em', marginBottom:16 }}>
            {item.summary}
          </div>

          <button onClick={() => { setMode('custom'); setCustomVal(''); }}
            style={{ width:'100%', padding:'14px', background:'#fff', color:'#0F0F0F', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer', letterSpacing:'-0.01em' }}>
            Reply personally
          </button>
        </div>
      )}

      {/* ═══ Bottom: Undo bar after sending ═══ */}
      {mode === 'sent' && undoCount > 0 && (
        <div style={{ flexShrink:0, padding:'10px 20px 32px', display:'flex', alignItems:'center', justifyContent:'space-between', borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>
          <span style={{ fontSize:13, color:T.gray }}>✓ Sent to {item.user}</span>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <button onClick={handleUndo} style={{ fontSize:13, color:T.ink, background:'none', border:'none', cursor:'pointer', fontWeight:600, padding:'4px 8px' }}>Undo</button>
            <span style={{ fontSize:12, color:T.lightGray }}>({undoCount})</span>
          </div>
        </div>
      )}

      {/* ═══ Bottom: Free text input (custom / sent) ═══ */}
      {(mode === 'custom' || mode === 'sent') && (
        <div style={{ flexShrink:0, borderTop:`1px solid ${T.lightGray}`, background:T.paper, padding:'12px 20px 40px' }}>
          {/* "I'll write" feedback — simple Yes / No */}
          {mode === 'custom' && customFeedback === 'asking' && (
            <div className="fade-up" style={{ marginBottom:10 }}>
              <div style={{ fontSize:12, color:T.gray, marginBottom:8 }}>Was the draft helpful?</div>
              <div style={{ display:'flex', gap:6 }}>
                <div onClick={() => { setCustomFeedback('done'); triggerToast('Got it — glad it helped.'); }}
                  style={{ padding:'8px 14px', background:T.warmGray, borderRadius:20, cursor:'pointer', fontSize:12, color:T.ink, fontWeight:500 }}>
                  Yes
                </div>
                <div onClick={() => { setCustomFeedback('done'); triggerToast('Got it — I\'ll improve.'); }}
                  style={{ padding:'8px 14px', background:T.warmGray, borderRadius:20, cursor:'pointer', fontSize:12, color:T.ink, fontWeight:500 }}>
                  No
                </div>
              </div>
            </div>
          )}
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            <div style={{ flex:1, padding:'11px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
              <input value={customVal} onChange={e => setCustomVal(e.target.value)}
                placeholder="Type your message..."
                onKeyDown={e => { if (e.key === 'Enter' && customVal.trim()) handleSendCustom(); }}
                style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter, system-ui, sans-serif' }} />
            </div>
            <div onClick={() => { if (customVal.trim()) handleSendCustom(); }}
              style={{ width:36, height:36, borderRadius:18, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background .2s', flexShrink:0 }}>
              <span style={{ color:'#fff', fontSize:13 }}>↑</span>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {showToast && (
        <div style={{ position:'absolute', bottom:100, left:'50%', transform:'translateX(-50%)', background:T.ink, color:'#fff', padding:'10px 20px', borderRadius:10, fontSize:13, fontWeight:500, animation:'fadeUp .3s ease-out', whiteSpace:'nowrap', zIndex:110, boxShadow:'0 4px 16px rgba(28,26,22,.15)', letterSpacing:'-0.01em' }}>
          {toastMsg}
        </div>
      )}
    </div>
  );
}

/* ─── Intention group header ─── */
function IntentionHeader({ label, count, desc }) {
  return (
    <div style={{ padding:'24px 0 4px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontSize:16, fontWeight:600, color:T.ink, letterSpacing:'-0.02em' }}>{label}</span>
        <span style={{ fontSize:12, fontWeight:500, color:'#999', background:'#F2F2F2', padding:'3px 10px', borderRadius:12, letterSpacing:'-0.01em' }}>{count}</span>
      </div>
      {desc && <div style={{ fontSize:12, color:'#999', lineHeight:1.4, marginTop:4, letterSpacing:'-0.01em' }}>{desc}</div>}
    </div>
  );
}

/* ─── Important Tab ─── */
function ImportantTab({ onOpenChat, answeredChats, priorityFeedbackDone, onFeedbackGood, onFeedbackBad }) {
  // Collect all answered items across all groups into one flat list
  const allAnswered = IMPORTANT_GROUPS.flatMap(g =>
    g.items.filter(item => answeredChats.has(item.user)).map(item => ({ ...item, _sensitive: !!item._sensitive }))
  );

  return (
    <div>
      {/* Active groups — only pending items */}
      {IMPORTANT_GROUPS.map((group, gi) => {
        const pending = group.items.filter(item => !answeredChats.has(item.user));
        if (pending.length === 0) return null;

        return (
          <div key={gi}>
            <IntentionHeader label={group.intention} count={pending.length} desc={group.desc} />
            <div style={{ height:1, background:T.lightGray }} />
            {pending.map((item, i) => (
              <MsgRow key={item.user} user={item.user} name={item.name} avatar={item.avatar} msg={item.msg} time={item.time}
                unread={item.unread} hasDraft={!item._sensitive && !!item.draft}
                isLast={i === pending.length - 1}
                agentRead={item.agentRead}
                onClick={() => onOpenChat(item, '', T.gray, !!item._sensitive)} />
            ))}
          </div>
        );
      })}

      {/* Prioritization feedback — thumbs */}
      {!priorityFeedbackDone && (
        <div style={{ padding:'20px 0 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <span style={{ fontSize:13, color:T.gray, letterSpacing:'-0.01em' }}>I focused on your leads and course questions. Sound right?</span>
          <div style={{ display:'flex', gap:4 }}>
            <div onClick={onFeedbackGood}
              style={{ width:32, height:32, borderRadius:16, border:`1px solid ${T.lightGray}`, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'all .15s ease' }}
              onMouseEnter={e => { e.currentTarget.style.background = '#F0F5EC'; e.currentTarget.style.borderColor = '#3D7A3D'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = T.lightGray; }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
            </div>
            <div onClick={onFeedbackBad}
              style={{ width:32, height:32, borderRadius:16, border:`1px solid ${T.lightGray}`, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'all .15s ease' }}
              onMouseEnter={e => { e.currentTarget.style.background = '#FFF0F0'; e.currentTarget.style.borderColor = '#E53935'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = T.lightGray; }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"/></svg>
            </div>
          </div>
        </div>
      )}


      {priorityFeedbackDone && (
        <div className="fade-in" style={{ padding:'20px 0 16px', textAlign:'center' }}>
          <span style={{ fontSize:12, color:T.gray }}>Thanks — I'll keep learning from how you use your inbox.</span>
        </div>
      )}

      {/* Recently answered — soft grey background section */}
      {allAnswered.length > 0 && (
        <div style={{ margin:'4px -20px 0', padding:'0 20px 20px', background:'#F7F7F7', borderRadius:'16px 16px 0 0' }}>
          <div style={{ padding:'20px 0 4px' }}>
            <span style={{ fontSize:16, fontWeight:600, color:T.ink, letterSpacing:'-0.02em' }}>Recently answered</span>
          </div>
          <div style={{ height:1, background:'#E8E8E8' }} />
          {allAnswered.map((item, i) => (
            <div key={`a${item.user}`} onClick={() => onOpenChat(item, '', T.gray, item._sensitive)}
              style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'14px 0', cursor:'pointer', borderBottom: i === allAnswered.length - 1 ? 'none' : '1px solid #E8E8E8' }}>
              <img src={item.avatar} alt="" style={{ width:44, height:44, borderRadius:22, objectFit:'cover', flexShrink:0, background:'#E8E8E8', marginTop:1 }} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:3 }}>
                  <span style={{ fontSize:15, fontWeight:400, color:T.ink, letterSpacing:'-0.01em' }}>{item.name || item.user}</span>
                  <span style={{ fontSize:12, color:T.gray, fontWeight:400, flexShrink:0 }}>{item.time}</span>
                </div>
                <div style={{ fontSize:14, color:'#999', fontWeight:400, lineHeight:1.45, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginBottom:4 }}>{item.msg}</div>
                <span style={{ fontSize:12, color:'#3D7A3D', fontWeight:500 }}>Answered</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Priorities Overlay (matches Figma design) ─── */
function PrioritiesOverlay({ onDismiss }) {
  const [selected, setSelected] = useState(['coaching', 'scheduling']);
  const [showToast, setShowToast] = useState(false);
  const priorities = [
    { id: 'coaching', label: 'People interested in coaching', desc: 'Leads asking about your services' },
    { id: 'comments', label: 'Comments on my posts', desc: 'Engage with your audience' },
    { id: 'collabs', label: 'Collaboration requests', desc: 'Brand deals and partnerships' },
    { id: 'scheduling', label: 'Scheduling and booking', desc: 'Session requests and reschedules' },
  ];

  const toggle = (id) => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);

  const handleSave = () => { setShowToast(true); setTimeout(() => onDismiss(), 1200); };

  return (
    <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:160, background:T.paper, display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'52px 20px 0', flexShrink:0 }}>
        <div onClick={onDismiss} style={{ cursor:'pointer', fontSize:20, color:T.ink, fontWeight:300, padding:'8px 12px', margin:'-8px -12px', display:'inline-block' }}>←</div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'20px 28px 0' }}>
        <div style={{ fontSize:11, color:T.gray, marginBottom:6, fontWeight:500 }}>Inbox Agent</div>
        <h1 style={{ fontSize:26, fontWeight:700, color:T.ink, lineHeight:1.15, marginBottom:10, letterSpacing:'-0.02em' }}>
          What matters most to you right now?
        </h1>
        <p style={{ fontSize:14, color:T.gray, marginBottom:28, lineHeight:1.5 }}>
          I'll focus on these first. You can change this anytime.
        </p>

        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {priorities.map((p) => {
            const on = selected.includes(p.id);
            return (
              <div key={p.id} onClick={() => toggle(p.id)}
                style={{ display:'flex', alignItems:'center', gap:14, padding:'18px', borderRadius:14,
                  border: on ? '1.5px solid #0095F6' : `1.5px solid ${T.lightGray}`,
                  background: on ? '#F0F7FF' : T.cardBg, cursor:'pointer', transition:'all .2s ease' }}>
                <div style={{ width:32, height:32, borderRadius:16,
                  border: on ? 'none' : `1.5px solid ${T.lightGray}`,
                  background: on ? '#0095F6' : 'transparent',
                  display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, transition:'all .2s ease' }}>
                  {on && <span style={{ color:'#fff', fontSize:14 }}>✓</span>}
                </div>
                <div>
                  <div style={{ fontSize:15, fontWeight:600, color:T.ink, letterSpacing:'-0.01em' }}>{p.label}</div>
                  <div style={{ fontSize:12, color:T.gray, marginTop:1 }}>{p.desc}</div>
                </div>
              </div>
            );
          })}

          {/* Something else */}
          <div style={{ display:'flex', alignItems:'center', gap:14, padding:'18px', borderRadius:14,
            border:`1.5px dashed ${T.lightGray}`, cursor:'pointer' }}>
            <div style={{ width:32, height:32, borderRadius:16, border:`1.5px solid ${T.lightGray}`,
              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <span style={{ fontSize:16, color:T.gray, fontWeight:300 }}>+</span>
            </div>
            <span style={{ fontSize:15, color:T.gray, letterSpacing:'-0.01em' }}>Something else...</span>
          </div>
        </div>
      </div>

      {showToast && (
        <div className="fade-up" style={{ position:'absolute', top:60, left:'50%', transform:'translateX(-50%)', background:T.ink, color:'#fff', padding:'10px 24px', borderRadius:50, fontSize:13, fontWeight:500, zIndex:170, whiteSpace:'nowrap' }}>
          Updating your priorities...

      <div style={{ padding:'16px 28px 50px' }}>

/* ═══ INBOX MAIN ═══ */

function InboxV2({ onOverlayChange, openChatOnLoad }) {
  const [reportCollapsed, setReportCollapsed] = useState(true);
  const [summaryOpen, setSummaryOpen] = useState(false);
  const [activeTab, setActiveTab] = useState('important');
  const [openChat, setOpenChat] = useState(null);
  const [answeredChats, setAnsweredChats] = useState(new Set());
  const [headerHidden, setHeaderHidden] = useState(false);
  const [showPriorities, setShowPriorities] = useState(false);
  const [priorityFeedbackDone, setPriorityFeedbackDone] = useState(false);
  const [skipDraftCount, setSkipDraftCount] = useState(0);
  const [draftMode, setDraftMode] = useState('suggest'); // 'suggest' | 'inline'
  const [firstSendDone, setFirstSendDone] = useState(false);
  const [showModeChangeNotif, setShowModeChangeNotif] = useState(false);
  const scrollRef = useRef(null);
  const lastScrollTop = useRef(0);

  // Auto-open a chat if passed from onboarding "Reply now"
  useEffect(() => {
    if (openChatOnLoad) {
      setTimeout(() => {
        setOpenChat({ item: openChatOnLoad, label:'', labelColor:T.gray, isSensitive:false });
      }, 300);
    }
  }, []);

  // Report overlay state AND scroll-hide to parent for nav visibility
  useEffect(() => {
    const anyOverlay = !!openChat || summaryOpen || showPriorities;
    if (onOverlayChange) onOverlayChange(anyOverlay || headerHidden);
  }, [openChat, summaryOpen, showPriorities, headerHidden]);

  const handleScroll = () => {
    if (!scrollRef.current) return;
    const st = scrollRef.current.scrollTop;
    const delta = st - lastScrollTop.current;

    if (delta > 5 && st > 40) {
      // Scrolling down
      setHeaderHidden(true);
    } else if (delta < -5) {
      // Scrolling up
      setHeaderHidden(false);
    }
    lastScrollTop.current = st;
  };

  const [showFeedbackSheet, setShowFeedbackSheet] = useState(false);
  const [feedbackCustomText, setFeedbackCustomText] = useState('');

  const handleOpenChat = (item, label, labelColor, isSensitive) => {
    setOpenChat({ item, label, labelColor, isSensitive });
  };

  const handleFeedbackReason = (reason) => {
    setShowFeedbackSheet(false);
    setPriorityFeedbackDone(true);
  };

  const handleFeedbackCustom = () => {
    if (!feedbackCustomText.trim()) return;
    setShowFeedbackSheet(false);
    setPriorityFeedbackDone(true);
  };

  const counts = {
    important: IMPORTANT_GROUPS.reduce((sum, g) => sum + g.items.length, 0),
  };

  return (
    <div style={{ background:T.paper, height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>

      {showPriorities && (
        <PrioritiesOverlay onDismiss={() => setShowPriorities(false)} />
      )}

      {/* Top spacing */}
      <div style={{ paddingTop:52, flexShrink:0 }} />

      {/* Scrollable content */}
      <div ref={scrollRef} onScroll={handleScroll}
        style={{ flex:1, overflowY:'auto', overflowX:'hidden', padding:'0 20px 100px 20px' }}>
        {showModeChangeNotif && (
          <div className="fade-up" style={{ marginBottom:16, padding:'14px 16px', background:'#F5F5F5', borderRadius:14, display:'flex', gap:12, alignItems:'flex-start' }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11, color:T.gray, marginBottom:4, fontWeight:500 }}>Inbox Agent</div>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.5, letterSpacing:'-0.01em' }}>I noticed you've been writing your own replies. I'll put my drafts in the conversation from now on — easier to compare.</div>
            </div>
            <div onClick={() => setShowModeChangeNotif(false)} style={{ cursor:'pointer', color:T.gray, fontSize:18, lineHeight:1, paddingTop:1 }}>×</div>
          </div>
        )}
        <ImportantTab onOpenChat={handleOpenChat} answeredChats={answeredChats}
          priorityFeedbackDone={priorityFeedbackDone}
          onFeedbackGood={() => setPriorityFeedbackDone(true)}
          onFeedbackBad={() => setShowFeedbackSheet(true)} />
      </div>

      {/* ═══ Floating agent pill — fixed width, ellipsis ═══ */}
      {!summaryOpen && !openChat && (
        <div onClick={() => setSummaryOpen(true)}
          style={{
            position:'absolute', bottom:90, right:20, zIndex:20,
            background:'#0F0F0F', borderRadius:50,
            padding:'9px 16px', width:190,
            display:'flex', alignItems:'center', gap:7,
            cursor:'pointer',
            boxShadow:'0 4px 20px rgba(0,0,0,0.18)',
            animation:'fadeUp .4s ease both',
          }}>
          <div style={{ width:6, height:6, borderRadius:3, background:'#0095F6', flexShrink:0, animation:'pulse 1.4s ease-in-out infinite' }} />
          <AgentPillText />
        </div>
      )}

      {/* ═══ Expanded agent screen ═══ */}
      {summaryOpen && <AgentExpandedScreen onDismiss={() => setSummaryOpen(false)} />}

      {/* ═══ Feedback bottom sheet ═══ */}
      {showFeedbackSheet && (
        <div style={{ position:'absolute', inset:0, zIndex:80 }}>
          {/* Dim backdrop */}
          <div onClick={() => setShowFeedbackSheet(false)} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.25)' }} />
          {/* Sheet */}
          <div className="sheet-up" style={{
            position:'absolute', bottom:0, left:0, right:0,
            background:'#0F0F0F', borderRadius:'22px 22px 0 0',
            padding:'10px 22px 48px',
          }}>
            <div style={{ width:36, height:4, background:'rgba(255,255,255,0.14)', borderRadius:2, margin:'0 auto 20px' }} />
            <div style={{ fontSize:15, fontWeight:500, color:'#fff', marginBottom:14, letterSpacing:'-0.01em' }}>What feels off?</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {[
                'Some of these aren\'t important to me',
                'Missing messages I care about',
                'Groups don\'t match how I think',
                'Too many categories',
                'The order feels wrong',
              ].map(reason => (
                <div key={reason} onClick={() => handleFeedbackReason(reason)}
                  style={{ padding:'13px 16px', background:'rgba(255,255,255,0.06)', borderRadius:12, cursor:'pointer', fontSize:14, color:'rgba(255,255,255,0.8)', letterSpacing:'-0.01em', transition:'background .15s ease', border:'1px solid rgba(255,255,255,0.06)' }}>
                  {reason}
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:8, marginTop:12, alignItems:'center' }}>
              <div style={{ flex:1, padding:'13px 16px', background:'rgba(255,255,255,0.06)', borderRadius:12, border:'1px solid rgba(255,255,255,0.06)' }}>
                <input value={feedbackCustomText} onChange={e => setFeedbackCustomText(e.target.value)}
                  placeholder="Something else..."
                  onKeyDown={e => { if (e.key === 'Enter') handleFeedbackCustom(); }}
                  style={{ border:'none', outline:'none', fontSize:14, color:'#fff', width:'100%', background:'transparent', fontFamily:'Inter, system-ui, sans-serif', letterSpacing:'-0.01em' }} />
              </div>
              {feedbackCustomText.trim() && (
                <div onClick={handleFeedbackCustom}
                  style={{ width:36, height:36, borderRadius:18, background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0F0F0F" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Chat Detail Overlay */}
      {openChat && (
        <ChatDetail
          item={openChat.item}
          label={openChat.label}
          labelColor={openChat.labelColor}
          isSensitive={openChat.isSensitive}
          draftMode={draftMode}
          onClose={() => {
            setOpenChat(null);
          }}
          onSent={(user) => setAnsweredChats(prev => new Set([...prev, user]))}
          onSkipDraft={() => {
            const newCount = skipDraftCount + 1;
            setSkipDraftCount(newCount);
            return newCount;
          }}
          onDraftFeedback={() => { setDraftMode('inline'); setShowModeChangeNotif(true); }}
          isFirstSend={!firstSendDone}
          onFirstSend={() => setFirstSendDone(true)}
        />
      )}
    </div>
  );
}

/* ═══ APP ═══ */

function App() {
  const [screen, setScreen] = useState(window.location.hash === '#inbox' ? 'main' : 'ob-welcome');
  const [hideNav, setHideNav] = useState(false);
  const [openChatOnLoad, setOpenChatOnLoad] = useState(null); // item to auto-open after onboarding

  // Find jayrunz item for "Reply now"
  const jayrunzItem = IMPORTANT_GROUPS[0].items[0];

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden' }}>

      {/* ─── Onboarding (3-screen flow: welcome → loading → results) ─── */}
      {screen === 'ob-welcome' && <ObWelcomeV2b onNext={() => setScreen('ob-loading')} />}
      {screen === 'ob-loading' && <ObSorting onNext={() => setScreen('ob-question')} />}
      {screen === 'ob-question' && <ObQuestion onNext={() => setScreen('ob-results')} />}
      {screen === 'ob-results' && <ObResultsV2b
        onReplyNow={() => { setOpenChatOnLoad(jayrunzItem); setScreen('main'); }}
        onOpenInbox={() => setScreen('main')}
      />}

      {/* ─── Inbox ─── */}
      {screen === 'main' && <InboxV2 onOverlayChange={(open) => setHideNav(open)} openChatOnLoad={openChatOnLoad} />}

      {/* Bottom Nav — visible on welcome + main inbox, hidden on loading/results/overlays */}
      {(screen === 'ob-welcome' || (screen === 'main' && !hideNav)) && <BottomNav />}
    </div>
  );
}
