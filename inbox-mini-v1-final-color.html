  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-16px); } }

  @keyframes ringProgress { from { stroke-dashoffset: 283; } }
  @keyframes sheetUp { from { opacity:0; transform:translateY(100%); } to { opacity:1; transform:translateY(0); } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  .fade-in { animation: fadeIn .3s ease both; }
  .sheet-up { animation: sheetUp .45s cubic-bezier(.32,.72,.35,1.01) both; }

    0%   { opacity:0; transform:translateY(40px) scale(0.92); }

  .pill-expand { animation: pillExpandIn .4s cubic-bezier(.16,1,.3,1) both; }
  .cursor-blink { display:inline-block; width:2px; height:14px; background:#7C3AED; margin-left:2px; vertical-align:text-bottom; animation: blink .8s step-end infinite; }

  /* ── Agent takeover: gradient wave erupts from button, fills screen ── */
  @keyframes agent-takeover {
    0%   { clip-path: circle(0%   at 50% 94%); opacity: 0.85; }
    60%  { clip-path: circle(80%  at 50% 94%); opacity: 1;    }
    100% { clip-path: circle(160% at 50% 94%); opacity: 1;    }
  }
  /* ── Text wave: each line floats up as the gradient passes through ── */
  @keyframes text-wave {
    0%   { transform: translateY(0)    scaleX(1);    filter: blur(0px);   opacity: 1;   }
    25%  { transform: translateY(-14px) scaleX(1.015); filter: blur(2px);  opacity: 0.7; }

    80%  { transform: translateY(-2px) scaleX(1);    filter: blur(0px);   opacity: 1;   }
    100% { transform: translateY(0)    scaleX(1);    filter: blur(0px);   opacity: 1;   }

  /* ── Button pulse on press ── */

    0%   { box-shadow: 0 0 0   0px rgba(124,58,237,0);   }
    40%  { box-shadow: 0 0 28px 12px rgba(124,58,237,0.5); }
    100% { box-shadow: 0 0 0   0px rgba(124,58,237,0);   }
  }
  .slide-up { animation: slideUp .35s cubic-bezier(.25,.46,.45,.94) both; }

  /* ── ManyChat AI Gradient System ── */
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 100% 50%; }
    50%  { background-position: 100% 0%; }
    75%  { background-position: 0% 100%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes gradientGlow {
    0%   { opacity:0.5; filter:blur(40px); transform:scale(0.9) rotate(0deg); }
    33%  { opacity:0.7; filter:blur(50px); transform:scale(1.1) rotate(120deg); }
    66%  { opacity:0.6; filter:blur(45px); transform:scale(1.0) rotate(240deg); }
    100% { opacity:0.5; filter:blur(40px); transform:scale(0.9) rotate(360deg); }

    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(30px, -20px) scale(1.1); }
    50%  { transform: translate(-20px, 15px) scale(0.95); }
    75%  { transform: translate(15px, 25px) scale(1.05); }
    100% { transform: translate(0, 0) scale(1); }

    background: linear-gradient(135deg, #7C3AED, #0095F6, #EC4899, #F59E0B, #7C3AED);

    animation: gradientShift 8s ease infinite;

    position:relative; overflow:hidden;
  }

    animation: gradientShift 6s ease infinite;
  }
  .ai-glow-orb {
    position:absolute; border-radius:50%; pointer-events:none;

/* ─── Shared: Option Card ─── */
function OptCard({ title, desc, emoji, selected, onClick, small }) {
  return (
    <div onClick={onClick}
      style={{ padding: small ? '14px 18px' : '18px 22px', background: selected ? T.warmGray : T.cardBg, borderRadius:14,
        border: selected ? `1.5px solid ${T.ink}` : `1px solid ${T.lightGray}`,
        cursor:'pointer', transition:'all .2s ease', display:'flex', alignItems:'flex-start', gap:14 }}>
      {emoji && <span style={{ fontSize:24, flexShrink:0, marginTop:small?0:2 }}>{emoji}</span>}
      <div>
        <div style={{ fontSize: small ? 14 : 15, fontWeight:600, color:T.ink, letterSpacing:'-0.01em' }}>{title}</div>
        {desc && <div style={{ fontSize:13, color:T.gray, marginTop:4, lineHeight:1.45 }}>{desc}</div>}
      </div>
    </div>
  );
}

/* ─── Shared: Black CTA Button ─── */
function BlackBtn({ label, onClick, disabled }) {

      style={{ width:'100%', padding:'14px 0', background: disabled ? T.lightGray : T.ink, color: disabled ? T.gray : '#FFFFFF',
        border:'none', borderRadius:12, fontSize:15, fontWeight:600, cursor: disabled ? 'default' : 'pointer',
        transition:'all .2s ease', letterSpacing:'-0.01em' }}>
      {label}
    </button>
  );
}

/* ─── Shared: Blue CTA Button ─── */
function BlueBtn({ label, onClick, disabled }) {

        transition:'all .2s ease', letterSpacing:'-0.01em' }}>
      {label}
    </button>
  );
}

/* ─── Shared: Progress Ring (SVG) ─── */
function ProgressRing({ progress, size = 120, stroke = 6, trackColor, fillColor }) {
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (progress / 100) * circumference;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={trackColor || T.lightGray} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={fillColor || T.accent} strokeWidth={stroke}
        strokeDasharray={circumference} strokeDashoffset={offset}
        strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.6s ease' }} />
    </svg>
  );
}

/* Staggered fade-in messages (replaces TypeWriter — 2s instead of 25s) */
function InboxMessages({ messages, onAllDone }) {
  const [visibleCount, setVisibleCount] = useState(0);

  useEffect(() => {
    messages.forEach((_, i) => {
      setTimeout(() => {
        setVisibleCount(i + 1);
        if (i === messages.length - 1 && onAllDone) {
          setTimeout(onAllDone, 400);
        }
      }, 300 + i * 500);
    });
  }, [messages.length]);

  return (
    <div>
      {messages.map((msg, i) => (
        <div key={i} style={{ marginBottom: 10, opacity: i < visibleCount ? 1 : 0, transform: i < visibleCount ? 'translateY(0)' : 'translateY(12px)', transition: 'all .35s ease-out' }}>
          {i === 0 && (
            <div style={{ fontSize: 12, color: T.gray, marginBottom: 6, fontWeight: 500, letterSpacing: '0em' }}>
              Inbox Agent

          <div style={{ background: T.warmGray, borderRadius: 18, borderTopLeftRadius: i === 0 ? 18 : 6, padding: '14px 18px', maxWidth: '88%', display: 'inline-block' }}>
            <div style={{ fontSize: 15, color: T.ink, lineHeight: 1.55, letterSpacing: '-0.01em' }}>{msg}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── Conversational single-sentence feed ─── */
function ConversationalFeed({ sentences, onDone, isDark }) {
  const inkColor = isDark ? '#FFFFFF' : '#1A1A1A';
  const [idx, setIdx] = useState(0);
  const [phase, setPhase] = useState('in'); // 'in' | 'out'
  const t1 = useRef(null); const t2 = useRef(null);

  useEffect(() => {
    clearTimeout(t1.current); clearTimeout(t2.current);
    setPhase('in'); // always fade in when idx changes

    if (idx >= sentences.length - 1) {
      t1.current = setTimeout(onDone, 2200);
      return () => clearTimeout(t1.current);
    }
    // hold for 2s → fade out → bump idx (which re-triggers this effect)
    t1.current = setTimeout(() => {
      setPhase('out');
      t2.current = setTimeout(() => setIdx(n => n + 1), 420);
    }, 2000);
    return () => { clearTimeout(t1.current); clearTimeout(t2.current); };
  }, [idx]);

  return (
    <div style={{ padding:'0 36px' }}>
      <div style={{
        fontSize: 20,
        fontWeight: 500,
        color: inkColor,
        opacity: phase === 'in' ? 1 : 0,
        transform: phase === 'in' ? 'translateY(0)' : 'translateY(-8px)',
        transition: 'opacity 0.42s ease, transform 0.42s ease',
        letterSpacing: '-0.025em',
        lineHeight: 1.35,
      }}>
        {sentences[idx]}
      </div>
    </div>
  );
}

/* ─── NEW Step 2: Sorting (loading + question + loading) ─── */
function ObSorting({ onNext, onSkip, isDark }) {
  const TH = isDark ? {
    paper: '#0F0F0F', ink: '#FFFFFF', gray: 'rgba(255,255,255,0.45)',
    lightGray: 'rgba(255,255,255,0.12)', accent: '#7C3AED',
    cardBg: 'rgba(255,255,255,0.06)', warmGray: 'rgba(255,255,255,0.08)',
  } : T;
  const [phase, setPhase] = useState('loading1'); // loading1 | loading2
  const [count, setCount] = useState(0);
  const [statusIdx, setStatusIdx] = useState(0);
  const timers = useRef([]);

  const loading1Status = [
    'Reading your DMs...',
    'Your 12-week course is very popular 👀',
    'Found a few leads who are ready to talk...',
    'A few things in here need you...',
    'Some of it I can handle...',
    'Got a clear picture now.',
  ];
  const loading2Status = [
    'Reading how you write...',
    'You\'re warm and direct ✨',
    'Figuring out what needs you first...',
    'Almost ready...',
  ];
  const countSteps = [0, 46, 87, 118, 142];

  useEffect(() => {
    return () => timers.current.forEach(t => clearTimeout(t));
  }, []);

  useEffect(() => {
    if (phase === 'loading1') {
      setCount(0);
      setStatusIdx(0);
      countSteps.forEach((val, i) => {
        if (i === 0) return;
        timers.current.push(setTimeout(() => setCount(val), i * 1200));
      });
      loading1Status.forEach((_, i) => {
        timers.current.push(setTimeout(() => setStatusIdx(i), i * 1200));
      });
      timers.current.push(setTimeout(() => setPhase('loading2'), loading1Status.length * 1200 + 600));
    }
    if (phase === 'loading2') {
      setStatusIdx(0);
      loading2Status.forEach((_, i) => {
        timers.current.push(setTimeout(() => setStatusIdx(i), i * 1000));
      });
      timers.current.push(setTimeout(onNext, loading2Status.length * 1000 + 800));
    }
  }, [phase]);

  const progress = phase === 'loading1' ? (count / 142) * 60 : 65 + (statusIdx / (loading2Status.length - 1)) * 35;
  const statusLines = phase === 'loading1' ? loading1Status : loading2Status;

  // Loading phases (1 and 2) — conversational rolling feed
  return (
    <div className="fade-up" style={{ background:'#fff', height:'100%', display:'flex', flexDirection:'column', justifyContent:'center', position:'relative', overflow:'hidden' }}>
      <GradientOrbs />
      <div style={{ position:'relative', zIndex:1 }}>
        <ConversationalFeed
          key={phase}
          sentences={phase === 'loading1' ? loading1Status : loading2Status}
          onDone={phase === 'loading1' ? () => setPhase('loading2') : onNext}
          isDark={false}
        />
      </div>
    </div>
  );
}

          <div style={{ fontSize:14, color:'rgba(255,255,255,0.7)', lineHeight:1.5, fontStyle:'italic' }}>"Thanks for answering so quickly, I really appreciate it"</div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.3)', marginTop:6 }}>@jess.wellness</div>
        </div>
      </div>

      <div style={{ padding:'16px 28px 40px' }}>
        <button onClick={onDismiss}
          style={{ width:'100%', padding:'14px 0', background:'transparent', color:'rgba(255,255,255,0.7)',
            border:'1.5px solid rgba(255,255,255,0.15)', borderRadius:50, fontSize:15, fontWeight:500, cursor:'pointer',
            letterSpacing:'-0.01em' }}>
          Got it
        </button>
      </div>
    </div>
  );
}

/* ─── Agent Sheet — conversational bottom panel with streaming text ─── */
function AgentSheet({ item, onSend, onEdit, onSkip }) {
  const [phase, setPhase] = useState('skeleton');

  const questions = [
    'Want me to send this?',
    'Ready to send?',
    'Should I go ahead with this?',
    'Does this work for you?',
    'Good to send?',
    'Send this one?',
    'How does this look?',
    'Want me to fire this off?',
  ];
  const [question] = useState(() => questions[Math.floor(Math.random() * questions.length)]);

  const textStyle = { fontSize:15, fontWeight:400, color:T.ink, lineHeight:1.55, letterSpacing:'-0.01em' };

  // Skeleton → draft after brief pause
  useEffect(() => {
    const t = setTimeout(() => setPhase('draft'), 400);
    return () => clearTimeout(t);
  }, []);

  // Split reason into sentences for streaming
  const reasonSentences = (item.reason || '').match(/[^.!?]+[.!?]?\s*/g) || [item.reason];
  const [visibleSentences, setVisibleSentences] = useState(0);

  useEffect(() => {
    if (phase !== 'reason') return;
    const timers = [];
    reasonSentences.forEach((_, i) => {
      timers.push(setTimeout(() => {
        setVisibleSentences(i + 1);
        if (i === reasonSentences.length - 1) {
          setTimeout(() => setPhase('question'), 400);
        }
      }, i * 500 + 100));
    });
    return () => timers.forEach(t => clearTimeout(t));
  }, [phase]);

  // Draft → reason
  useEffect(() => {
    if (phase !== 'draft') return;
    const t = setTimeout(() => setPhase('reason'), 300);
    return () => clearTimeout(t);
  }, [phase]);

  // Question → buttons
  const [visibleQ, setVisibleQ] = useState(0);
  useEffect(() => {
    if (phase !== 'question') return;
    const t = setTimeout(() => {
      setVisibleQ(1);
      setTimeout(() => setPhase('buttons'), 400);
    }, 200);
    return () => clearTimeout(t);
  }, [phase]);

  const phaseOrder = ['skeleton','draft','reason','question','buttons'];
  const phaseIdx = phaseOrder.indexOf(phase);

  return (
    <div className="sheet-up" style={{
      position:'absolute', bottom:0, left:0, right:0, zIndex:10,
    }}>
      {/* Gradient glow — floats behind the sheet */}
      <div style={{
        position:'absolute', top:-6, left:10, right:10, height:40,
        borderRadius:'22px 22px 0 0',
        background:'conic-gradient(from 90deg, #7C3AED, #0095F6, #EC4899, #F59E0B, #7C3AED)',
        opacity:0.35,
        animation:'glowRotate 8s linear infinite',
        pointerEvents:'none',
      }} />

      <div style={{
        background:'#fff',
        borderRadius:'22px 22px 0 0',
        padding:'10px 22px 48px',
        position:'relative',
      }}>
        {/* Soft gradient glow behind content */}
        <div style={{
          position:'absolute', top:-60, left:'50%', transform:'translateX(-50%)',
          width:200, height:120, borderRadius:'50%', pointerEvents:'none',
          background:'conic-gradient(from 0deg, rgba(124,58,237,0.08), rgba(0,149,246,0.06), rgba(236,72,153,0.06), rgba(245,158,11,0.05), rgba(124,58,237,0.08))',
          filter:'blur(30px)',
          animation:'gradientGlow 8s ease infinite',
        }} />

        {/* Sheet handle */}
        <div style={{ width:36, height:4, background:T.lightGray, borderRadius:2, margin:'0 auto 20px' }} />

        {/* Draft — fades in first */}
        {phaseIdx >= 1 && (
          <div className="fade-in" style={{ fontSize:14, color:T.gray, lineHeight:1.55, letterSpacing:'-0.01em', marginBottom:16, padding:'12px 14px', background:T.warmGray, borderRadius:12 }}>
            {item.draft}
          </div>
        )}

        {/* Streaming reason */}
        {phaseIdx >= 2 && (
          <div style={{ ...textStyle, marginBottom:14, minHeight:24 }}>
            {reasonSentences.map((s, i) => (
              <span key={i} style={{
                opacity: i < visibleSentences ? 1 : 0,
                transform: i < visibleSentences ? 'translateY(0)' : 'translateY(4px)',
                transition:'opacity .35s ease, transform .35s ease',
                display:'inline',
              }}>{i < visibleSentences ? s : ''}</span>
            ))}
          </div>
        )}

        {/* Streaming question */}
        {phaseIdx >= 3 && (
          <div style={{ ...textStyle, marginBottom: phaseIdx >= 4 ? 18 : 8, minHeight:24 }}>
            <span style={{
              opacity: visibleQ > 0 ? 1 : 0,
              transform: visibleQ > 0 ? 'translateY(0)' : 'translateY(4px)',
              transition:'opacity .35s ease, transform .35s ease',
            }}>{visibleQ > 0 ? question : ''}</span>
          </div>
        )}

        {/* Actions */}
        {phaseIdx >= 4 && (
          <div className="fade-in" style={{ display:'flex', gap:8, alignItems:'center' }}>
            <button onClick={onSend}
              style={{ flex:1, padding:'13px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:700, cursor:'pointer', letterSpacing:'-0.01em' }}>
              Yes, send
            </button>
            <button onClick={onEdit}
              style={{ flex:1, padding:'13px 0', background:'transparent', border:`1.5px solid ${T.lightGray}`, borderRadius:50, fontSize:14, fontWeight:500, cursor:'pointer', color:T.ink, letterSpacing:'-0.01em' }}>
              Let me edit
            </button>
            <button onClick={onSkip}
              style={{ padding:'13px 10px', background:'transparent', border:'none', fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray, flexShrink:0, whiteSpace:'nowrap' }}>
              I'll write
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Streaming text — character-by-character like ChatGPT/Claude ─── */
/* Sentence-by-sentence fade — like Claude's UI */
function StreamText({ text, speed = 22, delay = 0, onDone, style }) {
  // Split into sentences (keep delimiters attached)
  const sentences = text.match(/[^.!?]+[.!?]?\s*/g) || [text];
  const [visibleCount, setVisibleCount] = useState(0);

  useEffect(() => {
    const timers = [];
    sentences.forEach((_, i) => {
      timers.push(setTimeout(() => {
        setVisibleCount(i + 1);
        if (i === sentences.length - 1 && onDone) {
          setTimeout(onDone, 300);
        }
      }, delay + i * 600));
    });
    return () => timers.forEach(t => clearTimeout(t));
  }, [text]);

  return (
    <span style={style}>
      {sentences.map((s, i) => (
        <span key={i} style={{
          opacity: i < visibleCount ? 1 : 0,
          transform: i < visibleCount ? 'translateY(0)' : 'translateY(6px)',
          transition: 'opacity .4s ease, transform .4s ease',
          display: 'inline',
        }}>{i < visibleCount ? s : ''}</span>
      ))}
    </span>
  );
}

/* ─── Chat Detail (full-screen overlay) ─── */
function ChatDetail({ item, label, labelColor, onClose, isSensitive, onSent, draftMode, onSkipDraft, onDraftFeedback, isFirstSend, onFirstSend }) {
  const useSuggestMode = draftMode === 'suggest' && item.draft && !isSensitive;

  // Modes:
  // suggest — AI proposes next action at bottom
  // inline — draft shown in chat body, input at bottom (fallback after feedback)
  // editing — editing draft (works in both modes)
  // custom — user writing from scratch
  // sent — message sent
  // summary — sensitive message summary
  // feedback — AI asks why user keeps skipping drafts
  const getInitialMode = () => {
    if (isSensitive) return 'summary';
    if (!item.draft) return 'custom';
    return useSuggestMode ? 'suggest' : 'inline';
  };

  const [mode, setMode] = useState(getInitialMode);
  const [editVal, setEditVal] = useState(item.draft || '');
  const [customVal, setCustomVal] = useState('');
  const [showToast, setShowToast] = useState(false);
  const [toastMsg, setToastMsg] = useState('');
  const [sentMsg, setSentMsg] = useState('');
  const [activeTone, setActiveTone] = useState(null);
  const [showSendCelebration, setShowSendCelebration] = useState(false);
  const [undoCount, setUndoCount] = useState(0);
  const undoTimerRef = useRef(null);
  const originalDraft = item.draft || '';
  const chatBodyRef = useRef(null);

  const triggerToast = (msg) => {
    setToastMsg(msg);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 2500);
  };

  const handleSend = () => {
    const msg = (mode === 'editing') ? editVal : item.draft;
    setSentMsg(msg);
    setMode('sent');
    if (mode === 'editing') {
      triggerToast(activeTone
        ? 'Got it — ' + activeTone.toLowerCase() + ' tone for similar messages.'
        : 'Noted — I\'ll adjust my style based on your edit.');
    }
    if (isFirstSend && onFirstSend) {
      onFirstSend();
      setShowSendCelebration(true);
      setTimeout(() => setShowSendCelebration(false), 1500);
    }
    if (onSent) onSent(item.user);
  };

  const handleSendCustom = () => {
    if (!customVal.trim()) return;
    setSentMsg(customVal);
    setMode('sent');
    if (onSent) onSent(item.user);
    triggerToast('Got it — I\'ll adjust for next time');
  };

  const handleIllReply = () => {
    if (onSkipDraft) {
      const count = onSkipDraft();
      if (count >= 5) {
        // 5th skip — trigger feedback
        setMode('feedback');
        return;
      }
    }
    setMode('custom');
    setCustomVal('');
  };

  const handleFeedbackChoice = (reason) => {
    triggerToast('Got it — ' + reason + '. I\'ll adjust.');
    if (onDraftFeedback) onDraftFeedback(); // switches parent to inline mode
    setMode('custom');
    setCustomVal('');
  };

  // Scroll chat to bottom on mode change
  useEffect(() => {
    if (chatBodyRef.current) {
      setTimeout(() => { chatBodyRef.current.scrollTop = chatBodyRef.current.scrollHeight; }, 50);
    }
  }, [mode]);

  // Undo timer
  useEffect(() => {
    if (mode !== 'sent') return;
    setUndoCount(5);
    let count = 5;
    undoTimerRef.current = setInterval(() => {
      count -= 1;
      setUndoCount(count);
      if (count <= 0) clearInterval(undoTimerRef.current);
    }, 1000);
    return () => clearInterval(undoTimerRef.current);
  }, [mode]);

  const handleUndo = () => {
    clearInterval(undoTimerRef.current);
    setMode(draftMode === 'suggest' ? 'suggest' : 'inline');
    setSentMsg('');
    setUndoCount(0);
  };

  // Conversation history
  const chatHistory = [
    { from: 'them', text: item.msg, time: item.time || '2h ago' },
  ];
  if (item.source === 'DM') {
    chatHistory.unshift({ from: 'them', text: 'Hey!', time: '2h ago' });
  }

  return (
    <div className="fade-up" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {showSendCelebration && (
        <div style={{
          position:'absolute', inset:0, zIndex:50, pointerEvents:'none',
          background:'linear-gradient(165deg, #006BE2 0%, #5B21B6 40%, #3B1280 100%)',
          animation:'agent-takeover 0.82s cubic-bezier(.4,0,.2,1) forwards',
        }} />
      )}
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={(e) => { e.stopPropagation(); onClose(); }} style={{ cursor:'pointer', fontSize:20, color:T.ink, fontWeight:300, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          {item.avatar && <img src={item.avatar} alt="" style={{ width:36, height:36, borderRadius:18, objectFit:'cover', background:T.lightGray }} />}
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink, letterSpacing:'-0.01em' }}>{item.name || item.user}</div>
            <div style={{ fontSize:11, color:T.gray }}>{item.user}</div>
          </div>
        </div>
      </div>

      {/* Chat body — always scrollable, never covered */}
      <div ref={chatBodyRef} style={{ flex:1, overflowY:'auto', padding:'20px 20px 12px', paddingBottom: mode === 'suggest' ? '300px' : '12px' }}>
        {chatHistory.map((m, i) => (
          <div key={i} style={{ marginBottom:12, display:'flex', justifyContent: m.from === 'you' ? 'flex-end' : 'flex-start' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:18, background: m.from === 'you' ? T.ink : T.cardBg, color: m.from === 'you' ? '#fff' : T.ink, border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 6 : 18, borderTopRightRadius: m.from === 'you' ? 6 : 18 }}>
              <div style={{ fontSize:14, lineHeight:1.5, letterSpacing:'-0.01em' }}>{m.text}</div>
              <div style={{ fontSize:10, color: m.from === 'you' ? 'rgba(255,255,255,0.45)' : T.gray, marginTop:4, textAlign:'right' }}>{m.time}</div>
            </div>
          </div>
        ))}

        {/* Summary for sensitive */}
        {mode === 'summary' && item.summary && (
          <div className="fade-up" style={{ marginBottom:12 }}>
            <div style={{ background:T.warmGray, borderRadius:14, padding:'14px 16px', maxWidth:'85%' }}>
              <div style={{ fontSize:10, fontWeight:600, color:T.gray, letterSpacing:'0.05em', marginBottom:6 }}>SUMMARY</div>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.55 }}>{item.summary}</div>
            </div>
          </div>
        )}

        {/* Inline draft (fallback mode — draft shown in chat body) */}
        {mode === 'inline' && item.draft && (
          <div className="fade-up" style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, marginBottom:4, fontWeight:500 }}>Inbox Agent</div>
            <div style={{ display:'flex', justifyContent:'flex-end' }}>
              <div style={{ maxWidth:'85%' }}>
                <div style={{ padding:'13px 16px', borderRadius:18, borderTopRightRadius:6, border:`1.5px dashed ${T.lightGray}`, background:T.warmGray }}>
                  <div style={{ fontSize:14, lineHeight:1.5, color:T.ink, letterSpacing:'-0.01em' }}>{item.draft}</div>
                </div>
                <div style={{ display:'flex', gap:6, marginTop:8 }}>
                  <button onClick={handleSend} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:20, fontSize:12, fontWeight:600, cursor:'pointer' }}>Send</button>
                  <button onClick={() => { setMode('editing'); setEditVal(item.draft); }} style={{ padding:'7px 14px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:20, fontSize:12, fontWeight:500, cursor:'pointer', color:T.ink }}>Edit</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Sent message */}
        {mode === 'sent' && (
          <div className="fade-up" style={{ marginBottom:12, display:'flex', justifyContent:'flex-end' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:18, borderTopRightRadius:6, background:T.ink, color:'#fff' }}>
              <div style={{ fontSize:14, lineHeight:1.5, letterSpacing:'-0.01em' }}>{sentMsg}</div>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.4)', marginTop:4, textAlign:'right' }}>Just now</div>
            </div>
          </div>
        )}
      </div>

      {/* ═══ Inbox Agent bottom sheet — conversational, streaming ═══ */}
      {mode === 'suggest' && item.draft && <AgentSheet item={item} onSend={handleSend} onEdit={() => { setMode('editing'); setEditVal(item.draft); }} onSkip={handleIllReply} />}

      {/* ═══ Bottom: Edit mode ═══ */}
      {mode === 'editing' && (
        <div className="fade-up" style={{ flexShrink:0, background:T.paper, padding:'0 20px 40px' }}>
          <div style={{ height:1, background:T.lightGray, marginBottom:16 }} />

          <textarea value={editVal} onChange={e => setEditVal(e.target.value)} autoFocus
            style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:'13px 16px', border:`1.5px solid ${T.ink}`, borderRadius:14, resize:'none', height:80, fontFamily:'Inter, system-ui, sans-serif', background:'#fff', outline:'none', letterSpacing:'-0.01em', boxSizing:'border-box' }} />

          {/* Tone chips */}
          <div style={{ display:'flex', gap:6, marginTop:10, flexWrap:'wrap' }}>
            {['Friendly','Formal','Shorter','Direct'].map(tone => (
              <span key={tone} onClick={() => {
                setActiveTone(tone);
                const base = originalDraft;
                if (tone === 'Shorter') {
                  const sentences = base.split(/(?<=[.!?])\s+/);
                  setEditVal(sentences.slice(0, Math.ceil(sentences.length / 2)).join(' '));
                } else if (tone === 'Friendly') {
                  setEditVal('Hey! ' + base.charAt(0).toLowerCase() + base.slice(1).replace(/\.$/, '') + ' :)');
                } else if (tone === 'Formal') {
                  setEditVal('Thank you for reaching out. ' + base.replace(/!/g, '.').replace(/Hey!?\s*/gi, ''));
                } else if (tone === 'Direct') {
                  const sentences = base.split(/(?<=[.!?])\s+/);
                  setEditVal(sentences.filter(s => s.length > 20).join(' ') || base);
                }
              }} style={{ fontSize:12, padding:'6px 14px', borderRadius:20, border: activeTone === tone ? `1.5px solid ${T.ink}` : `1px solid ${T.lightGray}`, cursor:'pointer', color: activeTone === tone ? '#fff' : T.ink, fontWeight:500, background: activeTone === tone ? T.ink : '#fff', transition:'all .15s ease' }}>{tone}</span>
            ))}
          </div>

          <div style={{ display:'flex', gap:8, marginTop:12 }}>
            <button onClick={handleSend}
              style={{ flex:1, padding:'12px 0', background:T.ink, color:'#fff', border:'none', borderRadius:12, fontSize:14, fontWeight:600, cursor:'pointer' }}>
              Send
            </button>
            <button onClick={() => { setMode('suggest'); setActiveTone(null); setEditVal(item.draft); }}
              style={{ padding:'12px 20px', background:'transparent', border:'none', fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
              Back
            </button>
          </div>
        </div>
      )}

      {/* ═══ Bottom: Feedback — AI asks why user skips drafts ═══ */}
      {mode === 'feedback' && (
        <div className="fade-up" style={{ flexShrink:0, background:T.paper, padding:'0 20px 40px' }}>
          <div style={{ height:1, background:T.lightGray, marginBottom:16 }} />

          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:T.gray, marginBottom:6, fontWeight:500 }}>Inbox Agent</div>
            <div style={{ fontSize:14, color:T.ink, lineHeight:1.55, letterSpacing:'-0.01em' }}>
              I noticed you've been writing your own replies lately. Anything I should do differently?
            </div>
          </div>

          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {[
              'They don\'t sound like me',
              'Too generic',
              'I just prefer writing myself',
              'They\'re too long',
              'Wrong tone for this audience',
            ].map(reason => (
              <div key={reason} onClick={() => handleFeedbackChoice(reason)}
                style={{ padding:'12px 16px', background:T.warmGray, borderRadius:12, cursor:'pointer', fontSize:13, color:T.ink, letterSpacing:'-0.01em', transition:'all .15s ease' }}>
                {reason}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ═══ Bottom: Sensitive message — agent reasoning + Reply personally CTA ═══ */}
      {mode === 'summary' && (
        <div className="fade-up" style={{ flexShrink:0, background:T.paper, padding:'0 20px 40px' }}>
          <div style={{ height:1, background:T.lightGray, marginBottom:16 }} />
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:11, color:T.gray, marginBottom:6, fontWeight:500 }}>Inbox Agent</div>
            <div style={{ fontSize:14, color:T.ink, lineHeight:1.55, letterSpacing:'-0.01em', marginBottom:12 }}>
              I read this and decided not to write anything. {item.summary}
            </div>
            <div style={{ fontSize:14, lineHeight:1.55, letterSpacing:'-0.01em', color:T.gray, fontStyle:'italic' }}>
              Write something short and human — don't sell.
            </div>
          </div>
          <button onClick={() => { setMode('custom'); setCustomVal(''); }}

            </div>

      {(mode === 'custom' || mode === 'sent') && (
        <div style={{ flexShrink:0, borderTop:`1px solid ${T.lightGray}`, background:T.paper, padding:'12px 20px 40px' }}>

              <input value={customVal} onChange={e => setCustomVal(e.target.value)}
                placeholder="Type your message..."
                onKeyDown={e => { if (e.key === 'Enter' && customVal.trim()) handleSendCustom(); }}
                style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter, system-ui, sans-serif' }} />

              <span style={{ color:'#fff', fontSize:13 }}>↑</span>
            </div>
          </div>
        </div>
      )}

      {/* ═══ Bottom: Undo bar after sending ═══ */}
      {mode === 'sent' && undoCount > 0 && (
        <div style={{ flexShrink:0, padding:'10px 20px 32px', display:'flex', alignItems:'center', justifyContent:'space-between', borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>

      {/* Toast */}
      {showToast && (
        <div style={{ position:'absolute', bottom:100, left:'50%', transform:'translateX(-50%)', background:T.ink, color:'#fff', padding:'10px 20px', borderRadius:10, fontSize:13, fontWeight:500, animation:'fadeUp .3s ease-out', whiteSpace:'nowrap', zIndex:110, boxShadow:'0 4px 16px rgba(28,26,22,.15)', letterSpacing:'-0.01em' }}>
          {toastMsg}

    </div>
  );
}

function ImportantTab({ onOpenChat, answeredChats, priorityFeedbackDone, onFeedbackGood, onFeedbackBad }) {

  const [customText, setCustomText] = useState('');

  // Collect all answered items across all groups into one flat list
  const allAnswered = IMPORTANT_GROUPS.flatMap(g =>
    g.items.filter(item => answeredChats.has(item.user)).map(item => ({ ...item, _sensitive: !!item._sensitive }))
  );

  const handleReasonPick = (reason) => {
    setFeedbackMode('done');
    onFeedbackGood(); // marks as done in parent

    if (!customText.trim()) return;
    setFeedbackMode('done');

    <div>

              onMouseEnter={e => { e.currentTarget.style.background = '#FFF0F0'; e.currentTarget.style.borderColor = '#E53935'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = T.lightGray; }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"/></svg>
            </div>
          </div>

      {!priorityFeedbackDone && feedbackMode === 'reasons' && (

/* ─── In-Progress Detail (full-screen conversation with feedback) ─── */
function InProgressDetail({ item, onClose }) {
  const [feedbackMsg, setFeedbackMsg] = useState(null); // index of AI msg being reviewed
  const [feedbackStep, setFeedbackStep] = useState(null); // 'pick' | 'reason' | 'correction' | 'done'
  const [selectedReason, setSelectedReason] = useState(null);
  const [correctionText, setCorrectionText] = useState('');
  const [correctedDraft, setCorrectedDraft] = useState('');

  const reasons = [
    'Too pushy / salesy',
    'Didn\'t answer the question',
    'Wrong tone',
    'Shared incorrect info',
    'Too long',
  ];

  const handleWrong = (idx) => { setFeedbackMsg(idx); setFeedbackStep('reason'); };
  const handleGood = (idx) => { setFeedbackMsg(idx); setFeedbackStep('done'); };

  const pickReason = (r) => {
    setSelectedReason(r);
    setFeedbackStep('correction');
    // Generate a "corrected" version
    const orig = item.conversation[feedbackMsg].text;
    if (r === 'Too pushy / salesy') setCorrectedDraft(orig.replace(/!+/g, '.').replace(/Want me to/, 'I can'));
    else if (r === 'Too long') setCorrectedDraft(orig.split('.').slice(0,2).join('.') + '.');
    else setCorrectedDraft(orig.replace(/\?$/, '. Let me know if you have questions.'));
  };

  const handleCorrectionGood = () => setFeedbackStep('done');

  return (
    <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={onClose} style={{ cursor:'pointer', fontSize:20, color:T.ink, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink }}>{item.user}</div>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <div style={{ width:6, height:6, borderRadius:3, background:T.accent }} />
              <span style={{ fontSize:11, color:T.accent }}>{item.step}</span>
            </div>
          </div>
        </div>
        <span style={{ fontSize:10, fontWeight:500, color:T.accent, background:T.accent+'14', padding:'4px 10px', borderRadius:6 }}>in progress</span>
      </div>

      {/* Conversation */}
      <div style={{ flex:1, overflowY:'auto', padding:'16px 20px' }}>
        {item.conversation.map((m, i) => (
          <div key={i} style={{ marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent: m.from === 'ai' ? 'flex-end' : 'flex-start' }}>
              <div style={{ maxWidth:'80%' }}>
                {m.from === 'ai' && <div style={{ fontSize:11, color:T.gray, marginBottom:3, textAlign:'right' }}>Inbox Agent</div>}
                <div style={{ padding:'12px 16px', borderRadius:18, background: m.from === 'ai' ? T.warmGray : T.cardBg, border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 6 : 18, borderTopRightRadius: m.from === 'ai' ? 6 : 18 }}>
                  <div style={{ fontSize:14, color:T.ink, lineHeight:1.5, letterSpacing:'-0.01em' }}>{m.text}</div>
                </div>
                {/* Feedback buttons for AI messages */}
                {m.from === 'ai' && feedbackMsg === null && (
                  <div className="fade-in" style={{ display:'flex', gap:6, justifyContent:'flex-end', marginTop:6 }}>
                    <button onClick={() => handleGood(i)} style={{ padding:'5px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:14, fontSize:10, cursor:'pointer', color:T.gray }}>Good</button>
                    <button onClick={() => handleWrong(i)} style={{ padding:'5px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:14, fontSize:10, cursor:'pointer', color:T.gray }}>Wrong</button>
                  </div>
                )}
                {/* Feedback: done/good */}
                {m.from === 'ai' && feedbackMsg === i && feedbackStep === 'done' && (
                  <div className="fade-in" style={{ fontSize:11, color:'#16a34a', textAlign:'right', marginTop:4 }}>Feedback saved</div>
                )}
              </div>
            </div>
          </div>
        ))}

        {/* Feedback flow: reason selection */}
        {feedbackStep === 'reason' && (
          <div className="fade-up" style={{ padding:'14px 16px', background:T.warmGray, borderRadius:12, marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, fontWeight:500, letterSpacing:'0.04em', textTransform:'none', marginBottom:8 }}>Inbox Agent</div>
            <div style={{ fontSize:13, color:T.ink, marginBottom:12 }}>What went wrong?</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {reasons.map(r => (
                <div key={r} onClick={() => pickReason(r)} style={{ padding:'10px 14px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, cursor:'pointer', fontSize:12, color:T.ink }}>
                  {r}
                </div>
              ))}
              <input placeholder="Something else..." onKeyDown={e => { if(e.key==='Enter' && e.target.value) pickReason(e.target.value); }}
                style={{ padding:'10px 14px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, fontSize:12, color:T.ink, fontFamily:'Inter', outline:'none' }} />
            </div>
          </div>
        )}

        {/* Feedback flow: correction proposal */}
        {feedbackStep === 'correction' && (
          <div className="fade-up" style={{ padding:'14px 16px', background:T.warmGray, borderRadius:12, marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, fontWeight:500, letterSpacing:'0.04em', textTransform:'none', marginBottom:8 }}>Inbox Agent</div>
            <div style={{ fontSize:13, color:T.ink, marginBottom:10 }}>Got it — {selectedReason.toLowerCase()}. Next time I'd say something like this:</div>
            <div style={{ padding:'10px 14px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, fontSize:13, color:T.ink, lineHeight:1.5, marginBottom:10 }}>
              {correctedDraft}
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={handleCorrectionGood} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Good</button>
              <button onClick={() => setFeedbackStep('reason')} style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.gray }}>Still wrong</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  const getChatItem = (m) => {
    // Find matching item in IMPORTANT_DATA or QUESTIONS_DATA for draft info
    const allImportant = IMPORTANT_GROUPS.flatMap(g => g.items);
    const match = allImportant.find(item => item.user === m.user);
    if (match) return match;
    return { user: m.user, msg: m.msg, source: 'DM', time: m.time };

  const handleClick = (m) => {
    const item = getChatItem(m);
    const isSensitive = m.category === 'sensitive';
    onOpenChat(item, m.badge || '', m.badgeColor || T.gray, isSensitive);
  };

  return (
    <div>

        <div key={i} onClick={() => handleClick(m)}

  const [morningDismissed, setMorningDismissed] = useState(true); // skip morning report on first setup

  const [answeredChats, setAnsweredChats] = useState(new Set());
  const [leadWalkthroughDone, setLeadWalkthroughDone] = useState(false);
  const [showLeadWalkthrough, setShowLeadWalkthrough] = useState(false);
  const [showLeadDef, setShowLeadDef] = useState(false);
  const [chatCloseCount, setChatCloseCount] = useState(0);
  const [showNotifModal, setShowNotifModal] = useState(false);
  const [notifModalDone, setNotifModalDone] = useState(false);
  const [headerHidden, setHeaderHidden] = useState(false);
  const [showPriorities, setShowPriorities] = useState(false);
  const [priorityFeedbackDone, setPriorityFeedbackDone] = useState(false);
  const [skipDraftCount, setSkipDraftCount] = useState(0);
  const [draftMode, setDraftMode] = useState('suggest'); // 'suggest' | 'inline'
  const [firstSendDone, setFirstSendDone] = useState(false);
  const [showModeChangeNotif, setShowModeChangeNotif] = useState(false);
  const scrollRef = useRef(null);
  const lastScrollTop = useRef(0);

  // Report overlay state AND scroll-hide to parent for nav visibility
  useEffect(() => {
    const anyOverlay = !!openChat || summaryOpen || showLeadWalkthrough || showLeadDef || showNotifModal || showPriorities;
    if (onOverlayChange) onOverlayChange(anyOverlay || headerHidden);
  }, [openChat, summaryOpen, showLeadWalkthrough, showLeadDef, showNotifModal, showPriorities, headerHidden]);

  const handleScroll = () => {
    if (!scrollRef.current) return;
    const st = scrollRef.current.scrollTop;
    const delta = st - lastScrollTop.current;

    if (delta > 5 && st > 40) {
      // Scrolling down
      setHeaderHidden(true);
    } else if (delta < -5) {
      // Scrolling up
      setHeaderHidden(false);
    }
    lastScrollTop.current = st;
  };

  const handleOpenChat = (item, label, labelColor, isSensitive) => {
    setOpenChat({ item, label, labelColor, isSensitive });
    // First time opening a lead? Show walkthrough after 1 sec delay
    if (label === 'lead' && !leadWalkthroughDone) {
      setTimeout(() => setShowLeadWalkthrough(true), 500);
    }
  };

  const handleLeadWalkthroughDone = () => {
    setLeadWalkthroughDone(true);
    setShowLeadDef(false);
    setShowLeadWalkthrough(false);
  };

  const counts = {
    important: IMPORTANT_GROUPS.reduce((sum, g) => sum + g.items.length, 0),
    all: ALL_MESSAGES.length,
  };

  return (
    <div style={{ background:T.paper, height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>

      {!morningDismissed && (

      {showLeadWalkthrough && !showLeadDef && (
        <LeadWalkthrough
          onNow={() => { setShowLeadWalkthrough(false); setShowLeadDef(true); }}
          onLater={() => handleLeadWalkthroughDone()}
        />
      )}

      {showLeadDef && (
        <LeadDefOverlay onDismiss={() => handleLeadWalkthroughDone()} />
      )}

      {showPriorities && (
        <PrioritiesOverlay onDismiss={() => setShowPriorities(false)} />
      )}

      {showNotifModal && (
        <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:150, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div onClick={() => { setShowNotifModal(false); setNotifModalDone(true); }} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.25)' }} />
          <div style={{ position:'relative', zIndex:151, background:T.paper, borderRadius:20, padding:'28px 24px', maxWidth:320, width:'90%', boxShadow:'0 12px 40px rgba(0,0,0,0.15)' }}>

            <div style={{ fontSize:16, fontWeight:600, color:T.ink, lineHeight:1.4, marginBottom:8 }}>

              <button onClick={() => { setShowNotifModal(false); setNotifModalDone(true); }} style={{ padding:'12px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:14, fontWeight:500, cursor:'pointer', color:T.gray }}>
                Skip

            </div>
          </div>

      )}

      {/* Top spacing */}

      {/* Scrollable content */}

        {showModeChangeNotif && (

              <div style={{ fontSize:11, color:T.gray, marginBottom:4, fontWeight:500 }}>Inbox Agent</div>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.5, letterSpacing:'-0.01em' }}>I noticed you've been writing your own replies. I'll put my drafts in the conversation from now on — easier to compare.</div>
            </div>
            <div onClick={() => setShowModeChangeNotif(false)} style={{ cursor:'pointer', color:T.gray, fontSize:18, lineHeight:1, paddingTop:1 }}>×</div>
          </div>
        )}
        <ImportantTab onOpenChat={handleOpenChat} answeredChats={answeredChats}
          priorityFeedbackDone={priorityFeedbackDone}
          onFeedbackGood={() => setPriorityFeedbackDone(true)}
          onFeedbackBad={() => setShowPriorities(true)} />
      </div>

      {/* ═══ Floating agent pill — white with animated gradient glow ═══ */}
      {!summaryOpen && !openChat && (
        <div onClick={() => setSummaryOpen(true)} className="fade-up"
          style={{ position:'absolute', bottom:90, right:20, zIndex:20, width:196, cursor:'pointer' }}>
          {/* Gradient glow layer — sits behind the pill */}
          <div style={{
            position:'absolute', inset:-4, borderRadius:50,
            background:'conic-gradient(from 0deg, #7C3AED, #0095F6, #EC4899, #F59E0B, #7C3AED)',
            opacity:0.45,
            animation:'glowRotate 6s linear infinite',
          }} />
          {/* White pill */}
          <div style={{
            position:'relative', background:'#fff', borderRadius:50,
            padding:'9px 14px',
            display:'flex', alignItems:'center', gap:7,
          }}>
            <div style={{ width:6, height:6, borderRadius:3, background:'#7C3AED', flexShrink:0, animation:'pulse 1.4s ease-in-out infinite' }} />
            <AgentPillTextLight />
          </div>
        </div>
      )}

      {/* ═══ Expanded agent screen ═══ */}
      {summaryOpen && <AgentExpandedScreen onDismiss={() => setSummaryOpen(false)} />}

      {/* Chat Detail Overlay */}
      {openChat && (
        <ChatDetail
          item={openChat.item}
          label={openChat.label}
          labelColor={openChat.labelColor}
          isSensitive={openChat.isSensitive}
          draftMode={draftMode}
          onClose={() => {
            setOpenChat(null);
            const newCount = chatCloseCount + 1;
            setChatCloseCount(newCount);
            if (newCount === 3 && !notifModalDone) {
              setTimeout(() => setShowNotifModal(true), 400);
            }
          }}
          onSent={(user) => setAnsweredChats(prev => new Set([...prev, user]))}
          onSkipDraft={() => {
            const newCount = skipDraftCount + 1;
            setSkipDraftCount(newCount);
            return newCount;
          }}
          onDraftFeedback={() => { setDraftMode('inline'); setShowModeChangeNotif(true); }}
          isFirstSend={!firstSendDone}
          onFirstSend={() => setFirstSendDone(true)}
        />
      )}
    </div>
  );
}

function FocusMode({ reviewIdx, setReviewIdx }) {
  const [phase, setPhase] = useState('greeting'); // greeting, reviewing, batch, takeover, done
  const [sentItems, setSentItems] = useState([]);
  const [batchMode, setBatchMode] = useState(true);
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState('');
  const [batchExpanded, setBatchExpanded] = useState(false);
  const scrollRef = useRef(null);

  const currentItem = REVIEWS[reviewIdx];
  const allDone = reviewIdx >= REVIEWS.length;

  const batchItems = currentItem && currentItem.batch && batchMode
    ? REVIEWS.filter(r => r.batch === currentItem.batch && REVIEWS.indexOf(r) >= reviewIdx)
    : [];
  const isBatch = batchItems.length >= 2 && batchMode;

  const startReviewing = () => setPhase('reviewing');

  const handleApprove = () => {
    setSentItems(s => [...s, currentItem]);
    setReviewIdx(i => i+1);
    setEditing(false);
    setPhase('reviewing');
  };
  const handleBatchApprove = () => {
    setSentItems(s => [...s, ...batchItems]);
    setReviewIdx(i => i + batchItems.length);
    setBatchMode(false);
    setPhase('reviewing');
  };
  const handleSkip = () => { setReviewIdx(i => i+1); setEditing(false); setPhase('reviewing'); };

  // Check if done after state changes
  useEffect(() => {
    if(phase === 'reviewing' && reviewIdx >= REVIEWS.length) setPhase('done');
  }, [reviewIdx, phase]);

  // Check if next item is a batch
  useEffect(() => {
    if(phase === 'reviewing' && isBatch) setPhase('batch');
  }, [reviewIdx, phase]);

  useEffect(() => {
    if(scrollRef.current) setTimeout(() => { scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 50);
  }, [phase, reviewIdx, sentItems.length, editing]);

  useEffect(() => { if(currentItem) setEditVal(currentItem.draft); }, [reviewIdx]);

  return (
    <div style={{ height:'calc(100% - 120px)', display:'flex', flexDirection:'column' }}>
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'0 24px 20px' }}>

        {/* ── Phase: Greeting (clean, one message) ── */}

              <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>Inbox Agent</div>

function App() {
  const [screen, setScreen] = useState(window.location.hash === '#inbox' ? 'main' : 'ob-welcome');
  const [hideNav, setHideNav] = useState(false);

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden' }}>

      {/* ─── Onboarding (3-screen flow: welcome → loading → results) ─── */}
      {screen === 'ob-welcome' && <ObWelcomeV2b onNext={() => setScreen('ob-loading')} />}
      {screen === 'ob-loading' && <ObSorting onNext={() => setScreen('ob-results')} />}
      {screen === 'ob-results' && <ObResultsV2b onNext={() => setScreen('main')} />}

      {/* ─── Inbox ─── */}
      {screen === 'main' && <InboxV2 onOverlayChange={(open) => setHideNav(open)} />}

      {/* Bottom Nav — visible on welcome + main inbox, hidden on loading/results/overlays */}
      {(screen === 'ob-welcome' || (screen === 'main' && !hideNav)) && <BottomNav />}
    </div>
  );
}
