/* Staggered fade-in messages (replaces TypeWriter — 2s instead of 25s) */
function ChattyMessages({ messages, onAllDone }) {
  const [visibleCount, setVisibleCount] = useState(0);

  useEffect(() => {
    messages.forEach((_, i) => {
      setTimeout(() => {
        setVisibleCount(i + 1);
        if (i === messages.length - 1 && onAllDone) {
          setTimeout(onAllDone, 400);
        }
      }, 300 + i * 500);
    });
  }, [messages.length]);

  return (
    <div>
      {messages.map((msg, i) => (
        <div key={i} style={{ marginBottom: 10, opacity: i < visibleCount ? 1 : 0, transform: i < visibleCount ? 'translateY(0)' : 'translateY(12px)', transition: 'all .35s ease-out' }}>
          {i === 0 && (
            <div style={{ fontSize: 11, color: T.gray, marginBottom: 5, fontWeight: 500, letterSpacing: '0.05em', textTransform: 'uppercase' }}>
              · Chatty
            </div>
          )}
          <div style={{ background: T.warmGray, borderRadius: 14, borderTopLeftRadius: i === 0 ? 14 : 4, padding: '13px 17px', maxWidth: '88%', display: 'inline-block' }}>
            <div style={{ fontSize: 15, color: T.ink, lineHeight: 1.55 }}>{msg}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* Progress bar with step label */
function ProgressBar({ step, total, label }) {
  return (
    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
      <div style={{ height: 3, background: T.lightGray }}>
        <div style={{ height: '100%', background: T.ink, width: `${(step / total) * 100}%`, transition: 'width .4s ease' }} />
      </div>
      {label && (
        <div style={{ padding: '8px 28px 0', fontSize: 10, color: T.gray, fontWeight: 500, letterSpacing: '0.03em' }}>
          Step {step} of {total} · {label}
        </div>
      )}
    </div>
  );
}

/* ─── Step 6: Show examples ─── */
function ObExamples({ onNext, onBack }) {
  const [idx, setIdx] = useState(0);
  const [showAlt, setShowAlt] = useState(false);
  const [draftFading, setDraftFading] = useState(false);
  const examples = [
    { from: '@user5', msg: 'Do you offer refunds?', draft: 'Yes, 7-day no-questions refund policy. No questions asked.', tag: 'Common question', altDraft: "We do offer a 7-day money-back guarantee. If it's not for you, no hard feelings. Want me to send the details?" },
    { from: '@user16', msg: "I'm interested but nervous. Is this really for someone like me?", draft: "Especially for someone like you. Let's chat.", tag: 'Interested lead', altDraft: "I hear you — spending money on yourself is a big step. What if I showed you exactly what week 1 looks like, no commitment?" },
    { from: '@user18', msg: 'Just finished week 4, feeling amazing!', draft: 'YES! Week 4 is a turning point. So proud of you!', tag: 'Positive', altDraft: "That's amazing progress! Week 4 is where it really clicks. Keep pushing — you're doing incredible." },
  ];

  const handleDifferent = () => {
    setDraftFading(true);
    setTimeout(() => {
      setShowAlt(true);
      setDraftFading(false);

  const handleLike = () => {
    setShowAlt(false);
    if (idx < examples.length - 1) setIdx(i => i + 1);

  // Reset showAlt when idx changes
  useEffect(() => { setShowAlt(false); }, [idx]);

  const ex = examples[idx];
  const displayedDraft = showAlt ? ex.altDraft : ex.draft;

  return (
    <div className="fade-up" style={{ background: T.paper, height: '100%', display: 'flex', flexDirection: 'column', position: 'relative' }}>
      <ProgressBar step={7} total={8} label="Examples" />

        <div style={{ background: T.warmGray, borderRadius: 14, padding: '12px 17px', marginBottom: 20, display: 'inline-block' }}>
          <div style={{ fontSize: 15, color: T.ink }}>Here's a draft I'd write for this one.</div>
        </div>

        <div key={idx} className="fade-up">
          <div style={{ fontSize: 11, color: T.gray, marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.05em' }}>From {ex.from}</div>
          <div style={{ background: T.warmGray, borderRadius: 12, padding: '13px 17px', marginBottom: 16 }}>
            <div style={{ fontSize: 15, color: T.ink, lineHeight: 1.5 }}>{ex.msg}</div>
          </div>

          <div style={{ fontSize: 11, color: T.gray, marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.05em' }}>· Chatty's draft</div>
          <div style={{ background: '#fff', border: `1.5px solid ${T.ink}`, borderRadius: 12, padding: '13px 17px', marginBottom: 12, transition: 'opacity 0.2s ease', opacity: draftFading ? 0 : 1 }}>
            <div style={{ fontSize: 15, color: T.ink, lineHeight: 1.5 }}>{displayedDraft}</div>
          </div>

          <div style={{ display: 'inline-block', padding: '4px 12px', border: `1px solid ${T.ink}`, borderRadius: 6, fontSize: 11, fontWeight: 600, color: T.ink, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{ex.tag}</div>
        </div>

        <div style={{ textAlign: 'center', marginTop: 8, fontSize: 12, color: '#bbb' }}>{idx + 1} of {examples.length}</div>
      </div>

      <div style={{ padding: '16px 28px 50px', display: 'flex', gap: 10 }}>

      </div>
    </div>
  );
}

          {badge && <span style={{ fontSize:9, fontWeight:600, color: badgeColor || T.gray, background: badgeColor ? badgeColor + '18' : T.warmGray, padding:'2px 8px', borderRadius:10, textTransform:'uppercase', letterSpacing:'0.04em' }}>{badge}</span>}
          <span style={{ fontSize:11, color:'#ccc' }}>{time}</span>
        </div>
      </div>
      <div style={{ fontSize:13, color:T.gray, lineHeight:1.4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{msg}</div>
    </div>
  );
}

/* ─── Chat Detail (full-screen overlay) ─── */
function ChatDetail({ item, label, labelColor, onClose, isSensitive, onSent }) {
  const [mode, setMode] = useState(isSensitive ? 'summary' : 'draft'); // draft, editing, custom, sent, summary
  const [editVal, setEditVal] = useState(item.draft || '');
  const [customVal, setCustomVal] = useState('');
  const [showToast, setShowToast] = useState(false);
  const [toastMsg, setToastMsg] = useState('');
  const [sentMsg, setSentMsg] = useState('');
  const [labelMenu, setLabelMenu] = useState(false); // label feedback
  const [labelReason, setLabelReason] = useState(false);
  const [labelHidden, setLabelHidden] = useState(false);
  const [activeTone, setActiveTone] = useState(null);
  const originalDraft = item.draft || '';

  // Close label menu when clicking outside
  useEffect(() => {
    if (!labelMenu && !labelReason) return;
    const close = () => { setLabelMenu(false); setLabelReason(false); };
    const timer = setTimeout(() => document.addEventListener('click', close, { once: true }), 100);
    return () => { clearTimeout(timer); document.removeEventListener('click', close); };
  }, [labelMenu, labelReason]);

  const triggerToast = (msg) => {
    setToastMsg(msg);
    setShowToast(true);
    setTimeout(() => setShowToast(false), 2500);
  };

  const handleSendDraft = () => {
    const wasEdited = mode === 'editing';
    setSentMsg(wasEdited ? editVal : item.draft);
    setMode('sent');
    if (wasEdited) {
      if (activeTone) {
        triggerToast('Got it — ' + activeTone.toLowerCase() + ' tone for similar messages.');
      } else {
        triggerToast('Noted — I\'ll adjust my style based on your edit.');
      }
    }
    if (onSent) onSent(item.user);
  };

  const handleSendCustom = () => {
    if (!customVal.trim()) return;
    setSentMsg(customVal);
    setMode('sent');
    if (onSent) onSent(item.user);
    triggerToast('Got it — I\'ll adjust for next time');
  };

  const handleDismissDraft = () => {
    setMode('custom');
    setCustomVal('');
  };

  // Fake conversation history
  const chatHistory = [
    { from: 'them', text: item.msg, time: item.time || '2h ago' },
  ];
  // Add some context messages for richer feel
  if (item.source === 'DM') {
    chatHistory.unshift({ from: 'them', text: 'Hey!', time: '2h ago' });
  }

  return (
    <div className="fade-up" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={(e) => { e.stopPropagation(); onClose(); }} style={{ cursor:'pointer', fontSize:20, color:T.ink, fontWeight:300, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink }}>{item.user}</div>
            <div style={{ fontSize:11, color:T.gray }}>{item.source}</div>
          </div>
        </div>
        {!labelHidden && (
          <div style={{ position:'relative' }} onClick={(e) => { e.stopPropagation(); setLabelMenu(!labelMenu); setLabelReason(false); }}>
            <div style={{ fontSize:10, fontWeight:600, color:labelColor, background:labelColor+'18', padding:'6px 14px', borderRadius:10, textTransform:'uppercase', letterSpacing:'0.04em', cursor:'pointer', userSelect:'none' }}>{label}</div>

            {/* Label context menu */}
            {labelMenu && !labelReason && (
              <div className="fade-in" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', right:0, top:'100%', marginTop:6, background:'#fff', borderRadius:10, border:`1px solid ${T.lightGray}`, boxShadow:'0 4px 16px rgba(0,0,0,0.1)', zIndex:20, minWidth:160, overflow:'hidden' }}>
                <div onClick={(e) => { e.stopPropagation(); setLabelReason(true); }} style={{ padding:'12px 16px', fontSize:13, color:'#dc2626', cursor:'pointer', borderBottom:`1px solid ${T.lightGray}`, fontWeight:500 }}>
                  Not a {label.toLowerCase()}
                </div>
                <div onClick={(e) => { e.stopPropagation(); setLabelMenu(false); }} style={{ padding:'12px 16px', fontSize:13, color:T.gray, cursor:'pointer' }}>
                  Cancel
                </div>
              </div>
            )}

            {/* Reason picker */}
            {labelReason && (
              <div className="fade-in" onClick={(e) => e.stopPropagation()} style={{ position:'absolute', right:0, top:'100%', marginTop:6, background:'#fff', borderRadius:10, border:`1px solid ${T.lightGray}`, boxShadow:'0 4px 16px rgba(0,0,0,0.1)', zIndex:20, minWidth:200, overflow:'hidden' }}>
                <div style={{ padding:'10px 16px', fontSize:11, color:T.gray, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.04em', borderBottom:`1px solid ${T.lightGray}` }}>Why is it not a {label.toLowerCase()}?</div>
                {['Just browsing','Wrong category','Spam or bot','Other'].map(reason => (
                  <div key={reason} onClick={(e) => { e.stopPropagation(); setLabelHidden(true); setLabelMenu(false); setLabelReason(false); }}
                    style={{ padding:'12px 16px', fontSize:13, color:T.ink, cursor:'pointer', borderBottom:`1px solid ${T.lightGray}` }}>
                    {reason}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
        {labelHidden && (
          <span className="fade-in" style={{ fontSize:10, color:'#16a34a', fontWeight:500 }}>Label removed</span>
        )}
      </div>

      {/* Chat body */}
      <div style={{ flex:1, overflowY:'auto', padding:'20px 20px 12px' }}>
        {chatHistory.map((m, i) => (
          <div key={i} style={{ marginBottom:12, display:'flex', justifyContent: m.from === 'you' ? 'flex-end' : 'flex-start' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:16, background: m.from === 'you' ? T.ink : '#fff', color: m.from === 'you' ? '#fff' : T.ink, border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 4 : 16, borderTopRightRadius: m.from === 'you' ? 4 : 16 }}>
              <div style={{ fontSize:14, lineHeight:1.5 }}>{m.text}</div>
              <div style={{ fontSize:10, color: m.from === 'you' ? 'rgba(255,255,255,0.5)' : '#ccc', marginTop:4, textAlign:'right' }}>{m.time}</div>
            </div>
          </div>
        ))}

        {/* Sent message */}
        {mode === 'sent' && (
          <div className="fade-up" style={{ marginBottom:12, display:'flex', justifyContent:'flex-end' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:16, borderTopRightRadius:4, background:T.ink, color:'#fff' }}>
              <div style={{ fontSize:14, lineHeight:1.5 }}>{sentMsg}</div>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.5)', marginTop:4, textAlign:'right' }}>Just now</div>
            </div>
          </div>
        )}
      </div>

      {/* Bottom area */}
      <div style={{ flexShrink:0, borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>

        {/* Summary mode (for sensitive/needs-a-human) */}
        {mode === 'summary' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <div style={{ background:T.warmGray, borderRadius:12, padding:'14px 16px', marginBottom:12 }}>
              <div style={{ fontSize:10, fontWeight:600, color:T.gray, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Summary</div>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.55 }}>{item.summary}</div>
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <div style={{ flex:1, padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24, display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:16, color:'#ccc' }}>+</span>
                <input value={customVal} onChange={e => setCustomVal(e.target.value)} placeholder="Write your reply..." onKeyDown={e => e.key === 'Enter' && handleSendCustom()}
                  style={{ border:'none', outline:'none', fontSize:14, color:T.ink, flex:1, background:'transparent', fontFamily:'Inter' }} />
              </div>
              <div onClick={handleSendCustom} style={{ width:40, height:40, borderRadius:20, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background .2s', flexShrink:0 }}>
                <span style={{ color:'#fff', fontSize:14 }}>↑</span>
              </div>
            </div>
          </div>
        )}

        {/* Draft mode */}
        {mode === 'draft' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <div style={{ position:'relative', background:T.warmGray, borderRadius:12, overflow:'hidden', marginBottom:12 }}>
              <div onClick={handleDismissDraft} style={{ position:'absolute', top:8, right:8, width:32, height:32, borderRadius:16, background:'rgba(0,0,0,0.08)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:16, color:T.ink, fontWeight:300, zIndex:2 }}>x</div>
              <div style={{ padding:'14px 16px 12px', paddingRight:28 }}>
                <div style={{ fontSize:15, color:T.ink, lineHeight:1.6 }}>{item.draft}</div>
              </div>
              {item.reason && (
                <div style={{ padding:'8px 16px 10px', borderTop:'1px solid rgba(0,0,0,0.06)' }}>
                  <div style={{ fontSize:11, color:T.gray, lineHeight:1.45 }}>{item.reason}</div>
                </div>
              )}
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={handleSendDraft} style={{ flex:1, padding:'13px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>Send</button>
              <button onClick={() => { setMode('editing'); setEditVal(item.draft); }} style={{ padding:'13px 28px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:14, fontWeight:500, cursor:'pointer', color:T.ink }}>Edit</button>
            </div>
          </div>
        )}

        {/* Editing mode */}
        {mode === 'editing' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <textarea value={editVal} onChange={e => setEditVal(e.target.value)}
              style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:'14px 16px', border:`1.5px solid ${T.ink}`, borderRadius:12, resize:'none', height:90, fontFamily:'Inter', background:'#fff', outline:'none' }} />
            <div style={{ display:'flex', gap:6, marginTop:8, marginBottom:12, flexWrap:'wrap' }}>
              {['Friendly','Formal','Shorter','Direct','Add a question'].map(tone => (
                <span key={tone} onClick={() => {
                  setActiveTone(tone);
                  const base = originalDraft;
                  if (tone === 'Shorter') {
                    const sentences = base.split(/(?<=[.!?])\s+/);
                    setEditVal(sentences.slice(0, Math.ceil(sentences.length / 2)).join(' '));
                  } else if (tone === 'Friendly') {
                    setEditVal('Hey! ' + base.charAt(0).toLowerCase() + base.slice(1).replace(/\.$/, '') + ' 😊');
                  } else if (tone === 'Formal') {
                    setEditVal('Thank you for reaching out. ' + base.replace(/!/g, '.').replace(/Hey!?\s*/gi, ''));
                  } else if (tone === 'Direct') {
                    const sentences = base.split(/(?<=[.!?])\s+/);
                    setEditVal(sentences.filter(s => s.length > 20).join(' '));
                  } else if (tone === 'Add a question') {
                    setEditVal(base.replace(/\.$/, '') + ' — what questions do you have?');
                  }
                }} style={{ fontSize:11, padding:'6px 14px', borderRadius:20, border: activeTone === tone ? `1.5px solid ${T.ink}` : `1px solid ${T.lightGray}`, cursor:'pointer', color: activeTone === tone ? '#fff' : T.ink, fontWeight:500, background: activeTone === tone ? T.ink : '#fff', transition:'all .15s ease' }}>{tone}</span>
              ))}
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:20, color:'#ccc', cursor:'pointer', padding:'0 4px' }}>+</span>
              <div style={{ flex:1 }}></div>
              <div onClick={handleSendDraft} style={{ width:40, height:40, borderRadius:20, background:T.ink, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
                <span style={{ color:'#fff', fontSize:14 }}>↑</span>
              </div>
            </div>
          </div>
        )}

        {/* Custom mode (draft dismissed) */}
        {mode === 'custom' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:20, color:'#ccc', cursor:'pointer', padding:'0 4px', flexShrink:0 }}>+</span>
              <div style={{ flex:1, padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
                <input value={customVal} onChange={e => setCustomVal(e.target.value)} placeholder="Type your message..." onKeyDown={e => e.key === 'Enter' && handleSendCustom()}
                  style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter' }} />
              </div>
              <div onClick={handleSendCustom} style={{ width:40, height:40, borderRadius:20, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background .2s', flexShrink:0 }}>
                <span style={{ color:'#fff', fontSize:14 }}>↑</span>
              </div>
            </div>
          </div>
        )}

        {/* Sent mode — back to normal input */}
        {mode === 'sent' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:20, color:'#ccc', padding:'0 4px', flexShrink:0 }}>+</span>
              <div style={{ flex:1, padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
                <input placeholder="Type your message..." style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter' }} />
              </div>
              <div style={{ width:40, height:40, borderRadius:20, background:T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <span style={{ color:'#fff', fontSize:14 }}>↑</span>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Toast */}
      {showToast && (
        <div style={{ position:'absolute', bottom:100, left:'50%', transform:'translateX(-50%)', background:T.ink, color:'#fff', padding:'10px 20px', borderRadius:20, fontSize:13, fontWeight:500, animation:'fadeUp .3s ease-out', whiteSpace:'nowrap', zIndex:110 }}>
          {toastMsg}
        </div>
      )}
    </div>
  );
}

/* ─── Important Tab ─── */
function ImportantTab({ onOpenChat, answeredChats }) {
  const renderGroup = (items, badgeText, badgeColor, isSensitive) => {
    const pending = items.filter(item => !answeredChats.has(item.user));
    const answered = items.filter(item => answeredChats.has(item.user));
    return (
      <>
        {pending.map((item,i) => (
          <MsgRow key={`p${item.user}`} user={item.user} msg={item.msg} time={item.time} badge={isSensitive ? item.flag : badgeText} badgeColor={badgeColor}
            onClick={() => onOpenChat(item, isSensitive ? item.flag : badgeText, badgeColor, isSensitive)} />
        ))}
        {answered.map((item,i) => (
          <div key={`a${item.user}`} onClick={() => onOpenChat(item, isSensitive ? item.flag : badgeText, badgeColor, isSensitive)}
            style={{ padding:'10px 16px', background:T.cardBg, borderRadius:10, border:`1px solid ${T.lightGray}`, marginBottom:4, opacity:0.45, cursor:'pointer', transform:'scale(0.97)', transformOrigin:'left center' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:2 }}>
              <span style={{ fontSize:13, fontWeight:500, color:T.gray }}>{item.user}</span>
              <span style={{ fontSize:9, fontWeight:500, color:'#16a34a', background:'#f0fdf4', padding:'2px 8px', borderRadius:10 }}>seen</span>
            </div>
            <div style={{ fontSize:12, color:'#bbb', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.msg}</div>
          </div>
        ))}
      </>
    );
  };

  return (
    <div>
      <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:16, padding:'0 4px' }}>
        Conversations that need your personal touch. I flagged these for you.
      </div>
      <SectionLabel label="Interested in your services" count={IMPORTANT_DATA.services.length} />
      {renderGroup(IMPORTANT_DATA.services, 'lead', '#E85D04', false)}

      <SectionLabel label="Needs your voice" count={IMPORTANT_DATA.sensitive.length} />
      {renderGroup(IMPORTANT_DATA.sensitive, '', '#6B21A8', true)}

      <SectionLabel label="May want to collaborate" count={IMPORTANT_DATA.collabs.length} />
      {renderGroup(IMPORTANT_DATA.collabs, 'collab', '#0369A1', false)}

      <SectionLabel label="Questions" count={QUESTIONS_DATA.length} />
      {renderGroup(QUESTIONS_DATA, 'question', '#0369A1', false)}
    </div>
  );
}

/* ─── In-Progress Detail (full-screen conversation with feedback) ─── */
function InProgressDetail({ item, onClose }) {
  const [feedbackMsg, setFeedbackMsg] = useState(null); // index of AI msg being reviewed
  const [feedbackStep, setFeedbackStep] = useState(null); // 'pick' | 'reason' | 'correction' | 'done'
  const [selectedReason, setSelectedReason] = useState(null);
  const [correctionText, setCorrectionText] = useState('');
  const [correctedDraft, setCorrectedDraft] = useState('');

  const reasons = [
    'Too pushy / salesy',
    'Didn\'t answer the question',
    'Wrong tone',
    'Shared incorrect info',
    'Too long',
  ];

  const handleWrong = (idx) => { setFeedbackMsg(idx); setFeedbackStep('reason'); };
  const handleGood = (idx) => { setFeedbackMsg(idx); setFeedbackStep('done'); };

  const pickReason = (r) => {
    setSelectedReason(r);
    setFeedbackStep('correction');
    // Generate a "corrected" version
    const orig = item.conversation[feedbackMsg].text;
    if (r === 'Too pushy / salesy') setCorrectedDraft(orig.replace(/!+/g, '.').replace(/Want me to/, 'I can'));
    else if (r === 'Too long') setCorrectedDraft(orig.split('.').slice(0,2).join('.') + '.');
    else setCorrectedDraft(orig.replace(/\?$/, '. Let me know if you have questions.'));
  };

  const handleCorrectionGood = () => setFeedbackStep('done');

  return (
    <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={onClose} style={{ cursor:'pointer', fontSize:20, color:T.ink, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink }}>{item.user}</div>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <div style={{ width:6, height:6, borderRadius:3, background:T.accent }} />
              <span style={{ fontSize:11, color:T.accent }}>{item.step}</span>
            </div>
          </div>
        </div>
        <span style={{ fontSize:10, fontWeight:600, color:T.accent, background:T.accent+'18', padding:'3px 10px', borderRadius:10, textTransform:'uppercase' }}>in progress</span>
      </div>

      {/* Conversation */}
      <div style={{ flex:1, overflowY:'auto', padding:'16px 20px' }}>
        {item.conversation.map((m, i) => (
          <div key={i} style={{ marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent: m.from === 'ai' ? 'flex-end' : 'flex-start' }}>
              <div style={{ maxWidth:'80%' }}>
                {m.from === 'ai' && <div style={{ fontSize:10, color:T.gray, marginBottom:3, textAlign:'right' }}>Chatty</div>}
                <div style={{ padding:'11px 15px', borderRadius:14, background: m.from === 'ai' ? T.warmGray : '#fff', border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 4 : 14, borderTopRightRadius: m.from === 'ai' ? 4 : 14 }}>
                  <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>{m.text}</div>
                </div>
                {/* Feedback buttons for AI messages */}
                {m.from === 'ai' && feedbackMsg === null && (
                  <div className="fade-in" style={{ display:'flex', gap:6, justifyContent:'flex-end', marginTop:6 }}>
                    <button onClick={() => handleGood(i)} style={{ padding:'5px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:14, fontSize:10, cursor:'pointer', color:T.gray }}>Good</button>
                    <button onClick={() => handleWrong(i)} style={{ padding:'5px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:14, fontSize:10, cursor:'pointer', color:T.gray }}>Wrong</button>
                  </div>
                )}
                {/* Feedback: done/good */}
                {m.from === 'ai' && feedbackMsg === i && feedbackStep === 'done' && (
                  <div className="fade-in" style={{ fontSize:11, color:'#16a34a', textAlign:'right', marginTop:4 }}>Feedback saved</div>
                )}
              </div>
            </div>
          </div>
        ))}

        {/* Feedback flow: reason selection */}
        {feedbackStep === 'reason' && (
          <div className="fade-up" style={{ padding:'14px 16px', background:T.warmGray, borderRadius:12, marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:8 }}>Chatty</div>
            <div style={{ fontSize:13, color:T.ink, marginBottom:12 }}>What went wrong?</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {reasons.map(r => (
                <div key={r} onClick={() => pickReason(r)} style={{ padding:'10px 14px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, cursor:'pointer', fontSize:12, color:T.ink }}>
                  {r}
                </div>
              ))}
              <input placeholder="Something else..." onKeyDown={e => { if(e.key==='Enter' && e.target.value) pickReason(e.target.value); }}
                style={{ padding:'10px 14px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, fontSize:12, color:T.ink, fontFamily:'Inter', outline:'none' }} />
            </div>
          </div>
        )}

        {/* Feedback flow: correction proposal */}
        {feedbackStep === 'correction' && (
          <div className="fade-up" style={{ padding:'14px 16px', background:T.warmGray, borderRadius:12, marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:8 }}>Chatty</div>
            <div style={{ fontSize:13, color:T.ink, marginBottom:10 }}>Got it — {selectedReason.toLowerCase()}. Next time I'd say something like this:</div>

/* ─── All Tab (chronological inbox — value summary moved to top of inbox) ─── */
function AllTab({ onOpenChat }) {
  const getOpacity = (category) => {
    return 1;
  };

  // Map category to a clickable item for ChatDetail
  const getChatItem = (m) => {
    // Find matching item in IMPORTANT_DATA or QUESTIONS_DATA for draft info
    const allImportant = [...IMPORTANT_DATA.services, ...IMPORTANT_DATA.sensitive, ...IMPORTANT_DATA.collabs, ...QUESTIONS_DATA];
    const match = allImportant.find(item => item.user === m.user);
    if (match) return match;
    return { user: m.user, msg: m.msg, source: 'DM', time: m.time };
  };

  const handleClick = (m) => {
    const item = getChatItem(m);
    const isSensitive = m.category === 'sensitive';
    onOpenChat(item, m.badge || '', m.badgeColor || T.gray, isSensitive);
  };

  return (
    <div>
      {/* All messages list */}
      <SectionLabel label="All messages" count={ALL_MESSAGES.length} />
      {ALL_MESSAGES.map((m, i) => (
        <div key={i} onClick={() => handleClick(m)}
          style={{ padding:'13px 16px', background:T.cardBg, borderRadius:10, border:`1px solid ${T.lightGray}`, marginBottom:6, cursor:'pointer', transition:'background .15s', opacity: getOpacity(m.category) }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
            <span style={{ fontSize:14, fontWeight:600, color:T.ink }}>{m.user}</span>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              {m.badge && <span style={{ fontSize:9, fontWeight:600, color: m.badgeColor || T.gray, background: (m.badgeColor || T.gray) + '18', padding:'2px 8px', borderRadius:10, textTransform:'uppercase', letterSpacing:'0.04em' }}>{m.badge}</span>}
              <span style={{ fontSize:11, color:'#ccc' }}>{m.time}</span>
            </div>
          </div>
          <div style={{ fontSize:13, color:T.gray, lineHeight:1.4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.msg}</div>
        </div>
      ))}
    </div>
  );
}

function InboxV2() {
  const [morningDismissed, setMorningDismissed] = useState(false);
  const [reportCollapsed, setReportCollapsed] = useState(true);
  const [activeTab, setActiveTab] = useState('important');
  const [openChat, setOpenChat] = useState(null);
  const [answeredChats, setAnsweredChats] = useState(new Set()); // track answered by user key
  const scrollRef = useRef(null);

  const handleScroll = () => {
    if (scrollRef.current && scrollRef.current.scrollTop > 20 && !reportCollapsed) {
      setReportCollapsed(true);
    }
  };

  const handleOpenChat = (item, label, labelColor, isSensitive) => {
    setOpenChat({ item, label, labelColor, isSensitive });
  };

  const counts = {
    important: IMPORTANT_DATA.services.length + IMPORTANT_DATA.sensitive.length + IMPORTANT_DATA.collabs.length + QUESTIONS_DATA.length,
    all: ALL_MESSAGES.length,
  };

  return (
    <div style={{ background:T.paper, height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>

      {/* Morning brief overlay */}
      {!morningDismissed && (
        <MorningBrief onDismiss={() => setMorningDismissed(true)} />
      )}

      {/* Fixed header area */}
      <div style={{ padding:'52px 20px 0', flexShrink:0 }}>
        <DailyReport collapsed={reportCollapsed} onToggle={() => setReportCollapsed(!reportCollapsed)} />
        <TabBar active={activeTab} setActive={setActiveTab} counts={counts} />
      </div>

      {/* Scrollable content */}
      <div ref={scrollRef} onScroll={handleScroll}
        style={{ flex:1, overflowY:'auto', padding:'0 10px 100px 20px' }}>
        {activeTab === 'important' && <ImportantTab onOpenChat={handleOpenChat} answeredChats={answeredChats} />}
        {activeTab === 'all' && <AllTab onOpenChat={handleOpenChat} />}
      </div>

      {/* Chat Detail Overlay */}
      {openChat && (
        <ChatDetail
          item={openChat.item}
          label={openChat.label}
          labelColor={openChat.labelColor}
          isSensitive={openChat.isSensitive}
          onClose={() => setOpenChat(null)}
          onSent={(user) => setAnsweredChats(prev => new Set([...prev, user]))}
        />
      )}
    </div>
  );
}

/* ─── LEGACY: Focus Mode (kept for reference but unused in v2) ─── */
function FocusMode({ reviewIdx, setReviewIdx }) {
  const [phase, setPhase] = useState('greeting'); // greeting, reviewing, batch, takeover, done
  const [sentItems, setSentItems] = useState([]);
  const [batchMode, setBatchMode] = useState(true);
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState('');
  const [batchExpanded, setBatchExpanded] = useState(false);
  const scrollRef = useRef(null);

  const currentItem = REVIEWS[reviewIdx];
  const allDone = reviewIdx >= REVIEWS.length;

  const batchItems = currentItem && currentItem.batch && batchMode
    ? REVIEWS.filter(r => r.batch === currentItem.batch && REVIEWS.indexOf(r) >= reviewIdx)
    : [];
  const isBatch = batchItems.length >= 2 && batchMode;

  const startReviewing = () => setPhase('reviewing');

  const handleApprove = () => {
    setSentItems(s => [...s, currentItem]);
    setReviewIdx(i => i+1);
    setEditing(false);
    setPhase('reviewing');
  };
  const handleBatchApprove = () => {
    setSentItems(s => [...s, ...batchItems]);
    setReviewIdx(i => i + batchItems.length);
    setBatchMode(false);
    setPhase('reviewing');
  };
  const handleSkip = () => { setReviewIdx(i => i+1); setEditing(false); setPhase('reviewing'); };

  // Check if done after state changes
  useEffect(() => {
    if(phase === 'reviewing' && reviewIdx >= REVIEWS.length) setPhase('done');
  }, [reviewIdx, phase]);

  // Check if next item is a batch
  useEffect(() => {
    if(phase === 'reviewing' && isBatch) setPhase('batch');
  }, [reviewIdx, phase]);

  useEffect(() => {
    if(scrollRef.current) setTimeout(() => { scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 50);
  }, [phase, reviewIdx, sentItems.length, editing]);

  useEffect(() => { if(currentItem) setEditVal(currentItem.draft); }, [reviewIdx]);

  return (
    <div style={{ height:'calc(100% - 120px)', display:'flex', flexDirection:'column' }}>
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'0 24px 20px' }}>

                  Good morning ☀️
                </div>
                <div style={{ fontSize:14, color:T.ink, lineHeight:1.6, marginTop:10 }}>
                  Chatty drafted responses for 2 lead inquiries and 1 FAQ. Ready when you are.
                </div>
                <div style={{ fontSize:14, color:T.ink, marginTop:12, fontWeight:500 }}>
                  {REVIEWS.length} replies to review. Wanna take a look?

              </div>
            </div>
          </div>
        )}

        {/* ── Phase: Reviewing (one task at a time, scrollable history) ── */}
        {(phase === 'reviewing' || phase === 'batch' || phase === 'takeover') && (
          <>
            {/* Sent items scroll history */}
            {sentItems.map((item) => (
              <SentBubble key={`sent-${item.id}`} item={item} />
            ))}

            {/* Current single task */}
            {phase === 'reviewing' && currentItem && !isBatch && (

      <div style={{ padding:'56px 24px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>

        <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12, color:T.mint }}>
          <div style={{ width:6, height:6, borderRadius:3, background:T.mint, animation:'pulse 2s infinite' }} />
          live
        </div>
      </div>

      <div style={{ padding:'0 24px' }}>
        {/* Title */}
        <div style={{ fontSize:13, color:'#555', marginBottom:28, fontWeight:500 }}>Chatty is working</div>

        {/* Handled today */}
        <div style={{ background:T.darkSurface, borderRadius:16, padding:'20px', marginBottom:20, border:`1px solid ${T.darkBorder}` }}>
          <div style={{ fontSize:13, fontWeight:600, color:'#999', marginBottom:14, letterSpacing:'0.05em', textTransform:'uppercase' }}>Handled today</div>
          <div style={{ display:'flex', gap:16, marginBottom:16 }}>
            <div><span style={{ fontSize:24, fontWeight:700, color:'#fff' }}>34</span><span style={{ fontSize:11, color:'#666', marginLeft:4 }}>DMs</span></div>
            <div><span style={{ fontSize:24, fontWeight:700, color:'#fff' }}>126</span><span style={{ fontSize:11, color:'#666', marginLeft:4 }}>comments</span></div>
            <div><span style={{ fontSize:24, fontWeight:700, color:'#fff' }}>4</span><span style={{ fontSize:11, color:'#666', marginLeft:4 }}>corrections</span></div>
          </div>
          {/* Mini bar */}
          <div style={{ height:4, background:'#2a2a2c', borderRadius:2, overflow:'hidden', marginBottom:10 }}>
            <div style={{ width:'85%', height:'100%', background:T.mint, borderRadius:2 }} />
          </div>
          <div style={{ fontSize:12, color:'#666' }}>2m avg response time</div>
        </div>

        {/* Approval rates */}
        <div style={{ background:T.darkSurface, borderRadius:16, padding:'20px', marginBottom:20, border:`1px solid ${T.darkBorder}` }}>
          <div style={{ fontSize:13, fontWeight:600, color:'#999', marginBottom:16, letterSpacing:'0.05em', textTransform:'uppercase' }}>Approval rates</div>
          {[
            { name:'FAQ replies', pct:82 },
            { name:'Lead qualification', pct:74 },
            { name:'Positive comments', pct:91 },
          ].map((s,i) => (
            <div key={i} style={{ marginBottom:i<2?16:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                <span style={{ fontSize:13, color:'#ccc' }}>{s.name}</span>
                <span style={{ fontSize:13, color:T.mint, fontWeight:600 }}>{s.pct}%</span>
              </div>
              <div style={{ height:4, background:'#2a2a2c', borderRadius:2, overflow:'hidden' }}>
                <div style={{ width:`${s.pct}%`, height:'100%', background:T.mint, borderRadius:2, transition:'width .5s ease' }} />
              </div>
            </div>
          ))}
        </div>

        {/* Recent auto-handled */}
        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:13, fontWeight:600, color:'#999', marginBottom:14, letterSpacing:'0.05em', textTransform:'uppercase' }}>Recently handled</div>
          {AI_HANDLED.map((item,i) => (
            <div key={i}>
              <div onClick={() => setExpanded(expanded===i?null:i)}
                style={{ background:T.darkSurface, borderRadius: expanded===i ? '14px 14px 0 0' : 14, padding:'14px 18px', marginBottom: expanded===i ? 0 : 8,
                  border:`1px solid ${T.darkBorder}`, cursor:'pointer', transition:'all .15s ease',
                  borderBottom: expanded===i ? 'none' : undefined }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span style={{ fontSize:14, fontWeight:500, color:'#ddd' }}>{item.user}</span>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ fontSize:10, color:T.mintDim, background:'rgba(79,255,176,0.1)', padding:'2px 10px', borderRadius:20 }}>{item.type}</span>
                    <span style={{ fontSize:11, color:'#555' }}>{item.status}</span>
                  </div>
                </div>
                <div style={{ fontSize:13, color:'#777', marginTop:5 }}>{item.msg}</div>
              </div>
              {expanded===i && item.draft && (
                <div className="fade-in" style={{ background:T.darkSurface, borderRadius:'0 0 14px 14px', padding:'0 18px 16px', marginBottom:8,
                  border:`1px solid ${T.darkBorder}`, borderTop:'none' }}>
                  <div style={{ borderTop:`1px solid ${T.darkBorder}`, paddingTop:14 }}>
                    <div style={{ fontSize:12, color:'#666', marginBottom:6 }}>Chatty replied:</div>
                    <div style={{ fontSize:13, color:'#bbb', lineHeight:1.5, marginBottom:14 }}>{item.draft}</div>
                    <div style={{ display:'flex', gap:8 }}>
                      <span style={{ fontSize:12, padding:'6px 16px', background:'rgba(79,255,176,0.15)', color:T.mint, borderRadius:20, cursor:'pointer', fontWeight:500 }}>Looks good</span>
                      <span style={{ fontSize:12, padding:'6px 16px', border:`1px solid ${T.darkBorder}`, color:'#888', borderRadius:20, cursor:'pointer' }}>Flag this</span>
                    </div>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Patterns learned */}
        <div style={{ background:T.darkSurface, borderRadius:16, padding:'20px', border:`1px solid ${T.darkBorder}` }}>
          <div style={{ fontSize:13, fontWeight:600, color:'#999', marginBottom:10, letterSpacing:'0.05em', textTransform:'uppercase' }}>Patterns learned</div>
          <div style={{ fontSize:13, color:T.mint, marginBottom:10 }}>3 new this week</div>
          <div style={{ fontSize:12, color:'#777', lineHeight:1.6 }}>
            Shorter lead replies · Emoji-free FAQs ·<br/>Warmer tone for comments
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Input Bar ─── */
function InputBar() {
  return (
    <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'10px 24px 30px', background:`linear-gradient(transparent, ${T.paper} 20%)` }}>
      <div style={{ display:'flex', alignItems:'center', background:T.cardBg, borderRadius:28, border:`1px solid ${T.lightGray}`, padding:'12px 20px' }}>
        <span style={{ fontSize:14, color:'#bbb', flex:1 }}>Talk to Chatty...</span>
        <span style={{ fontSize:18, color:'#ccc' }}>↑</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP — V2
   ═══════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState(window.location.hash === '#inbox' ? 'main' : 'ob-welcome');
  const [confidence, setConfidence] = useState('mid');

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden' }}>

      {/* ─── Onboarding ─── */}
      {screen === 'ob-welcome' && <ObWelcome onNext={() => setScreen('ob-workflow')} />}
      {screen === 'ob-workflow' && <ObWorkflow onNext={() => setScreen('ob-analyzing')} onBack={() => setScreen('ob-welcome')} />}
      {screen === 'ob-analyzing' && <ObAnalyzing onNext={() => setScreen('ob-insights')} onBack={() => setScreen('ob-workflow')} />}
      {screen === 'ob-insights' && <ObInsights onNext={() => setScreen('ob-leaddef')} />}
      {screen === 'ob-leaddef' && <ObLeadDef onNext={() => setScreen('ob-settingup')} onBack={() => setScreen('ob-insights')} />}
      {screen === 'ob-settingup' && <ObSettingUp onNext={() => setScreen('ob-stats')} />}
      {screen === 'ob-stats' && <ObStats onNext={() => setScreen('ob-loading')} onBack={() => setScreen('ob-settingup')} />}
      {screen === 'ob-loading' && <ObLoading onNext={() => setScreen('main')} />}

      {/* ─── V2 Inbox ─── */}
      {screen === 'main' && <InboxV2 />}

      {/* ──────────────────────────────────────────────────────────
          PROTOTYPE ONLY — Skip onboarding button for testing.
          This will NOT exist in production for real users.
          ────────────────────────────────────────────────────────── */}
      {screen !== 'main' && (
        <div onClick={() => setScreen('main')} style={{ position:'absolute', bottom:12, right:20, zIndex:999, fontSize:11, color:'#dc2626', cursor:'pointer', padding:'6px 14px', background:'rgba(220,38,38,0.08)', borderRadius:20, fontWeight:500 }}>
          skip →
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
