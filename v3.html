/* Typewriter component */
function TypeWriter({ text, speed = 18, onDone, delay = 0 }) {
  const [displayed, setDisplayed] = useState('');
  const [started, setStarted] = useState(false);

  useEffect(() => {
    const startTimer = setTimeout(() => setStarted(true), delay);
    return () => clearTimeout(startTimer);
  }, [delay]);

  useEffect(() => {
    if (!started) return;
    if (displayed.length < text.length) {
      const timer = setTimeout(() => setDisplayed(text.slice(0, displayed.length + 1)), speed);
      return () => clearTimeout(timer);
    } else if (onDone) {
      onDone();
    }
  }, [displayed, started, text, speed]);

  return <span>{displayed}<span style={{ opacity: displayed.length < text.length ? 1 : 0, transition:'opacity .3s' }}>|</span></span>;
}

/* Sequential typewriter messages */
function ChattyMessages({ messages, onAllDone }) {
  const [currentMsg, setCurrentMsg] = useState(0);
  const [doneMessages, setDoneMessages] = useState([]);

  const handleMsgDone = () => {
    setDoneMessages(d => [...d, currentMsg]);
    if (currentMsg < messages.length - 1) {
      setTimeout(() => setCurrentMsg(c => c + 1), 400);
    } else if (onAllDone) {
      setTimeout(onAllDone, 300);
    }
  };

  return (
    <div>
      {messages.map((msg, i) => (
        <div key={i} style={{ marginBottom: 10, opacity: i > currentMsg ? 0 : 1, transition: 'opacity .3s' }}>
          {i === 0 && (
            <div style={{ fontSize: 11, color: T.gray, marginBottom: 5, fontWeight: 500, letterSpacing: '0.05em', textTransform: 'uppercase' }}>
              · Chatty
            </div>
          )}
          <div style={{ background: T.warmGray, borderRadius: 14, borderTopLeftRadius: i === 0 ? 14 : 4, padding: '13px 17px', maxWidth: '88%', display: 'inline-block' }}>
            <div style={{ fontSize: 15, color: T.ink, lineHeight: 1.55 }}>
              {i <= currentMsg ? (
                doneMessages.includes(i) ? msg : <TypeWriter text={msg} onDone={handleMsgDone} delay={i === 0 ? 300 : 0} />
              ) : null}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

    <div onClick={onClick} style={{ padding:'13px 16px', background:T.cardBg, borderRadius:10, border:`1px solid ${T.lightGray}`, marginBottom:6, cursor:'pointer', transition:'background .15s' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
        <span style={{ fontSize:14, fontWeight:600, color:T.ink }}>{user}</span>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {badge && <span style={{ fontSize:9, fontWeight:600, color: badgeColor || T.gray, background: badgeColor ? badgeColor + '18' : T.warmGray, padding:'2px 8px', borderRadius:10, textTransform:'uppercase', letterSpacing:'0.04em' }}>{badge}</span>}
          <span style={{ fontSize:11, color:'#ccc' }}>{time}</span>
        </div>
      </div>
      <div style={{ fontSize:13, color:T.gray, lineHeight:1.4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{msg}</div>
    </div>
  );
}

/* ─── Chat Detail (full-screen overlay) ─── */
function ChatDetail({ item, label, labelColor, onClose, isSensitive, onSent }) {
  const [mode, setMode] = useState(isSensitive ? 'summary' : 'draft'); // draft, editing, custom, sent, summary
  const [editVal, setEditVal] = useState(item.draft || '');
  const [customVal, setCustomVal] = useState('');
  const [showToast, setShowToast] = useState(false);
  const [sentMsg, setSentMsg] = useState('');

  const triggerToast = () => {
    setShowToast(true);
    setTimeout(() => setShowToast(false), 2500);
  };

  const handleSendDraft = () => {
    const wasEdited = mode === 'editing';
    setSentMsg(wasEdited ? editVal : item.draft);
    setMode('sent');
    if (wasEdited) triggerToast();
    if (onSent) onSent(item.user);
  };

  const handleSendCustom = () => {
    if (!customVal.trim()) return;
    setSentMsg(customVal);
    setMode('sent');
    if (onSent) onSent(item.user);
    triggerToast();
  };

  const handleDismissDraft = () => {
    setMode('custom');
    setCustomVal('');
  };

  // Fake conversation history
  const chatHistory = [
    { from: 'them', text: item.msg, time: item.time || '2h ago' },
  ];
  // Add some context messages for richer feel
  if (item.source === 'DM') {
    chatHistory.unshift({ from: 'them', text: 'Hey!', time: '2h ago' });
  }

  return (
    <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={onClose} style={{ cursor:'pointer', fontSize:20, color:T.ink, fontWeight:300, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink }}>{item.user}</div>
            <div style={{ fontSize:11, color:T.gray }}>{item.source}</div>
          </div>
        </div>
        <span style={{ fontSize:10, fontWeight:600, color:labelColor, background:labelColor+'18', padding:'3px 10px', borderRadius:10, textTransform:'uppercase', letterSpacing:'0.04em' }}>{label}</span>
      </div>

      {/* Chat body */}
      <div style={{ flex:1, overflowY:'auto', padding:'20px 20px 12px' }}>
        {chatHistory.map((m, i) => (
          <div key={i} style={{ marginBottom:12, display:'flex', justifyContent: m.from === 'you' ? 'flex-end' : 'flex-start' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:16, background: m.from === 'you' ? T.ink : '#fff', color: m.from === 'you' ? '#fff' : T.ink, border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 4 : 16, borderTopRightRadius: m.from === 'you' ? 4 : 16 }}>
              <div style={{ fontSize:14, lineHeight:1.5 }}>{m.text}</div>
              <div style={{ fontSize:10, color: m.from === 'you' ? 'rgba(255,255,255,0.5)' : '#ccc', marginTop:4, textAlign:'right' }}>{m.time}</div>
            </div>
          </div>
        ))}

        {/* Sent message */}
        {mode === 'sent' && (
          <div className="fade-up" style={{ marginBottom:12, display:'flex', justifyContent:'flex-end' }}>
            <div style={{ maxWidth:'80%', padding:'12px 16px', borderRadius:16, borderTopRightRadius:4, background:T.ink, color:'#fff' }}>
              <div style={{ fontSize:14, lineHeight:1.5 }}>{sentMsg}</div>
              <div style={{ fontSize:10, color:'rgba(255,255,255,0.5)', marginTop:4, textAlign:'right' }}>Just now</div>
            </div>
          </div>
        )}
      </div>

      {/* Bottom area */}
      <div style={{ flexShrink:0, borderTop:`1px solid ${T.lightGray}`, background:T.paper }}>

        {/* Summary mode (for sensitive/needs-a-human) */}
        {mode === 'summary' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <div style={{ background:T.warmGray, borderRadius:12, padding:'14px 16px', marginBottom:12 }}>
              <div style={{ fontSize:10, fontWeight:600, color:T.gray, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Summary</div>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.55 }}>{item.summary}</div>
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <div style={{ flex:1, padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24, display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:16, color:'#ccc' }}>+</span>
                <input value={customVal} onChange={e => setCustomVal(e.target.value)} placeholder="Write your reply..." onKeyDown={e => e.key === 'Enter' && handleSendCustom()}
                  style={{ border:'none', outline:'none', fontSize:14, color:T.ink, flex:1, background:'transparent', fontFamily:'Inter' }} />
              </div>
              <div onClick={handleSendCustom} style={{ width:40, height:40, borderRadius:20, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background .2s', flexShrink:0 }}>
                <span style={{ color:'#fff', fontSize:14 }}>↑</span>
              </div>
            </div>
          </div>
        )}

        {/* Draft mode */}
        {mode === 'draft' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <div style={{ position:'relative', background:T.warmGray, borderRadius:12, padding:'14px 16px', marginBottom:4 }}>
              <div onClick={handleDismissDraft} style={{ position:'absolute', top:8, right:8, width:32, height:32, borderRadius:16, background:'rgba(0,0,0,0.08)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:16, color:T.ink, fontWeight:300 }}>×</div>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.55, paddingRight:28 }}>{item.draft}</div>
            </div>
            <div style={{ fontSize:11, color:T.gray, lineHeight:1.4, marginBottom:12, padding:'0 2px' }}>{item.reason}</div>
            <div style={{ display:'flex', gap:8 }}>
              <button onClick={handleSendDraft} style={{ flex:1, padding:'13px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>Send</button>
              <button onClick={() => { setMode('editing'); setEditVal(item.draft); }} style={{ padding:'13px 28px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:14, fontWeight:500, cursor:'pointer', color:T.ink }}>Edit</button>
            </div>
          </div>
        )}

        {/* Editing mode */}
        {mode === 'editing' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <textarea value={editVal} onChange={e => setEditVal(e.target.value)}
              style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:'14px 16px', border:`1.5px solid ${T.ink}`, borderRadius:12, resize:'none', height:90, fontFamily:'Inter', background:'#fff', outline:'none' }} />
            <div style={{ display:'flex', gap:6, marginTop:8, marginBottom:12, flexWrap:'wrap' }}>
              {['Friendly','Formal','Shorter','Direct','Add a question'].map(tone => (
                <span key={tone} onClick={() => {
                  // Simple tone simulation
                  if (tone === 'Shorter') setEditVal(v => v.split('.').slice(0,2).join('.') + '.');
                  if (tone === 'Friendly') setEditVal(v => v + ' 😊');
                }} style={{ fontSize:11, padding:'6px 14px', borderRadius:20, border:`1px solid ${T.lightGray}`, cursor:'pointer', color:T.ink, fontWeight:500, background:'#fff' }}>{tone}</span>
              ))}
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:20, color:'#ccc', cursor:'pointer', padding:'0 4px' }}>+</span>
              <div style={{ flex:1 }}></div>
              <div onClick={handleSendDraft} style={{ width:40, height:40, borderRadius:20, background:T.ink, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0 }}>
                <span style={{ color:'#fff', fontSize:14 }}>↑</span>
              </div>
            </div>
          </div>
        )}

        {/* Custom mode (draft dismissed) */}
        {mode === 'custom' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:20, color:'#ccc', cursor:'pointer', padding:'0 4px', flexShrink:0 }}>+</span>
              <div style={{ flex:1, padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
                <input value={customVal} onChange={e => setCustomVal(e.target.value)} placeholder="Type your message..." onKeyDown={e => e.key === 'Enter' && handleSendCustom()}
                  style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter' }} />
              </div>
              <div onClick={handleSendCustom} style={{ width:40, height:40, borderRadius:20, background: customVal.trim() ? T.ink : T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'background .2s', flexShrink:0 }}>
                <span style={{ color:'#fff', fontSize:14 }}>↑</span>
              </div>
            </div>
          </div>
        )}

        {/* Sent mode — back to normal input */}
        {mode === 'sent' && (
          <div style={{ padding:'16px 20px 40px' }}>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:20, color:'#ccc', padding:'0 4px', flexShrink:0 }}>+</span>
              <div style={{ flex:1, padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:24 }}>
                <input placeholder="Type your message..." style={{ border:'none', outline:'none', fontSize:14, color:T.ink, width:'100%', background:'transparent', fontFamily:'Inter' }} />
              </div>
              <div style={{ width:40, height:40, borderRadius:20, background:T.lightGray, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <span style={{ color:'#fff', fontSize:14 }}>↑</span>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Toast */}
      {showToast && (
        <div style={{ position:'absolute', bottom:100, left:'50%', transform:'translateX(-50%)', background:T.ink, color:'#fff', padding:'10px 20px', borderRadius:20, fontSize:13, fontWeight:500, animation:'fadeUp .3s ease-out', whiteSpace:'nowrap', zIndex:110 }}>
          Learning from your answer
        </div>
      )}
    </div>
  );
}

/* ─── Important Tab ─── */
function ImportantTab({ onOpenChat, answeredChats }) {
  const renderGroup = (items, badgeText, badgeColor, isSensitive) => {
    const pending = items.filter(item => !answeredChats.has(item.user));
    const answered = items.filter(item => answeredChats.has(item.user));
    return (
      <>
        {pending.map((item,i) => (
          <MsgRow key={`p${item.user}`} user={item.user} msg={item.msg} time={item.time} badge={isSensitive ? item.flag : badgeText} badgeColor={badgeColor}
            onClick={() => onOpenChat(item, isSensitive ? item.flag : badgeText, badgeColor, isSensitive)} />
        ))}
        {answered.map((item,i) => (
          <div key={`a${item.user}`} onClick={() => onOpenChat(item, isSensitive ? item.flag : badgeText, badgeColor, isSensitive)}
            style={{ padding:'10px 16px', background:T.cardBg, borderRadius:10, border:`1px solid ${T.lightGray}`, marginBottom:4, opacity:0.45, cursor:'pointer', transform:'scale(0.97)', transformOrigin:'left center' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:2 }}>
              <span style={{ fontSize:13, fontWeight:500, color:T.gray }}>{item.user}</span>
              <span style={{ fontSize:9, fontWeight:500, color:'#16a34a', background:'#f0fdf4', padding:'2px 8px', borderRadius:10 }}>seen</span>
            </div>
            <div style={{ fontSize:12, color:'#bbb', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.msg}</div>
          </div>
        ))}
      </>
    );
  };

  return (
    <div>
      <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:16, padding:'0 4px' }}>
        Conversations that need your personal touch. Chatty flagged these for you.
      </div>
      <SectionLabel icon="→" label="Interested in your services" count={IMPORTANT_DATA.services.length} />
      {renderGroup(IMPORTANT_DATA.services, 'lead', '#E85D04', false)}

      <SectionLabel icon="◇" label="Needs a human" count={IMPORTANT_DATA.sensitive.length} />
      {renderGroup(IMPORTANT_DATA.sensitive, '', '#6B21A8', true)}

      <SectionLabel icon="⬡" label="May want to collaborate" count={IMPORTANT_DATA.collabs.length} />
      {renderGroup(IMPORTANT_DATA.collabs, 'collab', '#0369A1', false)}
    </div>
  );
}

/* ─── Engagement Tab (mixed stacks + singles, load more) ─── */
function EngagementTab() {
  const [approvedItems, setApprovedItems] = useState({});
  const [editingItem, setEditingItem] = useState(null); // key of item being edited
  const [editVal, setEditVal] = useState('');
  const [visiblePerPost, setVisiblePerPost] = useState({}); // { postIdx: count }
  const [approvedStacks, setApprovedStacks] = useState({});

  const INITIAL_VISIBLE = 5;
  const totalComments = ENGAGEMENT_DATA.posts.reduce((s, p) => s + p.comments.length, 0);

  const handleApprove = (key) => {
    setApprovedItems(a => ({ ...a, [key]: true }));
    if (editingItem === key) setEditingItem(null);
  };

  const handleEdit = (key, draft) => {
    setEditingItem(key);
    setEditVal(draft);
  };

  const handleSendEdit = (key) => {
    setApprovedItems(a => ({ ...a, [key]: true }));
    setEditingItem(null);
  };

  const getVisible = (pi) => visiblePerPost[pi] || INITIAL_VISIBLE;

  // Group positive comments into stacks per post
  const groupComments = (comments, postIdx) => {
    const result = [];
    let positiveStack = [];

    comments.forEach((c, ci) => {
      if (c.emotion === 'positive') {
        positiveStack.push({ ...c, idx: ci });
      } else {
        if (positiveStack.length >= 2) {
          result.push({ type: 'stack', items: positiveStack, postIdx });
          positiveStack = [];
        } else if (positiveStack.length === 1) {
          result.push({ type: 'single', item: positiveStack[0], postIdx });
          positiveStack = [];
        }
        result.push({ type: 'single', item: { ...c, idx: ci }, postIdx });
      }
    });
    if (positiveStack.length >= 2) {
      result.push({ type: 'stack', items: positiveStack, postIdx });
    } else if (positiveStack.length === 1) {
      result.push({ type: 'single', item: positiveStack[0], postIdx });
    }
    return result;
  };

  const renderComment = (c, postIdx) => {
    const key = `${postIdx}-${c.idx}`;
    const isApproved = approvedItems[key];
    const isEditing = editingItem === key;

    if (isApproved) {
      return (
        <div key={key} className="fade-in" style={{ padding:'8px 14px', background:'#f0fdf4', borderRadius:8, border:'1px solid #dcfce7', marginBottom:5 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontSize:12, color:'#16a34a', fontWeight:500 }}>Sent to {c.user}</span>
            <span style={{ fontSize:11, color:'#86efac' }}>✓</span>
          </div>
        </div>
      );
    }

    return (
      <div key={key} style={{ padding:'12px 14px', background:'#fff', borderRadius:10, border:`1px solid ${T.lightGray}`, marginBottom:5 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
          <span style={{ fontSize:13, fontWeight:600, color:T.ink }}>{c.user}</span>
          <span style={{ fontSize:10, color:'#ccc' }}>{c.time}</span>
        </div>
        <div style={{ fontSize:12, color:T.gray, fontStyle:'italic', marginBottom:6 }}>"{c.comment}"</div>

        {isEditing ? (
          <div>
            <textarea value={editVal} onChange={e => setEditVal(e.target.value)}
              style={{ width:'100%', fontSize:13, color:T.ink, lineHeight:1.45, padding:'10px 12px', border:`1.5px solid ${T.ink}`, borderRadius:8, resize:'none', height:70, fontFamily:'Inter', background:'#fff', outline:'none' }} />
            <div style={{ display:'flex', gap:5, marginTop:6, marginBottom:8, flexWrap:'wrap' }}>
              {['Friendly','Formal','Shorter','Direct'].map(tone => (
                <span key={tone} onClick={() => { if(tone==='Shorter') setEditVal(v => v.split('.').slice(0,1).join('.')+'.'); }}
                  style={{ fontSize:10, padding:'4px 10px', borderRadius:16, border:`1px solid ${T.lightGray}`, cursor:'pointer', color:T.ink, fontWeight:500, background:'#fff' }}>{tone}</span>
              ))}
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={() => handleSendEdit(key)} style={{ padding:'6px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Send</button>
              <button onClick={() => setEditingItem(null)} style={{ padding:'6px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.gray }}>Cancel</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{ fontSize:12, color:T.ink, lineHeight:1.45, padding:'8px 10px', background:T.warmGray, borderRadius:8, marginBottom:8 }}>{c.draft}</div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={() => handleApprove(key)} style={{ padding:'6px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Approve</button>
              <button onClick={() => handleEdit(key, c.draft)} style={{ padding:'6px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.ink }}>Edit</button>
            </div>
          </>
        )}
      </div>
    );
  };

  return (
    <div>
      <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:16, padding:'0 4px' }}>
        Post comments grouped by post. Review and approve draft replies.
      </div>

      {ENGAGEMENT_DATA.posts.map((post, pi) => {
        const grouped = groupComments(post.comments, pi);
        const visible = getVisible(pi);
        const allItems = [];
        grouped.forEach(g => { if (g.type === 'stack') g.items.forEach(i => allItems.push(i)); else allItems.push(g.item); });
        const hasMore = allItems.length > visible;

        return (
          <div key={pi} style={{ marginBottom:24 }}>
            {/* Post header */}
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10, padding:'0 2px' }}>
              <img src={post.img} style={{ width:36, height:36, borderRadius:6, flexShrink:0 }} />
              <div>
                <div style={{ fontSize:14, fontWeight:600, color:T.ink }}>{post.title}</div>
                <div style={{ fontSize:11, color:T.gray }}>{post.comments.length} comments</div>
              </div>
            </div>

            {/* Comments */}
            {grouped.map((group, gi) => {
              if (group.type === 'single') {
                // Check if within visible limit
                const flatIdx = allItems.indexOf(group.item);
                if (flatIdx >= visible) return null;
                return renderComment(group.item, pi);
              }

              // Stack
              const stackKey = `stack-${pi}-${gi}`;
              const isStackApproved = approvedStacks[stackKey];
              const stackVisible = group.items.filter(i => allItems.indexOf(i) < visible);
              if (stackVisible.length === 0) return null;

              if (isStackApproved) {
                return (
                  <div key={stackKey} className="fade-in" style={{ padding:'10px 14px', background:'#f0fdf4', borderRadius:10, border:'1px solid #dcfce7', marginBottom:8 }}>
                    <span style={{ fontSize:12, color:'#16a34a', fontWeight:500 }}>{group.items.length} similar replies sent ✓</span>
                  </div>
                );
              }

              // Check if all individual items are already approved
              const allApproved = group.items.every(i => approvedItems[`${pi}-${i.idx}`]);
              if (allApproved) return null;

              return (
                <div key={stackKey} style={{ marginBottom:20 }}>
                  {/* Stacked cards — back cards visible above front card */}
                  <div style={{ marginBottom:14 }}>
                    {/* Back cards — visible strips stacked above */}
                    {group.items.length > 2 && (
                      <div style={{ height:14, marginLeft:16, marginRight:16, background:'#e4e3e0', borderRadius:'12px 12px 0 0', border:'1.5px solid #d5d4d1', borderBottom:'none' }} />
                    )}
                    <div style={{ height:14, marginLeft:8, marginRight:8, background:'#edecE9', borderRadius:'12px 12px 0 0', border:'1.5px solid #dddcd9', borderBottom:'none' }} />
                    {/* Front card */}
                    <div style={{ padding:'14px 16px', background:'#fff', borderRadius:12, border:`1.5px solid ${T.lightGray}` }}>
                      <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.04em', color:T.ink, textTransform:'uppercase', marginBottom:6 }}>
                        Similar emotion <span style={{ fontWeight:400, color:T.gray }}>· {group.items.length}</span>
                      </div>
                      <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:10 }}>
                        I'll answer variations of "{group.items[0].comment.slice(0,40)}..."
                      </div>
                      <div style={{ display:'flex', gap:6 }}>
                        <button onClick={() => setApprovedStacks(a => ({...a, [stackKey]: true}))}
                          style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>
                          Approve {group.items.length}
                        </button>
                        <button onClick={() => {
                          // Expand: show individual items instead
                          const newGrouped = [...grouped];
                          newGrouped.splice(gi, 1, ...group.items.map(i => ({ type:'single', item:i, postIdx:pi })));
                          // Force re-render by expanding visible count
                          setVisiblePerPost(v => ({...v, [pi]: Math.max(getVisible(pi), allItems.length)}));
                        }}
                          style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.ink }}>
                          Review one by one
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}

            {/* Load more */}
            {hasMore && (
              <div style={{ textAlign:'center', paddingTop:4 }}>
                <button onClick={() => setVisiblePerPost(v => ({...v, [pi]: getVisible(pi) + 5}))}
                  style={{ padding:'7px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:20, fontSize:11, fontWeight:500, cursor:'pointer', color:T.gray }}>
                  Load more ({allItems.length - visible} remaining)
                </button>
              </div>
            )}
          </div>
        );
      })}

      <div style={{ textAlign:'center', fontSize:11, color:'#ccc', padding:'8px 0' }}>
        {totalComments} comments across {ENGAGEMENT_DATA.posts.length} posts
      </div>
    </div>
  );
}

/* ─── Other Tab (Teach AI) ─── */
function OtherTab() {
  // State per item: null | 'replying' | 'sent' | 'askLearn' | 'learned' | 'ignored'
  const [states, setStates] = useState({});
  const [replyVals, setReplyVals] = useState({});

  const setState = (key, val) => setStates(s => ({...s, [key]: val}));
  const setReply = (key, val) => setReplyVals(s => ({...s, [key]: val}));

  const handleReply = (key) => setState(key, 'replying');
  const handleSend = (key) => setState(key, 'askLearn');
  const handleLearn = (key) => setState(key, 'learned');
  const handleNoLearn = (key) => setState(key, 'sent');
  const handleIgnore = (key) => setState(key, 'ignored');

  const renderSingleQ = (item, key) => {
    const st = states[key];

    if (st === 'learned') {
      return (
        <div key={key} className="fade-in" style={{ padding:'10px 14px', background:'#f0fdf4', borderRadius:10, border:'1px solid #dcfce7', marginBottom:6 }}>
          <span style={{ fontSize:12, color:'#16a34a', fontWeight:500 }}>Learned — Chatty will handle this next time</span>
        </div>
      );
    }
    if (st === 'sent') {
      return (
        <div key={key} className="fade-in" style={{ padding:'10px 14px', background:'#f0fdf4', borderRadius:10, border:'1px solid #dcfce7', marginBottom:6 }}>
          <span style={{ fontSize:12, color:'#16a34a', fontWeight:500 }}>Replied to {item.user} ✓</span>
        </div>
      );
    }
    if (st === 'ignored') return null;

    return (
      <div key={key} style={{ padding:'14px 16px', background:T.cardBg, borderRadius:10, border:`1px solid ${T.lightGray}`, marginBottom:6 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
          <span style={{ fontSize:13, fontWeight:600, color:T.ink }}>{item.user}</span>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            {item.topic && <span style={{ fontSize:9, fontWeight:600, color:'#92400e', background:'#fef3c7', padding:'2px 8px', borderRadius:10, textTransform:'uppercase' }}>{item.topic}</span>}
            <span style={{ fontSize:10, color:'#ccc' }}>{item.time}</span>
          </div>
        </div>
        <div style={{ fontSize:12, color:T.gray, fontStyle:'italic', marginBottom:10 }}>"{item.msg}"</div>

        {st === 'replying' && (
          <div className="fade-up" style={{ marginBottom:10 }}>
            <textarea value={replyVals[key]||''} onChange={e => setReply(key, e.target.value)} placeholder="Type your reply..."
              style={{ width:'100%', fontSize:13, color:T.ink, lineHeight:1.45, padding:'10px 12px', border:`1.5px solid ${T.ink}`, borderRadius:8, resize:'none', height:65, fontFamily:'Inter', background:'#fff', outline:'none' }} />
          </div>
        )}

        {st === 'askLearn' && (
          <div className="fade-up" style={{ marginBottom:10 }}>
            <div style={{ padding:'12px 14px', background:T.warmGray, borderRadius:10, marginBottom:8 }}>
              <div style={{ fontSize:11, color:T.gray, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:4 }}>Chatty</div>
              <div style={{ fontSize:13, color:T.ink, lineHeight:1.5 }}>Should I remember this answer for similar questions in the future?</div>
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={() => handleLearn(key)} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Yes, learn this</button>
              <button onClick={() => handleNoLearn(key)} style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.gray }}>No, just this once</button>
            </div>
          </div>
        )}

        {!st && (
          <div style={{ display:'flex', gap:6 }}>
            <button onClick={() => handleReply(key)} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Reply</button>
            <button onClick={() => handleIgnore(key)} style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.gray }}>Ignore</button>
          </div>
        )}

        {st === 'replying' && (
          <div style={{ display:'flex', gap:6 }}>
            <button onClick={() => handleSend(key)} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Send</button>
            <button onClick={() => setState(key, null)} style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.gray }}>Cancel</button>
          </div>
        )}
      </div>
    );
  };

  const totalQ = OTHER_DATA.reduce((s, e) => s + (e.type === 'stack' ? e.items.length : 1), 0);

  return (
    <div>
      <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:16, padding:'0 4px' }}>
        Questions Chatty doesn't know the answer to yet. Reply once, and it learns for next time.
      </div>

      {OTHER_DATA.map((entry, ei) => {
        if (entry.type === 'single') {
          return renderSingleQ(entry, `q-${ei}`);
        }

        // Stack
        const stackKey = `qs-${ei}`;
        const stackState = states[stackKey];
        const allHandled = entry.items.every((_, ii) => {
          const k = `${stackKey}-${ii}`;
          return states[k] === 'learned' || states[k] === 'sent' || states[k] === 'ignored';
        });

        if (allHandled) return null;

        // Check if expanded
        if (stackState === 'expanded') {
          return (
            <div key={stackKey} style={{ marginBottom:10 }}>
              <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.04em', color:T.gray, textTransform:'uppercase', marginBottom:6 }}>
                {entry.topic} · {entry.items.length}
              </div>
              {entry.items.map((item, ii) => renderSingleQ({...item, topic: entry.topic}, `${stackKey}-${ii}`))}
            </div>
          );
        }

        return (
          <div key={stackKey} style={{ marginBottom:14 }}>
            {/* Stacked strips */}
            {entry.items.length > 2 && (
              <div style={{ height:14, marginLeft:16, marginRight:16, background:'#e4e3e0', borderRadius:'12px 12px 0 0', border:'1.5px solid #d5d4d1', borderBottom:'none' }} />
            )}
            <div style={{ height:14, marginLeft:8, marginRight:8, background:'#edece9', borderRadius:'12px 12px 0 0', border:'1.5px solid #dddcd9', borderBottom:'none' }} />
            {/* Front card */}
            <div style={{ padding:'14px 16px', background:'#fff', borderRadius:12, border:`1.5px solid ${T.lightGray}` }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
                <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.04em', color:T.ink, textTransform:'uppercase' }}>
                  Similar topic <span style={{ fontWeight:400, color:T.gray }}>· {entry.items.length}</span>
                </div>
                <span style={{ fontSize:9, fontWeight:600, color:'#92400e', background:'#fef3c7', padding:'2px 8px', borderRadius:10, textTransform:'uppercase' }}>{entry.topic}</span>
              </div>
              <div style={{ fontSize:12, color:T.gray, lineHeight:1.5, marginBottom:10 }}>
                {entry.items.length} people asking about {entry.topic.toLowerCase()}
              </div>
              <div style={{ display:'flex', gap:6 }}>
                <button onClick={() => setState(stackKey, 'expanded')} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>
                  Review {entry.items.length}
                </button>
                <button onClick={() => { entry.items.forEach((_, ii) => setState(`${stackKey}-${ii}`, 'ignored')); }}
                  style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.gray }}>
                  Ignore all
                </button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ─── In-Progress Detail (full-screen conversation with feedback) ─── */
function InProgressDetail({ item, onClose }) {
  const [feedbackMsg, setFeedbackMsg] = useState(null); // index of AI msg being reviewed
  const [feedbackStep, setFeedbackStep] = useState(null); // 'pick' | 'reason' | 'correction' | 'done'
  const [selectedReason, setSelectedReason] = useState(null);
  const [correctionText, setCorrectionText] = useState('');
  const [correctedDraft, setCorrectedDraft] = useState('');

  const reasons = [
    'Too pushy / salesy',
    'Didn\'t answer the question',
    'Wrong tone',
    'Shared incorrect info',
    'Too long',
  ];

  const handleWrong = (idx) => { setFeedbackMsg(idx); setFeedbackStep('reason'); };
  const handleGood = (idx) => { setFeedbackMsg(idx); setFeedbackStep('done'); };

  const pickReason = (r) => {
    setSelectedReason(r);
    setFeedbackStep('correction');
    // Generate a "corrected" version
    const orig = item.conversation[feedbackMsg].text;
    if (r === 'Too pushy / salesy') setCorrectedDraft(orig.replace(/!+/g, '.').replace(/Want me to/, 'I can'));
    else if (r === 'Too long') setCorrectedDraft(orig.split('.').slice(0,2).join('.') + '.');
    else setCorrectedDraft(orig.replace(/\?$/, '. Let me know if you have questions.'));
  };

  const handleCorrectionGood = () => setFeedbackStep('done');

  return (
    <div className="fade-up" style={{ position:'absolute', inset:0, zIndex:100, background:T.paper, display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ padding:'52px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`1px solid ${T.lightGray}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div onClick={onClose} style={{ cursor:'pointer', fontSize:20, color:T.ink, padding:'8px 12px', margin:'-8px -12px' }}>←</div>
          <div>
            <div style={{ fontSize:16, fontWeight:600, color:T.ink }}>{item.user}</div>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <div style={{ width:6, height:6, borderRadius:3, background:T.accent }} />
              <span style={{ fontSize:11, color:T.accent }}>{item.step}</span>
            </div>
          </div>
        </div>
        <span style={{ fontSize:10, fontWeight:600, color:T.accent, background:T.accent+'18', padding:'3px 10px', borderRadius:10, textTransform:'uppercase' }}>in progress</span>
      </div>

      {/* Conversation */}
      <div style={{ flex:1, overflowY:'auto', padding:'16px 20px' }}>
        {item.conversation.map((m, i) => (
          <div key={i} style={{ marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent: m.from === 'ai' ? 'flex-end' : 'flex-start' }}>
              <div style={{ maxWidth:'80%' }}>
                {m.from === 'ai' && <div style={{ fontSize:10, color:T.gray, marginBottom:3, textAlign:'right' }}>Chatty</div>}
                <div style={{ padding:'11px 15px', borderRadius:14, background: m.from === 'ai' ? T.warmGray : '#fff', border: m.from === 'them' ? `1px solid ${T.lightGray}` : 'none', borderTopLeftRadius: m.from === 'them' ? 4 : 14, borderTopRightRadius: m.from === 'ai' ? 4 : 14 }}>
                  <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>{m.text}</div>
                </div>
                {/* Feedback buttons for AI messages */}
                {m.from === 'ai' && feedbackMsg === null && (
                  <div className="fade-in" style={{ display:'flex', gap:6, justifyContent:'flex-end', marginTop:6 }}>
                    <button onClick={() => handleGood(i)} style={{ padding:'5px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:14, fontSize:10, cursor:'pointer', color:T.gray }}>Good</button>
                    <button onClick={() => handleWrong(i)} style={{ padding:'5px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:14, fontSize:10, cursor:'pointer', color:T.gray }}>Wrong</button>
                  </div>
                )}
                {/* Feedback: done/good */}
                {m.from === 'ai' && feedbackMsg === i && feedbackStep === 'done' && (
                  <div className="fade-in" style={{ fontSize:11, color:'#16a34a', textAlign:'right', marginTop:4 }}>Feedback saved</div>
                )}
              </div>
            </div>
          </div>
        ))}

        {/* Feedback flow: reason selection */}
        {feedbackStep === 'reason' && (
          <div className="fade-up" style={{ padding:'14px 16px', background:T.warmGray, borderRadius:12, marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:8 }}>Chatty</div>
            <div style={{ fontSize:13, color:T.ink, marginBottom:12 }}>What went wrong?</div>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              {reasons.map(r => (
                <div key={r} onClick={() => pickReason(r)} style={{ padding:'10px 14px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, cursor:'pointer', fontSize:12, color:T.ink }}>
                  {r}
                </div>
              ))}
              <input placeholder="Something else..." onKeyDown={e => { if(e.key==='Enter' && e.target.value) pickReason(e.target.value); }}
                style={{ padding:'10px 14px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, fontSize:12, color:T.ink, fontFamily:'Inter', outline:'none' }} />
            </div>
          </div>
        )}

        {/* Feedback flow: correction proposal */}
        {feedbackStep === 'correction' && (
          <div className="fade-up" style={{ padding:'14px 16px', background:T.warmGray, borderRadius:12, marginBottom:12 }}>
            <div style={{ fontSize:11, color:T.gray, fontWeight:500, letterSpacing:'0.04em', textTransform:'uppercase', marginBottom:8 }}>Chatty</div>
            <div style={{ fontSize:13, color:T.ink, marginBottom:10 }}>Got it — {selectedReason.toLowerCase()}. Next time I'd say something like this:</div>
            <div style={{ padding:'10px 14px', background:'#fff', borderRadius:8, border:`1px solid ${T.lightGray}`, fontSize:13, color:T.ink, lineHeight:1.5, marginBottom:10 }}>
              {correctedDraft}
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={handleCorrectionGood} style={{ padding:'7px 16px', background:T.ink, color:'#fff', border:'none', borderRadius:16, fontSize:11, fontWeight:600, cursor:'pointer' }}>Good</button>
              <button onClick={() => setFeedbackStep('reason')} style={{ padding:'7px 12px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:16, fontSize:11, cursor:'pointer', color:T.gray }}>Still wrong</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function InboxV2() {
  const [morningDismissed, setMorningDismissed] = useState(false);
  const [reportCollapsed, setReportCollapsed] = useState(false);
  const [activeTab, setActiveTab] = useState('important');
  const [openChat, setOpenChat] = useState(null);
  const [answeredChats, setAnsweredChats] = useState(new Set()); // track answered by user key
  const scrollRef = useRef(null);

  const handleScroll = () => {
    if (scrollRef.current && scrollRef.current.scrollTop > 20 && !reportCollapsed) {
      setReportCollapsed(true);
    }
  };

  const handleOpenChat = (item, label, labelColor, isSensitive) => {
    setOpenChat({ item, label, labelColor, isSensitive });
  };

  const counts = {
    important: IMPORTANT_DATA.services.length + IMPORTANT_DATA.sensitive.length + IMPORTANT_DATA.collabs.length,
    engagement: ENGAGEMENT_DATA.posts.reduce((sum, p) => sum + p.comments.length, 0),
    other: OTHER_DATA.reduce((s, e) => s + (e.type === 'stack' ? e.items.length : 1), 0),
  };

  return (
    <div style={{ background:T.paper, height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>

      {/* Morning brief overlay */}
      {!morningDismissed && (
        <MorningBrief onDismiss={() => setMorningDismissed(true)} />
      )}

      {/* Fixed header area */}
      <div style={{ padding:'52px 20px 0', flexShrink:0 }}>
        <DailyReport collapsed={reportCollapsed} onToggle={() => setReportCollapsed(!reportCollapsed)} />
        <TabBar active={activeTab} setActive={setActiveTab} counts={counts} />
      </div>

      {/* Scrollable content */}
      <div ref={scrollRef} onScroll={handleScroll}
        style={{ flex:1, overflowY:'auto', padding:'0 10px 100px 20px' }}>
        {activeTab === 'important' && <ImportantTab onOpenChat={handleOpenChat} answeredChats={answeredChats} />}
        {activeTab === 'engagement' && <EngagementTab />}
        {activeTab === 'other' && <OtherTab />}
        {activeTab === 'handled' && <HandledTab />}
      </div>

      {/* Chat Detail Overlay */}
      {openChat && (
        <ChatDetail
          item={openChat.item}
          label={openChat.label}
          labelColor={openChat.labelColor}
          isSensitive={openChat.isSensitive}
          onClose={() => setOpenChat(null)}
          onSent={(user) => setAnsweredChats(prev => new Set([...prev, user]))}
        />
      )}
    </div>
  );
}


/* ─── LEGACY: Focus Mode (kept for reference but unused in v2) ─── */
function FocusMode({ reviewIdx, setReviewIdx }) {
  const [phase, setPhase] = useState('greeting'); // greeting, reviewing, batch, takeover, done
  const [sentItems, setSentItems] = useState([]);
  const [batchMode, setBatchMode] = useState(true);
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState('');
  const [batchExpanded, setBatchExpanded] = useState(false);
  const scrollRef = useRef(null);

  const currentItem = REVIEWS[reviewIdx];
  const allDone = reviewIdx >= REVIEWS.length;

  const batchItems = currentItem && currentItem.batch && batchMode
    ? REVIEWS.filter(r => r.batch === currentItem.batch && REVIEWS.indexOf(r) >= reviewIdx)
    : [];
  const isBatch = batchItems.length >= 2 && batchMode;

  const startReviewing = () => setPhase('reviewing');

  const handleApprove = () => {
    setSentItems(s => [...s, currentItem]);
    setReviewIdx(i => i+1);
    setEditing(false);
    setPhase('reviewing');
  };
  const handleBatchApprove = () => {
    setSentItems(s => [...s, ...batchItems]);
    setReviewIdx(i => i + batchItems.length);
    setBatchMode(false);
    setPhase('reviewing');
  };
  const handleSkip = () => { setReviewIdx(i => i+1); setEditing(false); setPhase('reviewing'); };

  // Check if done after state changes
  useEffect(() => {
    if(phase === 'reviewing' && reviewIdx >= REVIEWS.length) setPhase('done');
  }, [reviewIdx, phase]);

  // Check if next item is a batch
  useEffect(() => {
    if(phase === 'reviewing' && isBatch) setPhase('batch');
  }, [reviewIdx, phase]);

  useEffect(() => {
    if(scrollRef.current) setTimeout(() => { scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 50);
  }, [phase, reviewIdx, sentItems.length, editing]);

  useEffect(() => { if(currentItem) setEditVal(currentItem.draft); }, [reviewIdx]);

  return (
    <div style={{ height:'calc(100% - 120px)', display:'flex', flexDirection:'column' }}>
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'0 24px 20px' }}>

        {/* ── Phase: Greeting (clean, one message) ── */}
        {phase === 'greeting' && (
          <div className="fade-up" style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', paddingTop:40 }}>
            <div style={{ fontSize:48, marginBottom:32 }}>💬</div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>Chatty</div>
              <div style={{ background:T.warmGray, borderRadius:16, borderTopLeftRadius:4, padding:'16px 20px', maxWidth:'90%' }}>
                <div style={{ fontSize:16, color:T.ink, lineHeight:1.5 }}>
                  Good morning ☀️
                </div>
                <div style={{ fontSize:14, color:T.ink, lineHeight:1.6, marginTop:10 }}>
                  Chatty drafted responses for 2 lead inquiries and 1 FAQ. Ready when you are.
                </div>
                <div style={{ fontSize:14, color:T.ink, marginTop:12, fontWeight:500 }}>
                  {REVIEWS.length} replies to review. Wanna take a look?
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── Phase: Reviewing (one task at a time, scrollable history) ── */}
        {(phase === 'reviewing' || phase === 'batch' || phase === 'takeover') && (
          <>
            {/* Sent items scroll history */}
            {sentItems.map((item) => (
              <SentBubble key={`sent-${item.id}`} item={item} />
            ))}

            {/* Current single task */}
            {phase === 'reviewing' && currentItem && !isBatch && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5, display:'flex', alignItems:'center', gap:5 }}>
                    💬 Chatty · {reviewIdx+1} of {REVIEWS.length}
                  </div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'14px 16px', maxWidth:'90%' }}>
                    <div style={{ fontSize:14, fontWeight:600, color:T.ink, marginBottom:4 }}>
                      {currentItem.user} <span style={{ fontWeight:400, color:T.gray }}>· {currentItem.source}</span>
                    </div>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>
                      {NARRATIONS[currentItem.id]}
                    </div>
                  </div>
                </div>

                {/* Their message */}
                <div style={{ marginLeft:16, marginBottom:10 }}>
                  <div style={{ padding:'12px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:12, borderTopLeftRadius:4, maxWidth:'85%' }}>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5, fontStyle:'italic' }}>"{currentItem.msg}"</div>
                  </div>
                </div>

                {/* Draft intro + draft */}
                <div style={{ marginBottom:6 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Chatty</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'10px 16px', maxWidth:'55%', fontSize:13, color:T.ink }}>
                    I'd answer with this:
                  </div>
                </div>
                <div style={{ marginLeft:16, marginBottom:8 }}>
                  {!editing ? (
                    <div style={{ padding:'14px 16px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:12, maxWidth:'90%' }}>
                      <div style={{ fontSize:14, color:T.ink, lineHeight:1.55 }}>{currentItem.draft}</div>
                    </div>
                  ) : (
                    <div style={{ maxWidth:'90%' }}>
                      <textarea value={editVal} onChange={e=>setEditVal(e.target.value)}
                        style={{ width:'100%', fontSize:14, color:T.ink, lineHeight:1.5, padding:'14px 16px', border:`2px solid ${T.accent}`, borderRadius:12, resize:'none', height:100, fontFamily:'Inter', background:'#fff', outline:'none' }} />
                      <div style={{ display:'flex', gap:6, marginTop:8, flexWrap:'wrap' }}>
                        {['Shorter','Warmer','Add a question','More direct'].map(c => (
                          <span key={c} style={{ fontSize:11, padding:'5px 12px', borderRadius:20, border:`1px solid ${T.lightGray}`, cursor:'pointer', color:T.ink, fontWeight:500, background:'#fff' }}>{c}</span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Batch */}
            {phase === 'batch' && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Chatty</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'14px 16px', maxWidth:'90%' }}>
                    <div style={{ fontSize:14, color:T.ink, lineHeight:1.5 }}>
                      These {batchItems.length} are very similar — all FAQ replies about your program. Want to approve them all?
                    </div>
                  </div>
                </div>
                <div style={{ marginLeft:16, marginBottom:8 }}>
                  {(batchExpanded ? batchItems : batchItems).map((item,i) => (
                    <div key={i} style={{ padding:'12px 14px', background:'#fff', border:`1px solid ${T.lightGray}`, borderRadius:10, marginBottom:6,
                      opacity: !batchExpanded && i > 0 ? 0.6 : 1 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:T.ink }}>{item.user} <span style={{ fontWeight:400, color:T.gray }}>· {item.type}</span></div>
                      <div style={{ fontSize:13, color:T.gray, fontStyle:'italic', marginTop:3 }}>"{item.msg.slice(0,50)}{item.msg.length>50?'...':''}"</div>
                      {batchExpanded && (
                        <div style={{ fontSize:12, color:T.ink, marginTop:8, paddingTop:8, borderTop:`1px solid ${T.lightGray}`, lineHeight:1.4 }}>
                          Draft: {item.draft}
                        </div>
                      )}
                    </div>
                  ))}
                  {!batchExpanded && (
                    <div onClick={() => setBatchExpanded(true)} style={{ fontSize:12, color:T.accent, cursor:'pointer', marginTop:4, fontWeight:500 }}>
                      Show drafts →
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Take over */}
            {phase === 'takeover' && currentItem && (
              <div className="fade-up">
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, color:T.gray, marginBottom:5 }}>💬 Chatty</div>
                  <div style={{ background:T.warmGray, borderRadius:14, borderTopLeftRadius:4, padding:'12px 16px', maxWidth:'65%', fontSize:14, color:T.ink }}>

                </div>
                <div style={{ marginLeft:16, maxWidth:'90%' }}>
                  <textarea placeholder="Type your reply..."
                    style={{ width:'100%', padding:'14px 16px', borderRadius:12, border:`1px solid ${T.lightGray}`, fontSize:14, lineHeight:1.5, resize:'none', height:90, fontFamily:'Inter', background:'#fff', outline:'none', color:T.ink }} />
                </div>
              </div>
            )}
          </>
        )}

        {/* ── Phase: Done ── */}
        {phase === 'done' && (
          <>
            {sentItems.map((item) => (
              <SentBubble key={`sent-${item.id}`} item={item} />
            ))}
            <div className="fade-up" style={{ textAlign:'center', padding:'40px 20px' }}>
              <div style={{ fontSize:48, marginBottom:16 }}>✨</div>
              <h2 style={{ fontSize:22, fontWeight:700, color:T.ink, marginBottom:8 }}>All caught up</h2>
              <p style={{ fontSize:14, color:T.gray, lineHeight:1.5 }}>Chatty learned 2 new preferences from your edits.</p>
              <p style={{ fontSize:13, color:'#bbb', marginTop:20 }}>Go create something.</p>
            </div>
          </>
        )}
      </div>

      {/* ─── Pinned bottom bar ─── */}
      {phase === 'greeting' && (
        <div style={{ padding:'12px 24px 28px', display:'flex', gap:10 }}>
          <button style={{ flex:1, padding:'14px 0', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:14, fontWeight:500, cursor:'pointer', color:T.ink }}>
            Summary first

          <button onClick={startReviewing} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            Start reviewing
          </button>
        </div>
      )}

      {phase === 'reviewing' && currentItem && !isBatch && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8, alignItems:'center' }}>
          <button onClick={handleApprove} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            {editing ? 'Send edited' : 'Approve'}
          </button>
          <button onClick={() => { setEditing(!editing); if(currentItem) setEditVal(currentItem.draft); }}
            style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.ink }}>
            {editing ? 'Cancel' : 'Edit'}
          </button>
          <button onClick={handleSkip} style={{ padding:'14px 16px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
            Skip
          </button>
          <button onClick={() => setPhase('takeover')} style={{ padding:'14px 0', background:'transparent', border:'none', fontSize:11, fontWeight:500, cursor:'pointer', color:'#bbb' }}>
            I'll take over
          </button>
        </div>
      )}

      {phase === 'batch' && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8 }}>
          <button onClick={handleBatchApprove} style={{ flex:1, padding:'14px 0', background:T.ink, color:'#fff', border:'none', borderRadius:50, fontSize:14, fontWeight:600, cursor:'pointer' }}>
            Approve all {batchItems.length}

          <button onClick={() => { setBatchMode(false); setPhase('reviewing'); }} style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.ink }}>
            One by one
          </button>
        </div>
      )}

      {phase === 'takeover' && (
        <div style={{ padding:'12px 24px 28px', borderTop:`1px solid ${T.lightGray}`, display:'flex', gap:8 }}>
          <button onClick={() => { setSentItems(s => [...s, currentItem]); setReviewIdx(i=>i+1); setPhase('reviewing'); }}

          <button onClick={() => setPhase('reviewing')} style={{ padding:'14px 20px', background:'transparent', border:`1px solid ${T.lightGray}`, borderRadius:50, fontSize:13, fontWeight:500, cursor:'pointer', color:T.gray }}>
            Back
          </button>
        </div>
      )}
    </div>
  );
}

  return (
    <div style={{ width:'100%', height:'100%', position:'relative', overflow:'hidden' }}>

      {/* ─── Onboarding ─── */}

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
